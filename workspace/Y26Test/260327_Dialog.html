<script id="white canvas">

  const GM = new GameManager('testGamer')
  gameLoop = function () { GM.update(); GM.draw() }
  GM.var = {}

  // 今後は、毎回 ClassをExetndsで新規で作るか、後で統合する
  // GoalChecker
  // let ref = null


  class PlayerCameraRCV extends CameraRCV {
    constructor(world) {
      super()
      // 10.5 6 10.5

      this.world = world
      this.idleState = new StateBase()
      this.jumpState = new StateBase()
      this.currentState = this.idleState
      this.idleState.on(eventID.space, () => {
        this.tags.add('air')
        this.delta.y = 0.1
        this.currentState = this.jumpState
      })
      this.jumpState.on('land', () => {
        this.tags.delete('air')
        this.currentState = this.idleState
      })

    }

    update() {
      super.update()
      this.currentState.update()

    }

    handle(_ev) {
      const fn = this.currentState.handlers.get(_ev.typeName)
      if (!fn) return false
      fn(_ev)
      return true
    }
  }
  // =========================
  // enemy
  // =========================
  class EnemyDummy extends SpriteRCV {
    constructor(x, y, z, camera, target, renderer) {
      super(x, y, z, camera, renderer)
      this.target = target
      this.hp = 30
      this.maxHp = 50
      this.tags.add('enemy')
      this.spriteSize = 96


      this.hitTimer = 0
      this.knockback = new Vec3(0, 0, 0)
    }

    update() {
      super.update()
      if (this.tags.has('dead')) return

      if (this.hitTimer > 0) {
        this.hitTimer--

        // ノックバック反映
        this.position.x += this.knockback.x
        this.position.z += this.knockback.z

        // 減衰
        this.knockback.x *= 0.8
        this.knockback.z *= 0.8
        return
      }
      const dx = this.target.position.x - this.position.x
      const dz = this.target.position.z - this.position.z
      const len = Math.hypot(dx, dz) || 1

      if (len > 1.5) {
        const speed = 0.03
        this.position.x += dx / len * speed
        this.position.z += dz / len * speed
      }
    }
    draw(ctx = ctx0) {
      // super.draw()!! こういう使い方もありだったのか
      super.draw(ctx)
      if (!this.show) return
      if (!this.screenPos || this.screenPos.z <= 0) return

      const ratio = Math.max(0, this.hp / this.maxHp)
      const w = 36
      const h = 5
      const x = this.screenPos.x - w / 2
      const y = this.sy0 - 10

      ctx.fillStyle = 'black'
      ctx.fillRect(x - 1, y - 1, w + 2, h + 2)

      ctx.fillStyle = '#500'
      ctx.fillRect(x, y, w, h)

      ctx.fillStyle = '#0f0'
      ctx.fillRect(x, y, w * ratio, h)
    }
    damage(v = 1) {
      this.hp -= v
      this.hitTimer = 6

      const dx = this.position.x - this.target.position.x
      const dz = this.position.z - this.target.position.z
      const len = Math.hypot(dx, dz) || 1

      const power = 0.18
      this.knockback.x += dx / len * power
      this.knockback.z += dz / len * power
      this.knockback.y += 0.04

      if (this.hp <= 0) {
        this.tags.add('dead')
        this.show = false
      }
    }
  }


  // =========================
  // fps interactor
  // =========================
  class FPSInteractor extends GameObject {
    constructor(camera, world, enemies) {
      super()
      this.camera = camera
      this.world = world
      this.enemies = enemies
      this.damage = 5
      this.currentTarget = null
      this.maxDist = 20
      EventHub.getEventHandler(this)
      this.on(eventID.fire, () => {
        this.fire()
      })
    }

    update() {
      this.currentTarget = this.getTarget()
    }

    draw(ctx = ctx0) {
      if (!this.currentTarget) return
      console.log('draw')

      const x = W / 2
      const y = H / 2

      ctx.strokeStyle = 'red'
      ctx.beginPath()
      const r = 8 + Math.sin(Date.now() * 0.02) * 2 // こうも簡単にSinウェーブが使える！！
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.stroke()
    }

    getTarget() {
      let best = null
      let bestScore = Infinity

      for (const e of this.enemies) {
        if (e.tags.has('dead')) continue
        if (!e.screenPos) continue
        if (e.screenPos.z <= 0) continue

        const dx = e.screenPos.x - W / 2
        const dy = e.screenPos.y - H / 2
        const dist2 = dx * dx + dy * dy

        if (dist2 < 24 * 24 && dist2 < bestScore) {
          bestScore = dist2
          best = e
        }
      }

      return best
    }

    fire() {
      if (!this.currentTarget) return
      this.currentTarget.damage(this.damage)
    }
    getOrigin() {
      return {
        x: this.camera.position.x,
        y: this.camera.position.y,
        z: this.camera.position.z,
      }
    }

    getForward() {
      const yaw = this.camera.rotY || this.camera.rotationY || 0
      const pitch = this.camera.rotX || this.camera.rotationX || 0

      return {
        x: Math.sin(yaw) * Math.cos(pitch),
        y: Math.sin(pitch),
        z: Math.cos(yaw) * Math.cos(pitch),
      }
    }

    rayHitEnemy(origin, dir, enemy) {
      // 胴体中心を球近似
      const cx = enemy.position.x
      const cy = enemy.position.y + enemy.height * 0.5
      const cz = enemy.position.z
      const r = enemy.radius

      const ox = origin.x - cx
      const oy = origin.y - cy
      const oz = origin.z - cz

      const b = ox * dir.x + oy * dir.y + oz * dir.z
      const c = ox * ox + oy * oy + oz * oz - r * r
      const d = b * b - c

      if (d < 0) return -1

      const t = -b - Math.sqrt(d)
      if (t < 0) return -1
      if (t > this.maxDist) return -1

      return t
    }
  }
