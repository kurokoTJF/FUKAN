                GameManager.emitEvent(eventID.blockNext)
            }

            EventHub.getEventHandler(this)

            this.on(eventID.blockPrev, () => {
                this.selectPrev()
            })

            this.on(eventID.blockNext, () => { this.selectNext() })
            this.on(eventID.blockBreak, () => { this.breakBlock() })
            this.on(eventID.blockPlace, () => { this.placeBlock() })




        }
        get selectedBlock() {
            return this.palette[this.selectedIndex];
        }

        selectNext() {
            this.selectedIndex = (this.selectedIndex + 1) % this.palette.length;
        }

        selectPrev() {
            this.selectedIndex =
                (this.selectedIndex - 1 + this.palette.length) % this.palette.length;
        }

        breakBlock() {
            // クリック/キー入力時の処理
            if (this.placePos == null) return
            if (this.cooldown === 0) {
                this.world.clearBlock(this.hitPos.x, this.hitPos.y, this.hitPos.z);
                this.cooldown = 15;
            }
        }

        placeBlock() {
            if (this.placePos == null) return

            const tp = this.placePos;
            if (this.cooldown === 0) {

                if (this.world.inBounds(tp.x, tp.y, tp.z)) {
                    this.placeSelectedBlock(tp.x, tp.y, tp.z);
                }
                this.cooldown = 15;
            }
        }

        placeSelectedBlock(x, y, z) {
            const item = this.selectedBlock;
            if (!item) return;

            if (item.kind === 'special') {
                this.world.setSpecialBlock(
                    x, y, z,
                    item.specialId,
                    BrickPool.createRandom8x8Brick()
                );
                return;
            }

            this.world.set(x, y, z, item.blockId);
            this.world.setBrickRef(x, y, z, item.brickRef ?? -1);
        }

        update() {
            if (this.cooldown > 0) this.cooldown--;

            // ここでPressを回収するとだめじゃないかなw

            const isPlace = keys.interact?.pressed;
            const isBreak = keys.break?.pressed;

            // 常にレイキャストを飛ばして、プレビュー用の座標を更新する
            const maxDistance = 8;
            const result = RendererRCV.raycastVoxel(
                this.camera.vecForward,
                maxDistance,
                128,
                this.world,
                this.camera
            );

            if (result.hit) {
                // 設置予定地の座標を計算 (当たった場所 + 法線)
                this.placePos = {
                    x: result.vox.x + result.normal.x,
                    y: result.vox.y + result.normal.y,
                    z: result.vox.z + result.normal.z,
                    hitVox: result.vox // 破壊対象の座標も保持
                };
                this.hitPos = {
                    x: result.vox.x,
                    y: result.vox.y,
                    z: result.vox.z,
                }


            } else {
                this.placePos = null;
            }
        }

        // RendererRCVの描画後に呼ばれる想定の描画メソッド
        draw() {
            const ctx = ctx0
            if (!this.placePos) return;
            // --- 1. 画面中央の十字レティクルを描画 ---
            const cx = W / 2;
            const cy = H / 2;
            const size = 10; // 照準の大きさ

            ctx.strokeStyle = "rgba(255, 255, 255, 0.8)"; // 半透明の白
            ctx.lineWidth = 2;

            ctx.beginPath();
            // 横線
            ctx.moveTo(cx - size, cy);
            ctx.lineTo(cx + size, cy);
            // 縦線
            ctx.moveTo(cx, cy - size);
            ctx.lineTo(cx, cy + size);
            ctx.stroke();

            // --- 2. ターゲット（設置予定地）がある場合の強調表示 ---
            if (!this.placePos) return;

            // 設置予定の座標(this.targetPos)がわかっているので、
            // 画面中央付近に「ターゲット中」という文字や、
            // 枠線の色を変えるなどの視覚効果を出すことができます。

            ctx.save()

            // 設置可能な場合は照準の色を変える（赤くするなど）
            ctx.fillStyle = "red";
            ctx.fillRect(cx - 2, cy - 2, 4, 4); // 中心点
            ctx.restore()
            ctx.save()
            // current block 

            ctx.fillStyle = 'lime';
            ctx.font = "14px Arial";
            ctx.textAlign = "center";

            ctx.fillText(
                `Place: ${this.selectedBlock.label}`,
                cx - 60,
                cy - 30
            );

            ctx.fillStyle = "rgba(0, 255, 0, 1)";
            ctx.fillText("TARGET: " + this.placePos.x + "," + this.placePos.y + "," + this.placePos.z, cx, cy + 25);


            ctx.fillStyle = 'red';
            ctx.fillRect(cx - 2, cy - 2, 4, 4);
            ctx.restore()
        }
    }

    // y-up physicSimulator
    // need [tags] equiped
    class PhysicSimulator_BlockWorld extends GameObject {
        constructor(_collisionWorld) {
            super()
            this.world = _collisionWorld
            EventHub.getEventHandler(this)

            this.on(eventID.ResolveMovement, (ev) => {
                if (!this.world) return console.log('no world to resolve movement')
                const t = ev.sender
                const size3D = t.size3D ?? { x: 0.4, y: 0.4, z: 0.4 }
                t.delta.y -= 0.004
                t.delta.x = this.world.moveAxisCheck_CenterType(t.position, 'x', t.delta.x, size3D)
                t.delta.z = this.world.moveAxisCheck_CenterType(t.position, 'z', t.delta.z, size3D)
                t.delta.y = this.world.moveAxisCheck_CenterType(t.position, 'y', t.delta.y, size3D)

                if (t.delta.y === 0 && t.tags.has('air'))
                    GameManager.emitEvent('land', this, t)

                // Clamp only Y position
                t.position.y = Math2.clamp(t.position.y, this.world.minY + 0.01, this.world.maxY - 0.01)

            })
        }
    }

<script id="Input&key mapping">

    // key Maps > keys > Listener
    document.addEventListener("keyup", (e) => {
        const action = keyMap[e.key.toLowerCase()]
        if (action) {
            keys[action].pressed = false
            if (onReleasehandlers[action]) {
                if (keys[action].press) {
                    onReleasehandlers[action]()
                    keys[action].press = false
                }
            } else {
                keys[action].press = false

            }
            e.preventDefault()
        }
    })

    document.addEventListener("keydown", (e) => {
        const action = keyMap[e.key.toLowerCase()]
        if (action) {
            keys[action].pressed = true
            if (onPressHandlers[action]) {
                if (!keys[action].press) {
                    onPressHandlers[action]()
                    keys[action].press = true
                }
            } else {
                keys[action].press = true

            }
            e.preventDefault()  // ページスクロールなどを防止
        }
    })



    // html button interface
    keyPress = function (key) {
        keys[key].pressed = true
        keys[key].source = 'button'
    }

    // for (let _key in keys) keys[_key].pressed = false

    // key container
    const keys = new Proxy({}, {
        get(target, prop) {
            if (!(prop in target)) {
                target[prop] = { press: false, pressed: false }
            }
            return target[prop]
        }
    })



    // EventID好きなだけ追加
    // 使うのを忘れちゃうｗ
    const eventID = new Proxy({}, (() => {
        let currentID = 0
        const map = new Map()
        return {
            get(target, prop) {

                if (typeof prop === "symbol") return undefined
                if (!map.has(prop)) {
                    map.set(prop, currentID++)
                }
                return map.get(prop)
            },
            ownKeys() {
                return Array.from(map.keys())
            },
        }
    })())

    // if(keys.xxx.pressed)これをGameLoopに入れたら連続発火
    // keyMap -> keys
    const keyMap = {
        'a': 'left',
        'd': 'right',
        'w': 'up',
        's': 'down',
        ' ': 'shot',
        'f': 'fire',
        'j': 'turnLeft',
        'l': 'turnRight',
        'i': 'turnUp',
        'k': 'turnDown',
        'e': 'interact',
    }

    // 必要なキーだけ登録すればOK
    // onPress: 押した瞬間
    const onPressHandlers = {
        up: () => {
        },
        down: () => {
        },
        left: () => {
        },

    class stateRenderer2_5 extends GameObject {
        constructor(master) {
            super()
            this.master = master
            this.spriteImage = null
            this.currentFrame = 0

        }

        checkSprite() {
            const n = this.master.activeState.name
            const s = this.master.data.state[n]?.sprite
            if (!s) return false
            if (this.spriteName === n) return true

            const path = this.master.data.spriteFolder + s.path

            if (!this.spriteImage)
                this.spriteImage = new ImageLoader(path)
            else if (this.spriteImage.img.src != path)
                this.spriteImage.load(path)

            return true
        }

        update() {
            if (!this.checkSprite()) {
                this.spriteImage = null
                return
            }

            const n = this.master.activeState.name
            const s = this.master.data.state[n]?.sprite
            const mc = this.master.counter
            let FrameBuffer = mc.endTime / s.length
            this.currentFrame = Math.floor(mc.time / FrameBuffer)
            this.currentFrame = Math.min(this.currentFrame, s.length - 1)

        }

        exportSpriteDraw(camera) {
            if (!this.spriteImage?.loaded) return false
            const n = this.master.activeState.name
            const s = this.master.data.state[n]?.sprite

            const sw = this.spriteImage.img.width / s.length
            const sh = this.spriteImage.img.height

            const cropbox = {
                position: {
                    x: sw * this.currentFrame,
                    y: 0,

                width: sw,
                height: sh,

            if (this.offset) {
                this.drawPosition.x += this.offset.x

                z: target.position.z + target.size.z / 2

            let flip = 1

            if (target.direction.x <= 0) flip *= -1
            if (s.flip) flip *= -1
            if (flip <= 0) flipX = -(vp1.x + sw / 2)

            const offsetx = s.offset ? s.offset.x : 0

            this.data = master.data.state[sname]
            if (this.data.baseState) {
                const n = this.data.baseState
                this.data = master.data.state[n]
            }
            for (const [eventName, action] of Object.entries(this.data.on || {})) {
                // setting up handlers
                this.on(eventName, (target, EventData) => {
                    if (action.move) {
                        for (const m in action.move) {
                            if (action.move[m]) {
                                moveAxis(m, action.move[m], this.target)
                            }
                        }
                    }
                    if (action.log) console.log(action.log)
                    if (action.event) GM.pushEvent(action.event)
                    if (action.nextState)
                        this.master.cst2(action.nextState)
                })
            }

            this.enter()
        }

        enter() {
            const _counter = GM.addCounter({
                msg: '[' + this.name + ']',
                target: this.master,
                endTime: this.data.duration,
                endCall: () => {
                    this.target.pushEvent('onEnd')

                }
            })

            const _counter0 = new Counter({
                msg: '[' + this.name + ']',
                target: this.master,
                endTime: this.data.duration,
                endCall: () => {
                    this.target.pushEvent('onEnd')

                }
            })

            const loop = this.data.sprite.loop
            const length = this.data.sprite.length
            const duration = this.data.duration
            if (loop) {
                _counter.processCall = () => {
                    for (const step of this.data.steps || [])
                        if (_counter.time === step.time)
                            step.action(this.target)
                    if (_counter.time === duration - 1)
                        if (loop < length && duration > 0) {
                            _counter.time = Math.floor(loop / length * duration)
                        }
                }
            } else {
                _counter.processCall = () => {
                    for (const step of this.data.steps || [])
                        if (_counter.time === step.time)
                            step.action(this.target)
                }
            }

            // counter must be end
            this.master.counter?.setEnd()
            this.master.counter = _counter
        }
    }

            let moveX = 0

            if (keys.left.pressed) {

                moveZ -= dirRight.z

            }

    class PlayerCameraRCV extends CameraRCV {
        constructor(world, player) {
            const px = player?.position?.x ?? 10.5
            const py = player?.position?.y ?? 6.0
            const pz = player?.position?.z ?? 10.5
            super(px, py + 1.6, pz - 3, 0, 12, world)
            this.world = world
            this.player = player

            this.followDistance = 1.8
            this.lookHeight = 0.4
            this.heightOffset = 0.0
            this.smooth = 0.22

            this.rotSpeed = 1
            this.cameraRadius = 0.18 // for collision
        }

        getFreeCameraPose() {
            let yaw = this.yaw;
            let pitch = this.pitch;

            let PRes = 0;
            if (keys.turnLeft.pressed) PRes--;
            if (keys.turnRight.pressed) PRes++;
            if (PRes > 0) yaw -= this.rotSpeed;
            else if (PRes < 0) yaw += this.rotSpeed;
            yaw = (yaw + 360) % 360;

            PRes = 0;
            if (keys.turnDown.pressed) PRes--;
            if (keys.turnUp.pressed) PRes++;
            if (PRes > 0) pitch = Math2.clamp(pitch - this.rotSpeed, -50, 65);
            else if (PRes < 0) pitch = Math2.clamp(pitch + this.rotSpeed, -50, 65);

            const forward = Vec3.fromYawPitch(yaw, pitch);

            const playerAnchor = new Vec3(
                this.player.position.x,
                this.player.position.y + this.lookHeight,
                this.player.position.z
            );

            const lookTarget = playerAnchor.clone();
            const desired = lookTarget.clone()
                .add(forward.clone().mul(-this.followDistance));

            desired.y += this.heightOffset;

            return { yaw, pitch, lookTarget, desired };
        };


        applyCameraPose({ yaw, pitch, lookTarget, desired }) {
            this.yaw = yaw;
            this.pitch = pitch;

            this.vecForward = Vec3.fromYawPitch(this.yaw, this.pitch);
            this.vecRight = this.vecForward.cross(new Vec3(0, 1, 0)).norm();
            this.vecUp = this.vecRight.cross(this.vecForward);

            const fixed = this.resolveCameraPosition(lookTarget, desired);

            this.position.x = lerp(this.position.x, fixed.x, this.smooth);
            this.position.y = lerp(this.position.y, fixed.y, this.smooth);
            this.position.z = lerp(this.position.z, fixed.z, this.smooth);
        };

        // include voxel hitTest
        resolveCameraPosition(origin, desired) {
            const dir = desired.clone().sub(origin)
            const dist = dir.len()
            if (dist <= 0.0001) return desired
            dir.norm()

            const step = 0.08
            let safe = 0
            for (let t = 0; t <= dist; t += step) {
                const px = origin.x + dir.x * t
                const py = origin.y + dir.y * t
                const pz = origin.z + dir.z * t
                const r = this.cameraRadius
                const hit = this.world.isSolid(Math.floor(px - r), Math.floor(py), Math.floor(pz - r))
                    || this.world.isSolid(Math.floor(px + r), Math.floor(py), Math.floor(pz + r))
                    || this.world.isSolid(Math.floor(px - r), Math.floor(py), Math.floor(pz + r))
                    || this.world.isSolid(Math.floor(px + r), Math.floor(py), Math.floor(pz - r))
                if (hit) break
                safe = t
            }

            return origin.clone().add(dir.mul(Math.max(0, safe - 0.12)))
        }

        controller() {
            this.applyCameraPose(this.getFreeCameraPose())
        }

        update() {
            this.controller()
        }
    }

            ctx.arc(x, y, r, 0, Math.PI * 2)
            ctx.stroke()
        }

        getTarget() {
            let best = null
            let bestScore = Infinity

            for (const e of this.enemies) {
                if (e.tags.has('dead')) continue
                if (!e.screenPos) continue
                if (e.screenPos.z <= 0) continue

                const dx = e.screenPos.x - W / 2
                const dy = e.screenPos.y - H / 2
                const dist2 = dx * dx + dy * dy

                if (dist2 < 24 * 24 && dist2 < bestScore) {
                    bestScore = dist2
                    best = e
                }
            }

            return best
        }

        fire() {
            if (!this.currentTarget) return
            this.currentTarget.damage(this.damage)
        }
        getOrigin() {
            return {
                x: this.camera.position.x,
                y: this.camera.position.y,
                z: this.camera.position.z,
            }
        }

        getForward() {
            const yaw = this.camera.rotY || this.camera.rotationY || 0
            const pitch = this.camera.rotX || this.camera.rotationX || 0

            return {
                x: Math.sin(yaw) * Math.cos(pitch),
                y: Math.sin(pitch),
                z: Math.cos(yaw) * Math.cos(pitch),
            }
        }

        rayHitEnemy(origin, dir, enemy) {
            // 胴体中心を球近似
            const cx = enemy.position.x
            const cy = enemy.position.y + enemy.height * 0.5
            const cz = enemy.position.z
            const r = enemy.radius

            const ox = origin.x - cx
            const oy = origin.y - cy
            const oz = origin.z - cz

            const b = ox * dir.x + oy * dir.y + oz * dir.z
            const c = ox * ox + oy * oy + oz * oz - r * r
            const d = b * b - c

            if (d < 0) return -1

            const t = -b - Math.sqrt(d)
            if (t < 0) return -1
            if (t > this.maxDist) return -1

            return t
        }
    }

            const text = this.pages[this.pageIndex] || ''
            ctx.fillText(text, x + 12, y + 30)

            ctx.fillText('E / Fire で次へ', x + 12, y + 65)
        }
    }

    // =========================
    // TPS combat interactor
    // =========================
    class TPSCombatInteractor extends GameObject {
        constructor(player, playerVisual, camera, enemies, world) {
            super();
            this.player = player;
            this.playerVisual = playerVisual
            this.camera = camera;
            this.enemies = enemies;
            this.world = world;

            this.overWriteSetup()
            this.bulletTimeTimer = 0
            this.freezeEnemiesDuringBulletTime = true

            this.lockedEnemy = null;

            this.comboStep = 0;
            this.comboTimer = 0;
            this.attackTimer = 0;
            this.attackDuration = 14;//
            this.attackHitDone = false;

            this.dodgeTimer = 0;
            this.dodgeDuration = 12;//
            this.dodgeCooldown = 0;
            this.invulnTimer = 0;
            this.dodgeDistance = 1.6;
            this.dodgeDir = new Vec3(0, 0, 1);
            this.dodgeMoved = 0;

            this.hitStop = 0;
            this.globalTimeScale = 1.0;
            this.slowTimer = 0;

            this.attackRange = 1.85;//
            this.attackAngleDeg = 70;//
            this.baseDamage = 8;//

            this.moveMulDuringAttack = 0.18;
            this.moveMulDuringDodge = 1.8;

            this.uiMessage = "";
            this.uiTimer = 0;

            this.keyMapSetup()
            this.setupEnemies();
        }

        easeInOutSine(t) {
            return -(Math.cos(Math.PI * t) - 1) * 0.5;
        }

        keyMapSetup() {
            keyMap['q'] = 'GIGA';
            keyMap['e'] = 'lockon';
            keyMap[' '] = 'jump'
            keyMap['f'] = 'attack'
            onPressHandlers.attack = () => {
                this.Attack_handleEvent();
            };

            onPressHandlers.lockon = () => {
                this.LockOn_toggle();
            };

            onPressHandlers.jump = () => {
                this.Dodge_handleEvent();
            };
        }

        overWriteSetup() {
            for (const e of this.enemies) {
                e._originalUpdate = e.update.bind(e)
                e.update = function () { return }
            }

            this.player._originalUpdate = this.player.update.bind(this.player)
            this.player.update = function () { return }


            this.camera.lockTarget = null;
            this.camera.lockWeight = 0.0;          // 0 = 通常, 1 = 完全ロックオン
            this.camera.lockFollowDistance = 2.6;  // 通常より少し引く
            this.camera.lockSideOffset = 0.25;     // 少し肩越し
            this.camera.lockHeightBias = 0.15;
            this.camera.lookTarget = null

            this.camera.getLockOnCameraPose = function () {
                if (!this.lockTarget || this.lockTarget.tags?.has?.("dead")) return null;

                const playerAnchor = new Vec3(
                    this.player.position.x,
                    this.player.position.y + this.lookHeight,
                    this.player.position.z
                );

                const enemyAnchor = new Vec3(
                    this.lockTarget.position.x,
                    this.lockTarget.position.y + (this.lockTarget.height || 1.6) * 0.6,
                    this.lockTarget.position.z
                );

                const lookDir = enemyAnchor.clone().sub(playerAnchor);
                lookDir.y = 0;
                if (lookDir.len() < 0.0001) return null;
                lookDir.norm();

                const yaw = Math2.lerpAngleDeg(
                    this.yaw,
                    Math.atan2(lookDir.x, lookDir.z) * 180 / Math.PI,
                    0.22
                );

                const pitch = Math2.mix(this.pitch, 12, 0.16);

                const forward = Vec3.fromYawPitch(yaw, pitch);
                const right = forward.cross(new Vec3(0, 1, 0)).norm();

                const lookTarget = playerAnchor.clone().mul(0.35).add(enemyAnchor.clone().mul(0.65));

                const backDist = 2.6;
                const camHeight = 1.2;
                const sideOffset = 0.15;

                const desired = playerAnchor.clone()
                    .sub(lookDir.clone().mul(backDist))
                    .add(new Vec3(0, camHeight, 0))
                    .add(right.clone().mul(sideOffset));

                return { yaw, pitch, lookTarget, desired };
            };

            this.camera.controller = function () {
                const pose = this.getLockOnCameraPose() || this.getFreeCameraPose();
                this.applyCameraPose(pose);
            };
        }

        setupEnemies() {
            for (const e of this.enemies) {
                if (!e.combat) {
                    e.combat = {
                        state: "idle",      // idle | strafe | windup | attack | cooldown | dead
                        timer: 0,
                        attackRange: 1.45,
                        aggroRange: 8.0,
                        strafeDir: Math.random() < 0.5 ? -1 : 1,
                        hitFlash: 0,
                        poise: 0,
                    };
                }
            }
        }

        update() {
            const dt = this.globalTimeScale

            if (this.hitStop > 0) {
                this.hitStop--
                return
            }

            this.player._originalUpdate()

            this.playerTimeScale = 1.0
            this.enemyTimeScale = 1.0

            if (this.bulletTimeTimer > 0) {
                this.bulletTimeTimer--
                this.playerTimeScale = 1.0
                this.enemyTimeScale = 0.0   // 完全停止
            } else if (this.slowTimer > 0) {
                this.slowTimer--
                this.playerTimeScale = 0.25
                this.enemyTimeScale = 0.25  // 敵だけ遅い
            }

            if (this.comboTimer > 0) this.comboTimer -= this.playerTimeScale
            if (this.attackTimer > 0) this.attackTimer -= this.playerTimeScale
            if (this.dodgeTimer > 0) this.dodgeTimer -= this.playerTimeScale
            if (this.dodgeCooldown > 0) this.dodgeCooldown -= this.playerTimeScale
            if (this.invulnTimer > 0) this.invulnTimer -= this.playerTimeScale
            if (this.uiTimer > 0) this.uiTimer -= 1

            if (this.comboTimer <= 0 && this.attackTimer <= 0) {
                this.comboStep = 0
            }

            this.LockOn_update()
            this.PlayerFacing_update()
            this.Attack_update()
            this.Dodge_update()
            this.Enemies_update(this.enemyTimeScale)
        }

        draw() {
            this.drawCombatHUD(ctx0);
        }
        // -------------------------
        // input entry points
        // -------------------------
        Attack_handleEvent() {
            if (this.attackTimer > 0 || this.dodgeTimer > 0) return;

            this.comboStep = (this.comboStep % 3) + 1;
            this.comboTimer = 24;
            this.attackTimer = this.attackDuration;
            this.attackHitDone = false;

            this.uiMessage = `ATTACK ${this.comboStep}`;
            this.uiTimer = 20;
        }

        Dodge_getDirection() {
            const forward = Vec3.fromYawPitch(this.camera.yaw, 0).norm();
            const right = new Vec3(-forward.z, 0, forward.x).norm();

            let x = 0;
            let z = 0;

            if (keys.left.pressed) x -= 1;
            if (keys.right.pressed) x += 1;
            if (keys.up.pressed) z += 1;
            if (keys.down.pressed) z -= 1;

            if (x === 0 && z === 0) {
                return forward;
            }

            return forward.clone().mul(z).add(right.clone().mul(x)).norm();
        }

        Dodge_handleEvent() {
            if (this.dodgeCooldown > 0 || this.attackTimer > 0 || this.dodgeTimer > 0) return;

            this.dodgeTimer = this.dodgeDuration;
            this.dodgeCooldown = 20;
            this.invulnTimer = 10;

            this.dodgeDir = this.Dodge_getDirection();   // さっきの入力方向版
            this.dodgeMoved = 0;

            this.uiMessage = "DODGE";
            this.uiTimer = 14;

            // pecfect Dodge check!
            for (const enemy of this.enemies) {
                if (enemy.tags.has("dead")) continue;
                if (!enemy.combat) continue;
                if (enemy.combat.state === "attack" && enemy.combat.timer >= 4) {
                    const d = this.distanceXZ(enemy.position, this.player.position);
                    if (d < 2.2) {
                        this.bulletTimeTimer = 300;
                        this.hitStop = 2;
                        this.invulnTimer = 30;

                        enemy.combat.state = "cooldown";
                        enemy.combat.timer = 18;

                        this.uiMessage = "PERFECT DODGE";
                        this.uiTimer = 24;
                    }
                }
            }
        }

        LockOn_toggle() {
            const alive = this.enemies.filter(e => !e.tags.has("dead"));
            if (alive.length === 0) {
                this.lockedEnemy = null;
                return;
            }

            if (!this.lockedEnemy || this.lockedEnemy.tags.has("dead")) {
                this.lockedEnemy = this.findNearestEnemy(10);
                return;
            }

            const currentIndex = alive.indexOf(this.lockedEnemy);
            const nextIndex = (currentIndex + 1) % alive.length;
            this.lockedEnemy = alive[nextIndex];
        }

        // -------------------------
        // player combat
        // -------------------------
        Attack_update() {
            if (this.attackTimer <= 0) return;

            // move damping during attack
            this.player.delta.x *= this.moveMulDuringAttack;
            this.player.delta.z *= this.moveMulDuringAttack;

            const activeFrame = this.attackDuration - this.attackTimer;
            if (!this.attackHitDone && activeFrame >= 4) {
                this.attackHitDone = true;
                this.Attack_resolveMeleeHit();
            }
        }

        Attack_resolveMeleeHit() {
            const forward = this.PlayerFacing_getPlayerForward();
            const origin = this.player.position;

            for (const enemy of this.enemies) {
                if (enemy.tags.has("dead")) continue;

                const toEnemy = enemy.position.clone().sub(origin);
                toEnemy.y = 0;

                const dist = toEnemy.len();
                if (dist > this.attackRange) continue;

                const dir = toEnemy.clone().norm();
                const dot = forward.x * dir.x + forward.z * dir.z;
                const ang = Math.acos(Math.max(-1, Math.min(1, dot))) * 180 / Math.PI;

                if (ang > this.attackAngleDeg * 0.5) continue;

                const dmg = this.baseDamage + (this.comboStep - 1) * 3;
                enemy.damage(dmg);
                enemy.combat.hitFlash = 6;
                enemy.combat.poise += 1;

                if (enemy.combat.poise >= 2) {
                    enemy.combat.state = "cooldown";
                    enemy.combat.timer = 20;
                    enemy.combat.poise = 0;
                }

                this.hitStop = 3;
                this.uiMessage = `HIT ${dmg}`;
                this.uiTimer = 12;
                break;
            }
        }


        Dodge_update() {
            if (this.dodgeTimer <= 0) return;

            const t = 1 - (this.dodgeTimer / this.dodgeDuration);   // 0 -> 1
            const eased = this.easeInOutSine(t);
            const targetMoved = this.dodgeDistance * eased;
            // get the deltaMove move distance@
            const delta = targetMoved - this.dodgeMoved;

            this.dodgeMoved = targetMoved;

            this.player.delta.x += this.dodgeDir.x * delta;
            this.player.delta.z += this.dodgeDir.z * delta;
        }

        LockOn_update() {
            if (this.lockedEnemy && this.lockedEnemy.tags.has("dead")) {
                this.lockedEnemy = null;
            }
            if (this.lockedEnemy) {
                const d = this.distanceXZ(this.lockedEnemy.position, this.player.position);
                if (d > 12) this.lockedEnemy = null;
            }

            this.camera.lockTarget = this.lockedEnemy || null;
            this.camera.lockWeight = this.lockedEnemy ? 1.0 : 0.0;
        }

        PlayerFacing_update() {
            if (!this.lockedEnemy) return;
            if (this.attackTimer > 0 || this.dodgeTimer > 0) return;

            const dx = this.lockedEnemy.position.x - this.player.position.x;
            const dz = this.lockedEnemy.position.z - this.player.position.z;
            const len = Math.hypot(dx, dz) || 1;

            this.player.direction.set(dx / len, 0, dz / len);

            // camera yaw 補正は camera 側に任せる
        }

        PlayerFacing_getPlayerForward() {
            if (this.lockedEnemy) {
                const dx = this.lockedEnemy.position.x - this.player.position.x;
                const dz = this.lockedEnemy.position.z - this.player.position.z;
                const len = Math.hypot(dx, dz) || 1;
                return new Vec3(dx / len, 0, dz / len);
            }

            if (this.player.direction.len() > 0.001) {
                return this.player.direction.clone().norm();
            }

            return Vec3.fromYawPitch(this.camera.yaw, 0).norm();
        }

        // -------------------------
        // enemy combat
        // -------------------------
        Enemies_update(dt) {
            for (const enemy of this.enemies) {
                if (enemy.tags.has("dead")) continue;
                if (!enemy.combat) continue;

                if (enemy.combat.hitFlash > 0) enemy.combat.hitFlash -= dt;
                if (enemy.hitTimer > 0) continue;

                //enemy._originalUpdate()

                const dist = this.distanceXZ(enemy.position, this.player.position);
                const combat = enemy.combat;

                switch (combat.state) {
                    case "idle":
                        if (dist < combat.aggroRange) {
                            combat.state = "strafe";
                            combat.timer = 20 + Math.random() * 20;
                        }
                        break;

                    case "strafe":
                        combat.timer -= dt;

                        this.moveEnemyStrafe(enemy, dist);

                        if (dist <= combat.attackRange) {
                            combat.state = "windup";
                            combat.timer = 22;
                        } else if (combat.timer <= 0) {
                            combat.timer = 20 + Math.random() * 20;
                            combat.strafeDir *= -1;
                        }
                        break;

                    case "windup":
                        combat.timer -= dt;

                        // 少し狙い直す
                        this.faceEnemyToPlayer(enemy);

                        if (dist > combat.attackRange + 0.5) {
                            combat.state = "strafe";
                            combat.timer = 16;
                        } else if (combat.timer <= 0) {
                            combat.state = "attack";
                            combat.timer = 10;
                        }
                        break;

                    case "attack":
                        combat.timer -= dt;
                        this.enemyLunge(enemy);

                        if (combat.timer <= 6 && combat.timer > 4) {
                            this.tryEnemyHit(enemy);
                        }

                        if (combat.timer <= 0) {
                            combat.state = "cooldown";
                            combat.timer = 18;
                        }
                        break;

                    case "cooldown":
                        combat.timer -= dt;
                        if (combat.timer <= 0) {
                            combat.state = "strafe";
                            combat.timer = 20;
                        }
                        break;
                }
            }
        }

        getEnemyStateLabel(enemy) {
            if (enemy.tags.has("dead")) return "dead";
            if (!enemy.combat) return "none";

            const s = enemy.combat.state;
            if (s === "idle") return "IDLE";
            if (s === "strafe") return "STRAFE";
            if (s === "windup") return "WINDUP";
            if (s === "attack") return "ATTACK";
            if (s === "cooldown") return "COOLDOWN";
            return String(s).toUpperCase();
        }

        moveEnemyStrafe(enemy, dist) {
            const dx = this.player.position.x - enemy.position.x;
            const dz = this.player.position.z - enemy.position.z;
            const len = Math.hypot(dx, dz) || 1;

            const nx = dx / len;
            const nz = dz / len;

            const tangentX = -nz * enemy.combat.strafeDir;
            const tangentZ = nx * enemy.combat.strafeDir;

            const approach = dist > 1.9 ? 0.026 : -0.012;
            const strafe = 0.022;

            enemy.position.x += nx * approach + tangentX * strafe;
            enemy.position.z += nz * approach + tangentZ * strafe;
        }

        enemyLunge(enemy) {
            const dx = this.player.position.x - enemy.position.x;
            const dz = this.player.position.z - enemy.position.z;
            const len = Math.hypot(dx, dz) || 1;

            enemy.position.x += (dx / len) * 0.05;
            enemy.position.z += (dz / len) * 0.05;
        }

        tryEnemyHit(enemy) {
            if (this.bulletTimeTimer > 0) return;

            const dist = this.distanceXZ(enemy.position, this.player.position);
            if (dist > 1.55) return;
            if (this.invulnTimer > 0) return;

            // 被弾
            this.uiMessage = "PLAYER HIT";
            this.uiTimer = 16;
            this.hitStop = 4;

            const dx = this.player.position.x - enemy.position.x;
            const dz = this.player.position.z - enemy.position.z;
            const len = Math.hypot(dx, dz) || 1;
            this.player.delta.x += (dx / len) * 0.18;
            this.player.delta.z += (dz / len) * 0.18;
        }

        faceEnemyToPlayer(enemy) {
            const dx = this.player.position.x - enemy.position.x;
            const dz = this.player.position.z - enemy.position.z;
            const len = Math.hypot(dx, dz) || 1;
            enemy.direction = new Vec3(dx / len, 0, dz / len);
        }

        // -------------------------
        // helpers
        // -------------------------
        findNearestEnemy(maxDist = 999) {
            let best = null;
            let bestDist = maxDist;

            for (const e of this.enemies) {
                if (e.tags.has("dead")) continue;
                const d = this.distanceXZ(e.position, this.player.position);
                if (d < bestDist) {
                    best = e;
                    bestDist = d;
                }
            }
            return best;
        }

        distanceXZ(a, b) {
            return Math.hypot(a.x - b.x, a.z - b.z);
        }

        normalizeAngle(deg) {
            let a = deg;
            while (a > 180) a -= 360;
            while (a < -180) a += 360;
            return a;
        }

        // -------------------------
        // HUD
        // -------------------------
        drawCombatHUD(ctx) {
            ctx.save();

            if (this.lockedEnemy && !this.lockedEnemy.tags.has("dead") && this.lockedEnemy.screenPos) {
                const sp = this.lockedEnemy.screenPos;
                ctx.strokeStyle = "#ff4d6d";
                ctx.lineWidth = 2;
                ctx.strokeRect(sp.x - 20, sp.y - 20, 40, 40);
            }

            // state
            const pv = this.playerVisual.screenPos
            ctx.fillStyle = "white";
            ctx.font = "14px monospace";
            ctx.fillText(`combo:${this.comboStep}`, pv.x + 30, pv.y - 100);
            ctx.fillText(`atk:${Math.ceil(this.attackTimer)}`, pv.x + 30, pv.y - 82);
            ctx.fillText(`dodgeCD:${Math.ceil(this.dodgeCooldown)}`, pv.x + 30, pv.y - 64);
            ctx.fillText(`BulletTime:${Math.ceil(this.bulletTimeTimer)}`, pv.x + 30, pv.y - 46);

            if (this.uiTimer > 0) {
                ctx.fillStyle = "#ffd166";
                ctx.font = "bold 18px monospace";
                ctx.fillText(this.uiMessage, 12, 84);
            }

            // enemy telegraph
            for (const e of this.enemies) {
                if (e.tags.has("dead")) continue;
                if (!e.screenPos || e.screenPos.z <= 0) continue;
                if (!e.combat) continue;

                const label = `${this.getEnemyStateLabel(e)} ${Math.ceil(e.combat.timer)}`;

                // 頭上文字
                ctx.save();
                ctx.font = "bold 12px monospace";
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";

                let color = "#ffffff";
                if (e.combat.state === "windup") color = "#ffb347";
                else if (e.combat.state === "attack") color = "#ff4d4d";
                else if (e.combat.state === "cooldown") color = "#7fd1ff";
                else if (e.combat.state === "strafe") color = "#b8ffb0";

                const tx = e.screenPos.x;
                const ty = e.sy0 - 28;

                ctx.strokeStyle = "rgba(0,0,0,0.9)";
                ctx.lineWidth = 4;
                ctx.strokeText(label, tx, ty);

                ctx.fillStyle = color;
                ctx.fillText(label, tx, ty);
                ctx.restore();

                if (e.combat.state === "windup") {
                    ctx.fillStyle = "rgba(255, 120, 120, 0.85)";
                    ctx.fillRect(e.screenPos.x - 18, e.sy0 - 24, 36, 6);
                } else if (e.combat.state === "attack") {
                    ctx.fillStyle = "rgba(255, 0, 0, 0.9)";
                    ctx.fillRect(e.screenPos.x - 20, e.sy0 - 24, 40, 8);
                }
            }

            ctx.restore();
        }
    }


    class ImageDataStore {
        constructor() {
            this.ImageList = new Map();
            this._canvas = document.createElement("canvas");
            this._ctx = this._canvas.getContext("2d", { willReadFrequently: true });
        }

        async loadImageToData(file) {
            const bitmap = await createImageBitmap(file);

            this._canvas.width = bitmap.width;
            this._canvas.height = bitmap.height;
            this._ctx.clearRect(0, 0, bitmap.width, bitmap.height);
            this._ctx.drawImage(bitmap, 0, 0);

            const imageData = this._ctx.getImageData(0, 0, bitmap.width, bitmap.height);

            this.ImageList.set(file.name, {
                name: file.name,
                width: bitmap.width,
                height: bitmap.height,
                data: new Uint8ClampedArray(imageData.data),
            });

            bitmap.close?.();
        }

        getRGB(_ImageName, x, y) {
            const image = this.ImageList.get(_ImageName);
            const i = (y * image.width + x) * 4;
            return [image.data[i], image.data[i + 1], image.data[i + 2]];
        }

        getValue(_ImageName, x, y, channel = 0) {
            const image = this.ImageList.get(_ImageName);
            const i = (y * image.width + x) * 4;
            return image.data[i + channel];
        }
    }
</script>

<script id="GameLoop">


    gameLoop = function (now) {
        requestAnimationFrame(gameLoop)

        const delta = now - GM.lastTime
        if (delta < GM.frameTime) return
        GM.lastTime = now - (delta % GM.frameTime)

        GM.update();
        GM.draw()
    }
    requestAnimationFrame(gameLoop)
