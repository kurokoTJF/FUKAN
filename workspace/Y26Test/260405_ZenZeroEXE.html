    <script>
        const errorLog = document.getElementById("errorLog");

        function writeError(message) {
            const line = document.createElement("div");
            line.textContent = message;
            errorLog.appendChild(line);
            errorLog.scrollTop = errorLog.scrollHeight;
        }

        // 実行時エラーを拾う（Typo含む）
        window.onerror = function (message, source, lineno, colno, error) {
            if (message === "Script error.") {
                writeError("Script error (詳細取得不可：ローカル or CORS制限)");
                return;
            }

            writeError(
                error?.stack || `${message} (${lineno}:${colno})`
            );
        };

        // Promiseの未処理エラーも拾う
        window.addEventListener("unhandledrejection", function (event) {
            writeError(
                event.reason?.stack || String(event.reason)
            );
        });
    </script>

    // ===== Canvas =====
    const canvas0 = document.getElementById('c')

    function drawLine(ctx, x0, y0, x1, y1, color = 'red', thickness = 4) {
        ctx.strokeStyle = color
        ctx.lineWidth = thickness
        ctx.beginPath()
        ctx.moveTo(x0, y0)
        ctx.lineTo(x1, y1)
        ctx.stroke()
    }

    function drawSimpleBG(color) {
        ctx0.fillStyle = color
        ctx0.fillRect(0, 0, W, H)
    }

    function drawGrid(cellSize = 50) {
        const cols = Math.floor(W / cellSize); // 横方向のマス数
        const rows = Math.floor(H / cellSize); // 縦方向のマス数

        ctx0.strokeStyle = 'rgba(0,0,0,0.2)'
        ctx0.lineWidth = 2
        ctx0.fillStyle = 'black'
        ctx0.font = '10px sans-serif' // フォント指定も忘れずに

        for (let i = 0; i <= cols; i++) {
            ctx0.beginPath()
            ctx0.moveTo(i * cellSize, 0)
            ctx0.lineTo(i * cellSize, H)
            ctx0.stroke()
            ctx0.fillText(i * cellSize, i * cellSize, 10)
        }

        for (let j = 0; j <= rows; j++) {
            ctx0.beginPath()
            ctx0.moveTo(0, j * cellSize)
            ctx0.lineTo(W, j * cellSize)
            ctx0.stroke()
            ctx0.fillText(j * cellSize, 0, j * cellSize)
        }
    }

<script id="Core Engine & equipment functions">

    // Tag x State x Event。
    // need Vec3 class
    class GameObject {
        constructor(
            name = 'Node'/*for showList*/,
            id = 'game_object'/*more like type*/) {
            this.folded = false // toggle this to fold a folder group
            this.id = id
            this.name = name
            this.deleted = false
            this.objectList = []
            this.drawList = []
            this.tags = new Set()//これで全部まとめてTagをつけれる
            /*add,delete,_,has*/
            this.drawPause = false
            this.updatePause = false
            this.position = new Vec3(0, 0, 0)
        }

        get _size() {
            return { x: this.sizex ?? 0, y: this.sizey ?? 0, z: this.sizez ?? 0 }
        }

        get rotation() {
            return { x: 0, y: 0, z: this.angle ?? 0 }
        }

        get px() {
            //return this.master?.px || 0 + this.localx
            return (this.master?.px ?? 0) + this.localx
        }
        get py() {
            return (this.master?.py ?? 0) + this.localy

        }
        get pz() {
            return (this.master?.pz ?? 0) + this.localz
        }

        set px(v) {
            this.localx = v
        }

        set py(v) {
            this.localy = v
        }

        set pz(v) {
            this.localz = v
        }

        //これは上書きしない
        update() {
            if (this.updatePause === true) return
            this.update_self()
        }
        update_self() {
        }

        draw() {
            //console.log('gameobject draw')
        }
        onAttach(master) {
            this.master = master
        }
        traverse(list, callback) {
            for (const obj of list) {
                callback(obj)
                if (obj.objectList) {
                    this.traverse(obj.objectList, callback)
                }
            }
        }

        updateList_filter(ID) {
            this.objectList = this.objectList.filter((c) => c.id != ID)
        }
        addChild(e, wantDraw = true) {
            this.objectList.push(e)
            this._needsRebuild = true
            if (e.onAttach)
                e.onAttach(this)
            else
                e.master = this
            e.updatePause = false
            e.gatherReference?.(this)

            if (e.drawPause == true) return e
            if (wantDraw) e.drawPause = false
            else e.drawPause = true

            return e
        }
        destroy() {
            if (this.deleted) return
            this.deleted = true
            console.log(`${this.constructor.name} destroyed`)
        }


    }


    // work as sceneRoot
    class GameManager extends GameObject {
        constructor(name = 'GM', id = 'GM') {
            super(name, id)
            this.FPS = 60
            this.lastTime = 0
            this.frameTime = 1000 / this.FPS
            this.flatUpdateList = []//そのままUpdateリスト。じゃないと毎回重い
            this.flatDrawList = []//そのままDrawリスト
            this._needsRebuild = true // render queue rebuild
            this.camera = { // default scene camera 汚いかも
                update: () => { },
                draw: () => {
                    this.flatDrawList.forEach(e => {
                        e.draw?.()
                    })
                },
            }
            this.counters = [] // 最初のUpdateListじゃないかな
            this.registry = new Map()//外部読み込み用
            console.log('[SYSTEM]game manager instanced, equip the EventManager if needed')

            this.eventHub = new EventHub()
            EventHub.getEventHandler(this)
        }

        static emitEvent(_typeName, _sender, _data, _target = GM) {
            if (!_target) return
            _target.eventHub.emit(_typeName, _sender, _data)
        }

        update_self() {
            if (this._needsRebuild) this._rebuildFlatLists()

            // delayed event 
            //this.dealEvent?.()
            this.eventHub.dealEvent(this)
            // counterはInputと同様、Eventの類 this.gameLoop_input?.()
            // 予測型コリジョン判定用 this.gameLoop_check?.()
            // 数値の適応と更新 this.gameLoop_update?.()

            this.flatUpdateList.forEach(e => {
                e.update?.()
            })
        }

        draw() {
            ctx0.clearRect(0, 0, W, H)

            //this.camera.draw()
            this.flatDrawList.forEach(e => {
                e.draw?.()
            })

            //showHTML(this.showEventQueue(), 'event')

        }

        _rebuildFlatLists() {
            //console.clear()
            console.log('[when GM rebuild] GM rebuild update and draw Lists')
            this.objectListTXT = null
            this.flatUpdateList.length = 0
            this.flatDrawList.length = 0

            const stack = []

            // ルート配列は末尾→先頭の順で push（こうすると pop で先頭から処理される）
            for (let i = this.objectList.length - 1; i >= 0; i--) {
                stack.push(this.objectList[i])
            }

            const drawStack = [...stack]

            while (stack.length) {
                const node = stack.pop();// ここで“正しい順番”に取り出される
                if (!node.updatePause && node.update) {
                    this.flatUpdateList.push(node)

                    const ch = node.objectList
                    if (ch && ch.length) {
                        // 子は「末尾から先頭へ」push していく
                        // → pop したときに先頭の子から処理され、結果として親→子の順を維持
                        for (let i = ch.length - 1; i >= 0; i--) stack.push(ch[i])
                    }
                }
            }

            while (drawStack.length) {
                const node = drawStack.pop();// ここで“正しい順番”に取り出される
                if (!node.drawPause && node.draw) {
                    this.flatDrawList.push(node)
                    const ch = node.objectList
                    if (ch && ch.length) {
                        // 子は「末尾から先頭へ」push していく
                        // → pop したときに先頭の子から処理され、結果として親→子の順を維持
                        for (let i = ch.length - 1; i >= 0; i--) drawStack.push(ch[i])
                    }
                }
            }

            this._needsRebuild = false

            console.log(`[when GM rebuild] gathering reference`)
            //再構築するたびに下やるの？？
            this.flatUpdateList.forEach(e => {
                e.gatherReference?.(this)

            })
        }

        showList(List, level = 0) {
            if (level == 0)
                if (!this._needsRebuild)
                    if (this.objectListTXT)
                        return false
                    else
                        console.log('[when GM rebuild] GM printed the updatedw list')


            this.objectListTXT = 'txt'
            let result = ''
            if (!level) result = 'GM Root\n'
            List.forEach(e => {
                // インデント作成
                let indent = '  | '

                if (level) {

                    indent += '  | '.repeat(level - 1)
                } else {
                    indent = '  | '.repeat(level)
                }
                if (e.updatePause) indent += 'x '
                else indent += 'o '
                if (e.drawPause) indent += 'x '
                else indent += 'o '

                indent += ' '
                let tags = ''
                if (e.tags)
                    tags = Array.from(e.tags).join(" | ")


                // 自分を出力
                result += `${indent}${e.name ? e.name : e.constructor.name}: ( ${tags} )\n`

                // 子リストがあれば再帰
                if (!e.folded && e.objectList) {
                    result += this.showList(e.objectList, level + 1)
                } else if (e.folded)
                    result += 'folded\n'
            })

            this.objectListTXT = result
            return this.objectListTXT
        }

        update_counters() {
            // 
            for (let _c of this.counters)
                if (_c.pause === false)
                    _c.update()
            this.counters = this.counters.filter((_c) => _c.end == false)
        }
        showCounters() {
            let _table = ""
            for (let _c of this.counters) {
                _table += _c.msg + ":" + _c.time + "/" + _c.endTime + "\n"
            }
            return _table
        }
        addCounter({
            msg = "[untitled]",
            target = undefined,
            endTime = 10,
            loop = false,
            processCall = null,
            endCall = () => {
                this.end = true
            },

        } = {}) {
            let _temp = new Counter({
                endTime: endTime,
                target: target,
                loop: loop,
                msg: msg,
                processCall: processCall,
                endCall: endCall,
            })
            this.counters.push(_temp)
            return _temp
        }

        // pause by tag
        switchPauseByTag(tag, pause = true, type = 0, List = this.objectList) {
            console.log(`set ${tag}.updatePause = ${pause}`)
            const mapping = {
                0: ["updatePause"],
                1: ["drawPause"],
                default: ["updatePause", "drawPause"]
            }
            this.traverse(List, (e) => {
                if (e.tags?.has(tag)) {
                    (mapping[type] ?? mapping.default).forEach(key => {
                        e[key] = pause
                    })
                }
            })

            this._needsRebuild = true
        }

        removeByTag(tag, list = this.objectList) {
            for (let i = list.length - 1; i >= 0; i--) { // 逆順で安全に削除
                const obj = list[i]
                if (!obj.tags) continue
                if (obj.tags.has(tag)) {
                    obj.destroy?.()
                    list.splice(i, 1); // 該当オブジェクトを削除
                }
                else if (obj.objectList) {
                    // 子リストがある場合は再帰
                    this.removeByTag(tag, obj.objectList)
                }
            }
            this._needsRebuild = true

        }
        clearChildren() {
            this._needsRebuild = true
            this.registry = new Map()
            this.objectList.length = 0
            this.drawList.length = 0
            this.flatUpdateList.length = 0
            this.flatDrawList.length = 0
            this.counters.length = 0
            this.eventHub.eventQueue.length = 0
            this.var = null
        }

    }

    //Handlerをそれぞれ持って、できる分だけ対応
    class StateBase {
        constructor(master) {
            this.master = master
            EventHub.getEventHandler(this)
        }
        update() { }
        enter() { }
        exit() { }
    }

    // new Event System
    // 「全部に流す」コストや責務の曖昧さが出るかもしれない。
    /*生データ → 意味のある出来事 + 「瞬間」を定義する
      // 物理
      velocityY < 0 && collided
   
      // ↓ 翻訳
   
      emit('land')
    */
    class EventHub {
        constructor() { this.eventQueue = [] }

        emit(_typeName, _sender, _data) {
            this.eventQueue.push({ typeName: _typeName, sender: _sender, data: _data, consumed: false })
        }

        dealEvent(_rootNode) {
            const q = this.eventQueue
            this.eventQueue = []
            for (const ev of q) {
                EventHub.broadcast(_rootNode, ev)
            }
        }

        static broadcast(_node, _ev) {

            if (!_node || _ev.consumed) return
            _node.handle?.(_ev)
            if (_ev.consumed) return

            if (_node.objectList) {
                for (const child of _node.objectList) {
                    EventHub.broadcast(child, _ev)
                    if (_ev.consumed) return
                }
            }

        }

        static getEventHandler(target) {
            target.handlers = new Map()

            target.on = function (_typeName, _fn) {
                this.handlers.set(_typeName, _fn)
                return this
            }

            target.handle = function (_ev) {
                const fn = this.handlers.get(_ev.typeName)
                if (!fn) return false
                fn(_ev)
                return true
            }
        }

    }


    // player.current を設定するだけ。
    // and the player needs position, size, vx,vy,vz
    // 完全透明。空のupdateとupdateListを入れることで、this.currentのupdateなどに二回アクセスするのを防ぐ
    class PlayerProxy {
        constructor(initial = null, name) {
            this.current = initial
            this.name = name
            this.objectList = []
            return new Proxy(this, {
                get: (target, prop, receiver) => {
                    if (prop in target) return Reflect.get(target, prop, receiver)
                    return target.current?.[prop]
                },
                set: (target, prop, value, receiver) => {
                    if (prop in target) return Reflect.set(target, prop, value, receiver)
                    if (target.current) target.current[prop] = value
                    return true
                }
            })
        }

        update() { }

        setCurrent(obj) {
            this.current = obj
        }
        getCurrent() {
            return this.current
        }
    }

    // 画面になにか
    function showHTML(MSG, ID = 0) {
        let el = document.getElementById(ID)

        if (!el) {
            el = document.createElement('div')
            el.id = ID

            const body = document.body
            if (body.firstChild) {
                body.insertBefore(el, body.firstChild); // ← 先頭に挿入
            } else {
                body.appendChild(el); // ← 最悪何もないときは普通に追加
            }
        }

        el.innerText = MSG
    }




    // 四角い判定ボックスと 予測型コリジョン判定用のやつ
    // updateしないと、drawPositionも更新されない
    function getCollision(target, draw = true, ctx = ctx) {
        target.position = { x: 0, y: 0 }
        target.deltaPosition = { x: 0, y: 0 }
        target.drawPosition = { x: 0, y: 0 }
        target.accelaration = { x: 0, y: 0 }
        target.width = 32
        target.height = 32
        target.gravity = 1
        target.direction = 1
        target.maxSpeed = { x: 3, y: 10 }

        target.checkSpeed = function () {
            const vx = target.deltaPosition.x
            const vy = target.deltaPosition.y
            if (Math.abs(vx) > target.maxSpeed.x) {
                target.deltaPosition.x = Math.sign(vx) * target.maxSpeed.x
            }
            if (Math.abs(vy) > target.maxSpeed.y) {
                target.deltaPosition.y = Math.sign(vy) * target.maxSpeed.y
            }
        }

        const _update = target.update.bind(target)
        target.update = function () {
            _update()
            target.drawPosition.x = target.position.x
            target.drawPosition.y = target.position.y
        }

        target.moveTo = function (x, y) {
            target.position.x = x
            target.position.y = y
        }
        target.updateDir = function () {
            if (target.deltaPosition.x > 0) target.direction = 1
            else if (target.deltaPosition.x < 0) target.direction = -1
        }

        target.drawRect = function (ctx = ctx) {
            ctx.fillStyle = 'grey'
            ctx.fillRect(target.drawPosition.x, target.drawPosition.y, this.width, this.height)
        }
        addMethodLast(target, 'draw', target, 'drawRect')


        target.initialize = function (x, y, w, h) {
            this.position = { x: x, y: y }
            this.width = w
            this.height = h
        }

        target.swapPosition = function () {
            target.position.x += target.deltaPosition.x
            target.position.y += target.deltaPosition.y
        }

        target.updateGravity = function () {
            target.deltaPosition.y += target.gravity
        }
        target.applyFriction = function () {
            const friction = 0.1
            const vx = target.deltaPosition.x

            if (Math.abs(vx) <= friction) {
                target.deltaPosition.x = 0
            } else {
                target.deltaPosition.x -= Math.sign(vx) * friction
            }
        }

        target.Ytop = function () {
            return { now: this.position.y, next: this.position.y + this.deltaPosition.y }
        }
        target.Ybottom = function () {
            return { now: this.position.y + this.height, next: this.position.y + this.height + this.deltaPosition.y }

        }
        target.Xleft = function () {
            return { now: this.position.x, next: this.position.x + this.deltaPosition.x }

        }
        target.Xright = function () {
            return { now: this.position.x + this.width, next: this.position.x + this.width + this.deltaPosition.x }

        }

        target.YLandOn = function (_ground) {
            target.position.y = _ground - target.height
            target.deltaPosition.y = 0
        }
        target.centerPosition = function () {
            return { x: this.position.x + this.width / 2, y: this.position.y + this.height / 2 }
        }



    }

    // the object to object hitTester
    // not use this anymore in accessable block world
    function getHitTester(_target) {
        _target.hitTest = function (target) {
            if (
                target.Ybottom().next > this.Ytop().now &&
                target.Ytop().next < this.Ybottom().now &&
                target.Xright().next > this.Xleft().now &&
                target.Xleft().next < this.Xright().now
            ) {

                const fromAbove = target.Ybottom().now <= this.Ytop().now
                const fromBelow = target.Ytop().now >= this.Ybottom().now
                const fromRight = target.Xleft().now >= this.Xright().now
                const fromLeft = target.Xright().now <= this.Xleft().now
                if (fromAbove) {
                    target.position.y = this.position.y - target.height
                    target.deltaPosition.y = 0
                    if (target.eventQueue) target.pushEvent('land')
                } else if (fromBelow) {
                    target.position.y = this.position.y + this.height + 1
                    target.deltaPosition.y = 0

                } else if (fromRight) {
                    target.position.x = this.position.x + this.width
                    target.deltaPosition.x = 0

                } else if (fromLeft) {
                    target.position.x = this.position.x - target.width
                    target.deltaPosition.x = 0
                } else {
                    console.log('?!')
                    const centerfromAbove = target.centerPosition().y <= this.position.y + this.height / 2
                    const centerfromBelow = target.centerPosition().y >= this.position.y + this.height / 2
                    const centerfromRight = target.centerPosition().x >= this.position.x + this.width / 2
                    const centerfromLeft = target.centerPosition().x <= this.position.x + this.width / 2
                    if (centerfromAbove) {

                        target.position.y = this.position.y - target.height
                        target.deltaPosition.y = 0
                        if (target.eventQueue) target.pushEvent('land')
                    } else if (centerfromBelow) {
                        target.position.y = this.position.y + this.height + 1
                        target.deltaPosition.y = 0

                    } else if (centerfromRight) {
                        target.position.x = this.position.x + this.width
                        target.deltaPosition.x = 0

                    } else if (centerfromLeft) {
                        target.position.x = this.position.x - target.width
                        target.deltaPosition.x = 0
                    } else {
                        console.log('bakana!')
                    }
                }
            }
        }
    }

    // 2種類のProxyを実装する
    // でも、正直Tagは使いたくないけどね
    function getProxy(target) {
        target.request = new Proxy({}, {
            get: (target, prop) => {
                const value = target[prop]
                target[prop] = false; // 読んだら自動で false にする
                return value ?? false
            }
        })

        // 未定義状態。自由に書き込める。デフォルト状態はfalse
        target.Tag = new Proxy({}, {
            get(target, prop) {
                return prop in target ? target[prop] : false
            }
        })
    }

    function getActiveTags(tagObj, separator = " ") {
        return Object.entries(tagObj)
            .filter(([_, v]) => v === true)
            .map(([k]) => k)
            .join(separator)
    }



    // Methodを結合する。returnのスコープを注意
    function addMethodFirst(target, target_method, comp, method) {
        const t = target[target_method].bind(target)// this = target
        const c = comp[method].bind(comp)// this = comp
        target[target_method] = function (...args) {
            c(...args)
            t(...args)
        }
    }

    function addMethodLast(target, target_method, comp, method = target_method) {
        const t = target[target_method].bind(target)
        const c = comp[method].bind(comp)
        target[target_method] = function () {
            t()
            c()
        }
    }

    function addMethodLastSelf(target, methodA, methodB) {
        const A = target[methodA].bind(target)
        const B = target[methodB].bind(target)
        target[methodA] = function () {
            A()
            B()
        }
    }

    // 独自のupdateとDrawを持ったcomponentを内部に埋め込む
    function joinComponent(cmpnt, trgt) {

        addMethodLast(trgt, 'update', cmpnt)
        addMethodLast(trgt, 'draw', cmpnt)

        if (cmpnt.dealEvent && trgt.dealEvent) {
            addMethodLast(trgt, 'dealEvent', cmpnt)
        }

        return cmpnt

    }
    // state Machine の初期化。これのDecoupleは…
    // 外部データが必要
    function getStateMachine(target) {
        const initialState = target.data.state[target.data.initialState]
        target.state = new ImportedState(target.data.initialState, initialState)
        target.state.enter(target)

        target.cst = function (stateName) {
            target.state = new ImportedState(stateName, target.data.state[stateName])

            target.counter.setEnd()// じゃないと前のカウンターの処理が裏で走ってしまう
            target.state.enter(target)
        }

        const update_ = target.update.bind(target)
        console.log('state machine joined ')

        target.update = function () {
            update_()
            target.state.update(target)

        }

    }

<script id="Math & utilities">
    /* =========================

    class Math2 {
        constructor() { }
        static clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
        static mix(a, b, t) { return a + (b - a) * t; }
        static within(v, a, b) { return v > a && v < b }
        static fract(v) { return v - Math.floor(v) }
        static lerpAngleDeg(a, b, t = 0.2) {
            let diff = ((b - a + 540) % 360) - 180
            return a + diff * t
        }
    }

    class Vec3 {
        constructor(x = 0, y = 0, z = 0) { this.x = x; this.y = y; this.z = z; }
        set(x, y, z) { this.x = x; this.y = y; this.z = z; return this; }
        reset() { this.x = 0; this.y = 0; this.z = 0 }

        add(v) { this.x += v.x; this.y += v.y; this.z += v.z; return this; }
        sub(v) { this.x -= v.x; this.y -= v.y; this.z -= v.z; return this; }
        mul(s) { this.x *= s; this.y *= s; this.z *= s; return this; }

        dot(v) {
            return this.x * v.x + this.y * v.y + this.z * v.z
        }
        cross(v) {
            return new Vec3(
                this.y * v.z - this.z * v.y,
                this.z * v.x - this.x * v.z,
                this.x * v.y - this.y * v.x
            )
        }
        len() { return Math.hypot(this.x, this.y, this.z); }
        norm() { const l = this.len() || 1; this.x /= l; this.y /= l; this.z /= l; return this; }
        clone() { return new Vec3(this.x, this.y, this.z); }

        static distsq(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dz = a.z - b.z;
            return dx * dx + dy * dy + dz * dz;
        }

        // static であれば、Instanceしなくてもいいか
        // yaw:Left,Right ptich:up,down
        /* ルールの図解
                    +Z
                    ↑
                    |
             -X ←---+---→ +X
                    |
                    ↓
                    -Z

            yaw 0°   = +Z
            yaw 90°  = +X
            yaw 180° = -Z
            yaw 270° = -X
        */
        static fromYawPitch(yawDeg, pitchDeg) {
            const yaw = yawDeg * Math.PI / 180, pitch = pitchDeg * Math.PI / 180
            const cos_yaw = Math.cos(yaw), sin_yaw = Math.sin(yaw)
            const cos_pitch = Math.cos(pitch), sin_pinch = Math.sin(pitch)
            // 前方: XZ 平面をヨー、YZ はピッチ
            return new Vec3(sin_yaw * cos_pitch, -sin_pinch, cos_yaw * cos_pitch).norm()
        }
    }

<script id='Other effects'>
    // SoundManager
    // register and play
    class SoundManager {
        constructor() {
            this.registry = new Map(); // name → path
        }

        // 音を登録
        register(name, path) {
            this.registry.set(name, path)
        }

        // 再生
        play(name, volume = 1.0) {
            const path = this.registry.get(name)
            if (!path) {
                console.warn(`Sound "${name}" is not registered.`)
                return
            }
            const audio = new Audio(path)
            audio.volume = Math.max(0, Math.min(1, volume))
            audio.play()
        }
    }



    // ちいさいユーティリティ
    const lerp = (a, b, t) => a + (b - a) * t
    const clamp01 = (t) => Math.max(0, Math.min(1, t))
    // 代表的なEasing（必要な分だけ）
    const ease = {
        linear: t => t,
        inQuad: t => t * t,
        outQuad: t => t * (2 - t),
        inOutQuad: t => (t < .5) ? 2 * t * t : -1 + (4 - 2 * t) * t,
    }

    // ========= Timeline2（内部クロック + 複数Track）=========
    class Timeline {
        constructor({ length = 120, loop = false } = {}) {
            this.length = length;     // 総フレーム（or tick）
            this.loop = loop
            this.time = 0
            this.paused = false
            this.tracks = []
            this.tags = new Set(["eventStopper"]); // 必要なら既存タグ運用に合わせる
        }
        onAttach(master) {        //addChild が呼んでくれる
            this.master = master
        }
        addTrack(track) { this.tracks.push(track); return this; }
        reset() {
            this.time = 0
            this.finished = false
            this.tracks.forEach(e => {
                e.reset()
            })
        }
        update() {
            if (this.paused) return
            this.time++
            if (this.time > this.length) {
                if (this.loop) { this.time = 0; this.onLoop?.(); }
                else {
                    this.time = this.length; this.onComplete?.()
                    this.destroy(); return
                }
            }

            const t = this.time
            for (const tr of this.tracks) tr.update(t)
        }
        process() {
            return this.time / this.length
        }
        draw() {
            // draw time line process bar
            const thickness = 14
            const pos = Math.min(1, Math.sin(this.process() * Math.PI) * 8) * thickness
            ctx0.fillStyle = 'black'
            ctx0.fillRect(0, H - pos, W, thickness)
            ctx0.fillStyle = 'rgba(0,128,255,1)'
            ctx0.fillRect(0, H - pos, this.process() * W, thickness)
        }
        destroy() {
            console.log('destroying')
            if (this.finished) return
            this.finished = true
            // 親の updateList から自分を除去
            const parent = this.master
            GM.setTagPause('CSStop', false)

            parent.removeByTag('eventStopper')
            /* sss */
        }
    }

    // ========= KeyframeTrack（keys/steps対応）=========
    // keys: [{t:0, v:100, ease:ease.outQuad}, {t:60, v:250}, {t:90, v:250, interpolation:'hold'}]
    class KeyframeTrack {
        // getter/setter か、target & path（"position.x"みたいな）を渡す
        constructor({
            getter, setter,
            target = null, path = null,
            keys = [],                 // 時間はtimeline基準のフレーム/カウント
            defaultEase = ease.linear, // 未指定キーの補間
        }) {
            // アクセス方法を用意
            if (!getter || !setter) {
                if (!target || !path) throw new Error("KeyframeTrack: getter/setter か target+path を渡してね")
                const parts = path.split(".")
                getter = () => parts.reduce((o, k) => o[k], target)
                setter = (val) => {
                    const last = parts.slice(0, -1).reduce((o, k) => o[k], target)
                    last[parts[parts.length - 1]] = val
                }
            }
            this.getter = getter
            this.setter = setter
            // キーを t 昇順に
            this.keys = keys.slice().sort((a, b) => a.t - b.t)
            this.defaultEase = defaultEase
            this._lastIndex = -1; // step/hook用で必要なら使う
        }
        reset() {
            this._lastIndex = -1
        }

        update(t) {
            if (this.keys.length === 0) return

            // 範囲外（前/後）
            if (t <= this.keys[0].t) {
                this.setter(this.keys[0].v, this.getter())
                return
            }
            const K = this.keys
            const last = K[K.length - 1]
            if (t >= last.t) {
                this.setter(last.v, this.getter())
                return
            }

            // 区間を探す（t_i <= t < t_{i+1}）
            let i = (this._lastIndex >= 0 && this._lastIndex < K.length - 1) ? this._lastIndex : 0

            // 前フレームからの継続探索をするなら _lastIndex を使って微最適化も可
            for (; i < K.length - 1; i++) {
                if (t >= K[i].t && t < K[i + 1].t) break
            }

            this._lastIndex = i

            const key0 = K[i], key1 = K[i + 1]

            // ステップ（hold）指定があれば v = k0.v で維持
            if (key0.interpolation === "hold") {
                this.setter(key0.v, this.getter())
                return
            }

            // 線形 or イージング補間
            const ease = key0.ease || this.defaultEase
            const span = Math.max(1, (key1.t - key0.t)) // 0で割ることを防ぐ
            let process = clamp01((t - key0.t) / span)
            process = ease(process)

            const v = lerp(key0.v, key1.v, process)
            this.setter(v, this.getter())
        }
    }

    const BlockDefs_ByName = {
        WOOD: 1,
        STONE: 2,
        GRASS: 3,
        SP: 4,
        LIGHT: 5,
        FABRIC: 6,
    }


    class Chunk {
        constructor(cx, cy, cz, chunkSize = 16) {
            this.cx = cx
            this.cy = cy
            this.cz = cz
            this.chunkSize = chunkSize
            this.size = chunkSize

            this.data = new Uint8Array(chunkSize * chunkSize * chunkSize)

            this._isEmpty = true
            this.isDirty = false
            this.lastAccessFrame = 0

            this.state = 'empty'
            this.coarseSize = 4
            this.coarseGrid = this.size / this.coarseSize
            this.coarseMask = new Uint8Array(this.coarseGrid * this.coarseGrid * this.coarseGrid)
        }

        index(lx, ly, lz) {
            return lx + ly * this.chunkSize + lz * this.chunkSize * this.chunkSize
        }

        get(lx, ly, lz) {
            return this.data[this.index(lx, ly, lz)]
        }

        set(lx, ly, lz, id) {
            this.data[this.index(lx, ly, lz)] = id
            this.isDirty = true
            if (id !== 0) this._isEmpty = false
        }

        rebuildSpatialCache() {
            const s = this.size
            const coarseSize = this.coarseSize
            const coarseGrid = this.coarseGrid

            this.coarseMask.fill(0)

            let solidCount = 0
            const total = s * s * s

            for (let z = 0; z < s; z++) {
                for (let y = 0; y < s; y++) {
                    for (let x = 0; x < s; x++) {
                        const id = this.get(x, y, z)
                        if (id === 0) continue

                        solidCount++

                        const cgx = (x / coarseSize) | 0
                        const cgy = (y / coarseSize) | 0
                        const cgz = (z / coarseSize) | 0
                        const idx = cgx + cgy * coarseGrid + cgz * coarseGrid * coarseGrid
                        this.coarseMask[idx] = 1
                    }
                }
            }

            if (solidCount === 0) {
                this.state = 'empty'
            } else if (solidCount === total) {
                this.state = 'full'
            } else {
                this.state = 'mixed'
            }

            this._isEmpty = (solidCount === 0)
        }



        isEmpty() {
            return this._isEmpty
        }
    }

    class ChunkWorld {
        constructor({
            chunkSize = 16,
            minY = -16,
            maxY = 31,
            seed = 12345,
            autoGenerate = true,
        } = {}) {
            this.chunkSize = chunkSize
            this.minY = minY
            this.maxY = maxY
            this.seed = seed
            this.autoGenerate = autoGenerate

            this.block_size = 1

            this.chunks = new Map()
            this.emptyChunkCache = new Map()

            // 既存互換
            this.brickRefs = new Map()
            this.brickPool = new BrickPool()

            this.pillarCellSize = 24

        }

        hashInt(n) {
            n = (n ^ 61) ^ (n >>> 16)
            n = n + (n << 3)
            n = n ^ (n >>> 4)
            n = Math.imul(n, 0x27d4eb2d)
            n = n ^ (n >>> 15)
            return n >>> 0
        }

        hash2Cell(cx, cz, seed = 0) {
            return this.hashInt(cx * 73856093 ^ cz * 19349663 ^ seed * 83492791)
        }

        getPillarForCell(cellX, cellZ) {
            const h1 = this.hash2Cell(cellX, cellZ, this.seed)
            const h2 = this.hash2Cell(cellX, cellZ, this.seed + 17)
            const h3 = this.hash2Cell(cellX, cellZ, this.seed + 31)
            const h4 = this.hash2Cell(cellX, cellZ, this.seed + 47)

            const baseX = cellX * this.pillarCellSize
            const baseZ = cellZ * this.pillarCellSize

            // セル中央寄りにずらす
            const margin = 20
            const usable = this.pillarCellSize - margin * 2

            const px = baseX + margin + (h1 % usable)
            const pz = baseZ + margin + (h2 % usable)

            const radius = 4 + (h3 % 4)      // 4..7
            const topY = 18 + (h4 % 36)      // 18..53
            const baseY = -3                 // 地面基準

            return { px, pz, radius, baseY, topY }
        }
        floorDiv(n, d) {
            return Math.floor(n / d)
        }

        mod(n, d) {
            return ((n % d) + d) % d
        }

        key(x, y, z) {
            return `${x},${y},${z}`
        }

        getChunkKey(cx, cy, cz) {
            return `${cx},${cy},${cz}`
        }

        worldToChunk(x, y, z) {
            return {
                cx: this.floorDiv(x, this.chunkSize),
                cy: this.floorDiv(y, this.chunkSize),
                cz: this.floorDiv(z, this.chunkSize),
            }
        }

        worldToLocal(x, y, z) {
            return {
                lx: this.mod(x, this.chunkSize),
                ly: this.mod(y, this.chunkSize),
                lz: this.mod(z, this.chunkSize),
            }
        }

        toChunkCoords(x, y, z) {
            return {
                ...this.worldToChunk(x, y, z),
                ...this.worldToLocal(x, y, z),
            }
        }

        inBounds(x, y, z) {
            return y >= this.minY && y <= this.maxY
        }

        // chunk management
        getChunk(cx, cy, cz) {
            return this.chunks.get(this.getChunkKey(cx, cy, cz)) ?? null
        }

        hasChunk(cx, cy, cz) {
            return this.chunks.has(this.getChunkKey(cx, cy, cz))
        }

        rebuildChunkCache(cx, cy, cz) {
            const chunk = this.getChunk(cx, cy, cz)
            if (!chunk) return null

            chunk.rebuildSpatialCache()

            const key = this.getChunkKey(cx, cy, cz)
            this.emptyChunkCache.set(key, chunk.state === 'empty')
            return chunk
        }

        rebuildChunkCacheByWorldPos(x, y, z) {
            const { cx, cy, cz } = this.worldToChunk(x, y, z)
            return this.rebuildChunkCache(cx, cy, cz)
        }


        registerChunk(chunk) {
            const key = this.getChunkKey(chunk.cx, chunk.cy, chunk.cz)
            this.chunks.set(key, chunk)
            this.emptyChunkCache.set(key, chunk.state === 'empty')
        }

        unloadChunk(cx, cy, cz) {
            const key = this.getChunkKey(cx, cy, cz)
            this.chunks.delete(key)
        }

        getChunkBounds(cx, cy, cz) {
            const s = this.chunkSize
            return {
                minX: cx * s,
                minY: cy * s,
                minZ: cz * s,
                maxX: (cx + 1) * s,
                maxY: (cy + 1) * s,
                maxZ: (cz + 1) * s,
            }
        }

        hash2D(x, z, seed) {
            let h = (x * 374761393 + z * 668265263 + seed * 1442695041) | 0
            h = (h ^ (h >>> 13)) | 0
            h = Math.imul(h, 1274126177)
            h = (h ^ (h >>> 16)) >>> 0
            return h / 4294967295
        }

        sampleTerrainHeight(x, z) {
            const n1 = this.hash2D(x, z, this.seed)
            const n2 = this.hash2D(x * 3, z * 3, this.seed + 17)
            return Math.floor(6 + n1 * 5 + n2 * 2)
        }


        // empty, solid + missing

        evaluateChunkOccupancy(cx, cy, cz) {
            const bounds = this.getChunkBounds(cx, cy, cz)

            if (bounds.maxY - 1 < this.minY || bounds.minY > this.maxY) {
                return 'empty'
            }

            const minCellX = Math.floor(bounds.minX / this.pillarCellSize)
            const maxCellX = Math.floor((bounds.maxX - 1) / this.pillarCellSize)
            const minCellZ = Math.floor(bounds.minZ / this.pillarCellSize)
            const maxCellZ = Math.floor((bounds.maxZ - 1) / this.pillarCellSize)

            for (let cellX = minCellX; cellX <= maxCellX; cellX++) {
                for (let cellZ = minCellZ; cellZ <= maxCellZ; cellZ++) {
                    const pillar = this.getPillarForCell(cellX, cellZ)

                    // y 範囲が柱高さと交差しないなら無視
                    if (pillar.topY < bounds.minY || pillar.baseY > bounds.maxY - 1) {
                        continue
                    }

                    // xz 範囲が柱円柱の外なら無視
                    const nearestX = Math.max(bounds.minX, Math.min(pillar.px, bounds.maxX - 1))
                    const nearestZ = Math.max(bounds.minZ, Math.min(pillar.pz, bounds.maxZ - 1))
                    const dx = nearestX - pillar.px
                    const dz = nearestZ - pillar.pz

                    if (dx * dx + dz * dz <= pillar.radius * pillar.radius) {
                        return 'solid'
                    }
                }
            }

            return 'empty'
        }
        isChunkDefinitelyEmpty(cx, cy, cz) {
            const key = this.getChunkKey(cx, cy, cz)

            if (this.hasChunk(cx, cy, cz)) {
                return this.getChunk(cx, cy, cz).state === 'empty'
            }

            if (this.emptyChunkCache.has(key)) {
                return this.emptyChunkCache.get(key)
            }

            const empty = this.evaluateChunkOccupancy(cx, cy, cz) === 'empty'
            this.emptyChunkCache.set(key, empty)
            return empty
        }



        // Chunkの確認
        ensureChunk(cx, cy, cz) {
            let chunk = this.getChunk(cx, cy, cz)
            if (chunk) return chunk

            if (!this.autoGenerate) return null
            if (this.isChunkDefinitelyEmpty(cx, cy, cz)) return null

            chunk = this.generateChunk(cx, cy, cz)
            this.registerChunk(chunk)
            return chunk
        }
        ensureChunkForWrite(cx, cy, cz) {
            let chunk = this.getChunk(cx, cy, cz)
            if (chunk) return chunk

            if (this.autoGenerate) {
                chunk = this.generateChunk(cx, cy, cz)
            } else {
                chunk = new Chunk(cx, cy, cz, this.chunkSize)
            }

            this.registerChunk(chunk)
            return chunk
        }

        ensureChunkByWorldPos(x, y, z) {
            const { cx, cy, cz } = this.worldToChunk(x, y, z)
            return this.ensureChunk(cx, cy, cz)
        }

        // procedural generate, fill Chunk.data
        chunkHasTerrain(cx, cz) {
            const n = this.hash2D(cx * 9283, cz * 6899, this.seed)
            return n > 0.72
        }
        generateChunk(cx, cy, cz) {
            const chunk = new Chunk(cx, cy, cz, this.chunkSize)
            const bounds = this.getChunkBounds(cx, cy, cz)

            const minCellX = Math.floor(bounds.minX / this.pillarCellSize)
            const maxCellX = Math.floor((bounds.maxX - 1) / this.pillarCellSize)
            const minCellZ = Math.floor(bounds.minZ / this.pillarCellSize)
            const maxCellZ = Math.floor((bounds.maxZ - 1) / this.pillarCellSize)

            for (let cellX = minCellX; cellX <= maxCellX; cellX++) {
                for (let cellZ = minCellZ; cellZ <= maxCellZ; cellZ++) {
                    const pillar = this.getPillarForCell(cellX, cellZ)

                    if (pillar.topY < bounds.minY || pillar.baseY > bounds.maxY - 1) {
                        continue
                    }

                    for (let x = bounds.minX; x < bounds.maxX; x++) {
                        for (let z = bounds.minZ; z < bounds.maxZ; z++) {
                            const dx = x - pillar.px
                            const dz = z - pillar.pz
                            if (dx * dx + dz * dz > pillar.radius * pillar.radius) continue

                            for (let y = bounds.minY; y < bounds.maxY; y++) {
                                if (!this.inBounds(x, y, z)) continue
                                if (y < pillar.baseY || y > pillar.topY) continue

                                let id = 2
                                if (y === pillar.topY) id = 3

                                const { lx, ly, lz } = this.worldToLocal(x, y, z)
                                chunk.set(lx, ly, lz, id)
                            }
                        }
                    }
                }
            }

            chunk.rebuildSpatialCache()
            return chunk
        }


        // Voxel API
        get(x, y, z) {
            if (!this.inBounds(x, y, z)) return 0

            const { cx, cy, cz, lx, ly, lz } = this.toChunkCoords(x, y, z)
            const chunk = this.ensureChunk(cx, cy, cz)
            if (!chunk) return 0
            //
            return chunk.get(lx, ly, lz)
        }

        set(x, y, z, id) {
            if (!this.inBounds(x, y, z)) return

            const { cx, cy, cz, lx, ly, lz } = this.toChunkCoords(x, y, z)
            const chunk = this.ensureChunkForWrite(cx, cy, cz)

            chunk.set(lx, ly, lz, id)
            this.rebuildChunkCache(cx, cy, cz)
        }

        clearBlock(x, y, z) {
            if (!this.inBounds(x, y, z)) return

            const { cx, cy, cz, lx, ly, lz } = this.toChunkCoords(x, y, z)
            const chunk = this.getChunk(cx, cy, cz)
            if (!chunk) return

            chunk.set(lx, ly, lz, 0)
            this.rebuildChunkCache(cx, cy, cz)
        }


        isSolid(x, y, z) {
            return this.get(x, y, z) !== 0
        }
        getChunkState(cx, cy, cz) {
            const chunk = this.getChunk(cx, cy, cz)
            if (chunk) return chunk.state
            return this.isChunkDefinitelyEmpty(cx, cy, cz) ? 'empty' : 'missing'
        }

        // End of Voxel API

        //
        getBrickRef(x, y, z) {
            if (!this.inBounds(x, y, z)) return -1
            return this.brickRefs.get(this.key(x, y, z)) ?? -1
        }

        setBrickRef(x, y, z, ref) {
            if (!this.inBounds(x, y, z)) return
            const k = this.key(x, y, z)
            if (ref < 0) this.brickRefs.delete(k)
            else this.brickRefs.set(k, ref)
        }

        getBrick(x, y, z) {
            const ref = this.getBrickRef(x, y, z)
            if (ref < 0) return null
            return this.brickPool.get(ref)
        }

        setSpecialBlock(x, y, z, blockId, brick) {
            this.set(x, y, z, blockId)
            const ref = this.brickPool.add(brick)
            this.setBrickRef(x, y, z, ref)
        }

        // Physic AABB
        moveAxisCheck_CenterType(position3, axis, delta, size3D, target = null) {
            const block = 1
            const pw = size3D.x
            const ph = size3D.y
            const pd = size3D.z

            const np = { x: position3.x, y: position3.y, z: position3.z }
            np[axis] += delta

            const eps = 0.001
            const minX = Math.floor((np.x - pw / 2) / block)
            const maxX = Math.floor((np.x + pw / 2 - eps) / block)
            const minY = Math.floor((np.y - ph / 2) / block)
            const maxY = Math.floor((np.y + ph / 2 - eps) / block)
            const minZ = Math.floor((np.z - pd / 2) / block)
            const maxZ = Math.floor((np.z + pd / 2 - eps) / block)

            for (let bx = minX; bx <= maxX; bx++) {
                for (let by = minY; by <= maxY; by++) {
                    for (let bz = minZ; bz <= maxZ; bz++) {
                        if (!this.isSolid(bx, by, bz)) continue
                        if (target && target.x === bx && target.y === by && target.z === bz) continue

                        if (axis === 'x') {
                            if (delta > 0) position3[axis] = bx * block - pw / 2 - eps
                            if (delta < 0) position3[axis] = (bx + 1) * block + pw / 2 + eps
                        } else if (axis === 'y') {
                            if (delta > 0) position3[axis] = by * block - ph / 2 - eps
                            if (delta < 0) position3[axis] = (by + 1) * block + ph / 2 + eps
                        } else if (axis === 'z') {
                            if (delta > 0) position3[axis] = bz * block - pd / 2 - eps
                            if (delta < 0) position3[axis] = (bz + 1) * block + pd / 2 + eps
                        }

                        return 0
                    }
                }
            }

            position3[axis] += delta
            return delta
        }


        // test
        fillTestGround(world, maxX = 48, maxZ = 48) {
            for (let x = 0; x < maxX; x++) {
                for (let z = 0; z < maxZ; z++) {
                    world.set(x, -2, z, 2); // STONE
                }
            }

            for (let x = 4; x < maxX - 4; x++) {
                for (let z = 4; z < maxZ - 4; z++) {
                    world.set(x, -1, z, 1); // 土とか草とか
                }
            }
        }
    }



    // micro vexel 8x8
    class Brick8 {
        constructor(fill = 0) {
            this.size = 8
            this.data = new Uint8Array(8 * 8 * 8)
            if (fill != 0) this.data.fill(fill)
        }
        index(x, y, z) {
            return x + y * 8 + z * 64
        }
        get(x, y, z) {
            return this.data[this.index(x, y, z)]
        }

        set(x, y, z, v) {
            this.data[this.index(x, y, z)] = v
        }

        serialize() {
            return {
                data: Array.from(this.data),
            };
        }

        static deserialize(src) {
            const brick = new Brick8(0);
            brick.data.set(src.data);
            return brick;
        }
    }

    // Brick model の倉庫
    // Brick = MicroVoxelで構成された「1ブロック分の形状データ」
    class BrickPool {
        constructor() {
            this.items = []
        }
        add(brick) {
            const id = this.items.length
            this.items.push(brick)
            return id
        }

        get(id) {
            return this.items[id] ?? null
        }

        serialize() {
            return this.items.map(brick => brick.serialize());
        }

        static deserialize(srcList) {
            const pool = new BrickPool();
            for (const src of srcList) {
                pool.add(Brick8.deserialize(src));
            }
            return pool;
        }


        static forEach8x8BrickVoxel2(brick, fn) {
            for (let z = 0; z < 8; z++) {
                for (let y = 0; y < 8; y++) {
                    for (let x = 0; x < 8; x++) {
                        fn(brick, x, y, z)
                    }
                }
            }
        }
        static cx(x) {
            return x - 3.5
        }

        static cy(y) {
            return y - 3.5
        }

        static cz(z) {
            return z - 3.5
        }
        static Function8x8Brick = {
            0: {//desk
                f: (brick, x, y, z) => {
                    const dx = x - 3.5
                    const dz = z - 3.5
                    const top = (dx * dx + dz * dz <= 10) && (y === 5)
                    const pole = (x >= 3 && x <= 4) && (z >= 3 && z <= 4) && (y >= 1 && y <= 4)
                    const base = (dx * dx + dz * dz <= 4) && (y === 0)

                    if (top || pole || base) {
                        brick.set(x, y, z, BlockDefs_ByName.WOOD)
                    }
                }
            },
            1: {
                f: (brick, x, y, z) => {

                    const leg =
                        ((x === 1 || x === 6) && (z === 1 || z === 6) && y <= 3)

                    const seat =
                        (x >= 1 && x <= 6) &&
                        (z >= 1 && z <= 6) &&
                        y === 3

                    const back =
                        (z >= 5 && z <= 6) &&
                        (x >= 1 && x <= 6) &&
                        (y >= 4 && y <= 7)

                    if (leg || seat || back) {
                        brick.set(x, y, z, BlockDefs_ByName.WOOD)
                    }

                }
            },
            2: {
                f: (brick, x, y, z) => {
                    const counter =
                        x >= 0 && x <= 7 &&
                        z >= 0 && z <= 7 &&
                        y === 4

                    const basin =
                        x >= 2 && x <= 5 &&
                        z >= 2 && z <= 5 &&
                        y >= 2 && y <= 4

                    const faucet =
                        x >= 5 && x <= 6 &&
                        z >= 3 && z <= 4 &&
                        y >= 5 && y <= 7

                    if (counter) {
                        brick.set(x, y, z, BlockDefs_ByName.STONE)
                    }
                    if (basin && !(x === 2 || x === 5 || z === 2 || z === 5 || y === 2)) {
                        brick.set(x, y, z, 0)
                    } else if (basin) {
                        brick.set(x, y, z, BlockDefs_ByName.STONE)
                    }
                    if (faucet) {
                        brick.set(x, y, z, BlockDefs_ByName.STONE)
                    }
                }
            },
            3: {
                f: (brick, x, y, z) => {
                    if (x + y < 8) {
                        brick.set(x, y, z, 1)
                    }
                }
            },
            4: {
                f: (brick, x, y, z) => {
                    const dx = BrickPool.cx(x)
                    const dy = BrickPool.cy(y)
                    const dz = BrickPool.cz(z)

                    const d2 = dx * dx + dy * dy + dz * dz
                    const noise = Math.random() * 4 - 2

                    if (d2 <= 12 + noise) {
                        brick.set(x, y, z, 1)
                    }
                }
            }
        }

        static createRandom8x8Brick() {
            const brick = new Brick8(0)
            const seed = Math.random() * Object.keys(BrickPool.Function8x8Brick).length | 0
            BrickPool.forEach8x8BrickVoxel2(brick, BrickPool.Function8x8Brick[seed].f)
            return brick
        }



    }


    class CameraRCV extends GameObject {
        constructor(px = 10.5, py = 6.0, pz = 10.5, yaw = 0, pitch = -1, world) {
            super('cameraRCV', 'cameraRCV')
            this.position.set(px, py, pz)
            this.yaw = yaw
            this.pitch = pitch
            this.delta = new Vec3(0, 0, 0)
            this.nextDelta = new Vec3(0, 0, 0)
            this.vecForward = new Vec3(0, 0, 0)
            this.vecRight = new Vec3(0, 0, 0)
            this.vecUp = new Vec3(0, 0, 0)

            this.world = world
            this.fovDeg = 80

            this.tanHalfY = Math.tan(this.fovDeg * Math.PI / 360)
            this.moveSpeed = 0.04
            this.rotSpeed = 1



        }

        controller() {
            // update for rendering
            this.vecForward = Vec3.fromYawPitch(this.yaw, this.pitch)
            this.vecRight = this.vecForward.cross(new Vec3(0, 1, 0)).norm()
            this.vecUp = this.vecRight.cross(this.vecForward)



            //controller


            let PRes = 0 // acc-result of key pressing
            if (keys.turnLeft.pressed) PRes--
            if (keys.turnRight.pressed) PRes++
            if (PRes > 0) {
                this.yaw -= this.rotSpeed
            } else if (PRes < 0) {
                this.yaw += this.rotSpeed
            }
            if (this.yaw > 360)
                this.yaw = 0
            else if (this.yaw < 0)
                this.yaw = 360


            PRes = 0
            if (keys.turnDown.pressed) PRes--
            if (keys.turnUp.pressed) PRes++
            if (PRes > 0) {
                this.pitch = Math2.clamp(this.pitch - this.rotSpeed, -89.5, 89.5)
            } else if (PRes < 0) {
                this.pitch = Math2.clamp(this.pitch + this.rotSpeed, -89.5, 89.5)
            }



            const dirForward = Vec3.fromYawPitch(this.yaw, 0); // -Z基準ではなく、既に前方
            // スクリーン座標系（右・上）
            const worldUp = new Vec3(0, 1, 0)
            const dirRight = dirForward.cross(worldUp).norm()

            // XZ軸では、摩擦力MAX設定
            this.delta.x = 0
            this.delta.z = 0

            PRes = 0
            if (keys.left.pressed) { PRes -= 1 }
            if (keys.right.pressed) { PRes += 1 }
            if (PRes > 0)
                this.nextDelta = dirRight.mul(this.moveSpeed)
            else if (PRes < 0)
                this.nextDelta = dirRight.mul(-this.moveSpeed)
            else { this.nextDelta.reset() }
            this.delta.add(this.nextDelta)

            PRes = 0
            if (keys.up.pressed) { PRes += 1 }
            if (keys.down.pressed) { PRes -= 1 }
            if (PRes > 0)
                this.nextDelta = dirForward.mul(this.moveSpeed)
            else if (PRes < 0)
                this.nextDelta = dirForward.mul(-this.moveSpeed)
            else { this.nextDelta.reset() }
            this.delta.add(this.nextDelta)

            GameManager.emitEvent(eventID.ResolveMovement, this)

        }

        update() {
            this.controller()


        }



    }

    class RendererRCV {
        constructor(_currentCamera, _currentWorld, _canvas = canvas0, _statsEl = document.getElementById('fps')) {
            this.currentCamera = _currentCamera
            this.currentWorld = _currentWorld
            this.canvas = _canvas
            this.FPSstats = _statsEl
            this.ctx = this.canvas.getContext('2d', { alpha: false, desynchronized: true, willReadFrequently: true })
            this.lightDir = new Vec3(0.6, -0.8, 0.2).norm()
            this.worldUp = new Vec3(0, 1, 0)
            this.renderStartTime = 0
            this.internalScale = 4; // 解像度縮小（1=フル, 2=1/2, 4=1/4）
            this.zw = Math.floor(_canvas.width / this.internalScale)
            this.zh = Math.floor(_canvas.height / this.internalScale)
            this.zBuffer = new Float32Array(this.zw * this.zh)

            this.maxDistance = 100// Fogの強さにも影響
            this.maxSteps = 10
            this.showNormals = false
            this.exposure = 0.95
            this.skyTop = [0.35, 0.15, 0.25];
            this.skyHzn = [1.00, 0.55, 0.35];
            this.fogFactor = 0.5
            this.ambient = 0.0


        }
        draw() {
            const w = Math.floor(this.canvas.width / this.internalScale), h = Math.floor(this.canvas.height / this.internalScale)

            // カメラ基底ベクトル
            const dirForward = Vec3.fromYawPitch(this.currentCamera.yaw, this.currentCamera.pitch); // -Z基準ではなく、既に前方

            // スクリーン座標系（右・上）
            const worldUp = this.worldUp
            const dirRight = dirForward.cross(worldUp).norm()
            const dirUp = dirRight.cross(dirForward).norm()

            const fov = this.currentCamera.fovDeg * Math.PI / 180
            const halfW = Math.tan(fov / 2)
            const aspect = w / h

            this.zBuffer.fill(Infinity)

            // 画面の各ピクセルにレイ
            if (this.FPSstats) this.renderStartTime = performance.now()

            const _img = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height); // 直接フル解像度を塗る（拡大補間なし）

            for (let py_low = 0; py_low < h; py_low++) {
                const vy = (1 - 2 * (py_low + 0.5) / h) * halfW; // [-halfW, halfW]
                for (let px_low = 0; px_low < w; px_low++) {
                    const vx = (2 * (px_low + 0.5) / w - 1) * halfW * aspect

                    // レイ方向
                    const dir = new Vec3(
                        dirForward.x + dirRight.x * vx + dirUp.x * vy,
                        dirForward.y + dirRight.y * vx + dirUp.y * vy,
                        dirForward.z + dirRight.z * vx + dirUp.z * vy
                    ).norm()

                    const lightDir = dir // horror game light. no direct light!

                    const result = RendererRCV.raycastVoxel(dir, this.maxDistance, this.maxSteps, this.currentWorld, this.currentCamera)

                    let r, g, b
                    if (result.hit) {
                        // 面法線
                        const n = result.normal
                        // get Albedo
                        let col = RendererRCV.samlpleSurfaceColor_texture(
                            result.microId ?? result.id,
                            n,
                            result.hitPos
                        )

                        // 照明（ランバート）
                        const ndl = Math.max(0, -(n.x * lightDir.x + n.y * lightDir.y + n.z * lightDir.z))
                        let lit = this.ambient + (1 - this.ambient) * ndl
                        // 距離フォグ
                        const fogT = Math2.clamp(result.t / this.maxDistance * this.fogFactor, 0, 1)
                        const heightFogT = 0//Math2.clamp(result.hitPos.y / 20, 0, 1)
                        const sky = [
                            Math2.mix(this.skyHzn[0], this.skyTop[0], 0.5 - 0.5 * dir.y), // 視線が上なら空色を強く
                            Math2.mix(this.skyHzn[1], this.skyTop[1], 0.5 - 0.5 * dir.y),
                            Math2.mix(this.skyHzn[2], this.skyTop[2], 0.5 - 0.5 * dir.y)

            const tDeltaY = stepY !== 0 ? Math.abs(COARSE_SIZE / dir.y) : Infinity
            const tDeltaZ = stepZ !== 0 ? Math.abs(COARSE_SIZE / dir.z) : Infinity

            const localY = start.y - chunkMin.y
            const localZ = start.z - chunkMin.z

                : Math.floor(localY / COARSE_SIZE) * COARSE_SIZE

                : Math.floor(localZ / COARSE_SIZE) * COARSE_SIZE

                ? startT + Math.abs((chunkMin.x + coarseBoundaryX - start.x) / dir.x)
                : Infinity

            let tMaxY = stepY !== 0
                ? startT + Math.abs((chunkMin.y + coarseBoundaryY - start.y) / dir.y)
                : Infinity

            let tMaxZ = stepZ !== 0
                ? startT + Math.abs((chunkMin.z + coarseBoundaryZ - start.z) / dir.z)
                : Infinity

            let t = startT
            let coarseSteps = 0
            let currentEntryNormal = entryNormal ?? { x: 0, y: 0, z: 0 }

            while (t <= tEnd && t <= maxDistance && coarseSteps < maxCoarseSteps) {
                coarseSteps++

                if (
                    cgx < 0 || cgx >= COARSE_GRID ||
                    cgy < 0 || cgy >= COARSE_GRID ||
                    cgz < 0 || cgz >= COARSE_GRID
                ) {
                    break
                }

                const coarseMin = {
                    x: chunkMin.x + cgx * COARSE_SIZE,
                    y: chunkMin.y + cgy * COARSE_SIZE,
                    z: chunkMin.z + cgz * COARSE_SIZE,
                }

                const coarseMax = {
                    x: coarseMin.x + COARSE_SIZE - 1,
                    y: coarseMin.y + COARSE_SIZE - 1,
                    z: coarseMin.z + COARSE_SIZE - 1,
                }

                const nextT = Math.min(tMaxX, tMaxY, tMaxZ, tEnd, maxDistance)

                // coarse occupancy があるセルだけ fine DDA
                if (RendererRCV._chunkHasSolidInCoarseCell(
                    chunk,
                    cgx,
                    cgy,
                    cgz
                )) {
                    const fineHit = RendererRCV._raycastVoxel_InCoarseCell(
                        origin,
                        dir,
                        t,
                        nextT,
                        maxDistance,
                        maxFineSteps,
                        world,
                        coarseMin,
                        coarseMax,
                        currentEntryNormal
                    )

                    if (fineHit.hit) return fineHit
                }

                const axis = RendererRCV._pickAxisStable(tMaxX, tMaxY, tMaxZ)

                if (axis === 'x') {
                    cgx += stepX
                    t = tMaxX
                    tMaxX += tDeltaX
                    currentEntryNormal = { x: -stepX, y: 0, z: 0 }
                } else if (axis === 'y') {
                    cgy += stepY
                    t = tMaxY
                    tMaxY += tDeltaY
                    currentEntryNormal = { x: 0, y: -stepY, z: 0 }
                } else {
                    cgz += stepZ
                    t = tMaxZ
                    tMaxZ += tDeltaZ
                    currentEntryNormal = { x: 0, y: 0, z: -stepZ }
                }
            }

            return { hit: false, t: tEnd }
        }


        // just enjoy making static method. help me to figure out the coupling
        static fillImageData(_canvas, _imgData,
            _internalScale, px_low, py_low,//低解像度x,y座標
            r, g, b, a = 255) {
            // 書き込み（内部縮小→スケール描画：最近傍）
            // ここでは直接フル解像度に nearest 拡大して塗る
            const x0 = px_low * _internalScale | 0, y0 = py_low * _internalScale | 0

            // fill rectangle
            for (let iy = 0; iy < _internalScale; iy++) {
                let RGBAoffset = ((y0 + iy) * _canvas.width + x0) * 4
                for (let ix = 0; ix < _internalScale; ix++) {
                    _imgData[RGBAoffset] = Math.max(0, Math.min(255, (r * 255) | 0))
                    _imgData[RGBAoffset + 1] = Math.max(0, Math.min(255, (g * 255) | 0))
                    _imgData[RGBAoffset + 2] = Math.max(0, Math.min(255, (b * 255) | 0))
                    _imgData[RGBAoffset + 3] = 255
                    RGBAoffset += 4
                }
            }
        }



        // 書き込み（内部縮小→スケール描画：最近傍）
        static fillImageData_withDepth(_canvas, _imgData,
            _zBuffer, zw, zh, _zDepth,// z-buffer scale
            _internalScale, px_low, py_low,//低解像度x,y座標
            r, g, b, a = 255) {

            if (a <= 0) return
            // working on...fill z-Buffer
            const i = zw * py_low + px_low
            // Big = Far
            if (_zBuffer[i] <= _zDepth) return
            _zBuffer[i] = _zDepth

            // ここでは直接フル解像度に nearest 拡大して塗る
            const x0 = px_low * _internalScale | 0, y0 = py_low * _internalScale | 0
            for (let iy = 0; iy < _internalScale; iy++) {
                let RGBAoffset = ((y0 + iy) * _canvas.width + x0) * 4
                for (let ix = 0; ix < _internalScale; ix++) {
                    _imgData[RGBAoffset] = Math.max(0, Math.min(255, r))
                    _imgData[RGBAoffset + 1] = Math.max(0, Math.min(255, g))
                    _imgData[RGBAoffset + 2] = Math.max(0, Math.min(255, b))
                    _imgData[RGBAoffset + 3] = Math.max(0, Math.min(255, a))
                    RGBAoffset += 4
                }
            }
        }




        // Triplanar mapping!
        // ray → hit → material → color → light → write
        static normalToFace(normal) {
            if (normal.x > 0) return "PX";
            if (normal.x < 0) return "NX";
            if (normal.y > 0) return "PY";
            if (normal.y < 0) return "NY";
            if (normal.z > 0) return "PZ";
            return "NZ";
        }
        static faceUV(face, pos) {
            const fx = Math2.fract(pos.x);
            const fy = Math2.fract(pos.y);
            const fz = Math2.fract(pos.z);

            // ここは「どの軸を面内の u/v に使うか」だけ決める場所
            // v の上下反転は好み/テクスチャ原点次第なので必要なら統一してここでやる
            switch (face) {
                case "PX": return { u: fz, v: 1 - fy };
                case "NX": return { u: fz, v: 1 - fy };
                case "PY": return { u: fz, v: fx };
                case "NY": return { u: fz, v: fx };
                case "PZ": return { u: fx, v: 1 - fy };
                case "NZ": return { u: fx, v: 1 - fy };
            }
        }
        static sampleRGB(tex, size, u, v) {
            const s = RendererRCV.UVTextureSampleRGB(tex, u, v, size);
            return [s.r / 255, s.g / 255, s.b / 255];
        }
        static samlpleSurfaceColor_texture(id/*blockId*/, normal, pos/*hit world position*/) {
            // ブロックごとのベース色（sRGB→linearっぽく扱う簡易）
            const _face = RendererRCV.normalToFace(normal)
            const def = BlockDefs[id] ?? { DEFAULT: { color: [0.8, 0.0, 0.8] } };

            // check texture for current face
            let mat = def[_face] ?? def.SIDE ?? def.DEFAULT ?? { color: [1, 0.0, 1] }
            if (mat.tex) {
                const { u, v } = RendererRCV.faceUV(_face, pos)
                return RendererRCV.sampleRGB(mat.tex, mat.size, u, v);
            }
            return mat.color ?? [0.8, 0.0, 0.8];

        }


        static UVSamplingRGBA(tex, u, v, texSizeX, texSizeY = texSizeX) {
            const U = Math.floor(u * texSizeX)
            const V = Math.floor(v * texSizeY)
            return {
                r: tex[V * texSizeX + U],
                g: tex[V * texSizeX + U + 1],
                b: tex[V * texSizeX + U + 2],
                a: 255,
            }
        }
        static UVSamplingBWA(tex, u, v, texSizeX, texSizeY = texSizeX) {
            const U = Math.floor(u * texSizeX)
            const V = Math.floor(v * texSizeY)
            const c = tex[V * texSizeX + U]
            if (c >= 0) {
                return {
                    r: c,
                    g: c,
                    b: c,
                    a: 255,
                }
            } else {
                return {
                    r: 0,
                    g: 0,
                    b: 0,
                    a: 0,
                }
            }
        }

        static verticesProjection(p/*target vertex*/, s_p/*screen position to return*/, _cameraRCV) {

            const camForward = _cameraRCV.vecForward
            const camRight = _cameraRCV.vecRight
            const camUp = _cameraRCV.vecUp

            const vector = p.clone().sub(_cameraRCV.position)
            // camera coord
            const project = new Vec3(
                vector.dot(camRight), vector.dot(camUp), vector.dot(camForward)
            )

            // 近すぎる
            if (project.z <= 1e-6) return


            // clip coord

            const tanHalfY = _cameraRCV.tanHalfY
            const tanHalfX = tanHalfY * W / H
            project.set(
                project.x / (tanHalfX * project.z),
                project.y / (tanHalfY * project.z),
                project.z)


            // そのまま上書きする?
            return s_p.set(
                (project.x * 0.5 + 0.5) * W,
                (0.5 - project.y * 0.5) * H,
                project.z)


        }

        static UVTextureSample(_tex, u/*0.0~1.0*/, v/*0.0~1.0*/, _texSampleSize) {
            const U = Math.floor(u * (_texSampleSize - 1))
            const V = Math.floor(v * (_texSampleSize - 1))
            return _tex[V * _texSampleSize + U]
        }

        static UVTextureSampleRGB(_tex, u/*0.0~1.0*/, v/*0.0~1.0*/, _texSampleSize) {
            const U = Math.floor(u * (_texSampleSize - 1))
            const V = Math.floor(v * (_texSampleSize - 1))
            const i = (V * _texSampleSize + U) * 3
            return {
                r: _tex[i],
                g: _tex[i + 1],
                b: _tex[i + 2]
            }
        }

        static UVTextureSampleRGB(_tex, u/*0.0~1.0*/, v/*0.0~1.0*/, _texSampleSize) {
            const U = Math.floor(u * (_texSampleSize - 1))
            const V = Math.floor(v * (_texSampleSize - 1))
            const i = (V * _texSampleSize + U) * 3
            return {
                r: _tex[i],
                g: _tex[i + 1],
                b: _tex[i + 2]
            }
        }

        static UVTextureSampleRGBA(_tex, _texSampleSize, u/*0.0~1.0*/, v/*0.0~1.0*/,) {
            const U = Math.floor(u * (_texSampleSize - 1));
            const V = Math.floor(v * (_texSampleSize - 1));
            const i = (V * _texSampleSize + U) * 4;

            return {
                r: _tex[i],
                g: _tex[i + 1],
                b: _tex[i + 2],
                a: _tex[i + 3]
            };
        }

        // working on ... unfinished
        // なんか　internal Scale 繰り返しでやってるのが気になるし
        // UVのサンプリングも減ら減るはず。

        static drawRectSpriteRGBA(
            _canvas, _imgData,
            _tex, _texSampleSize,
            x0, x1, y0, y1,/*true screen coord*/_zDepth,
            _zBuffer, _zw, _zh,
            _internalScale = 4
        ) {

            const px0 = x0 / _internalScale | 0,
                px1 = x1 / _internalScale | 0,
                py0 = y0 / _internalScale | 0,
                py1 = y1 / _internalScale | 0


            if (px1 === px0 || py1 === py0) return

            const sx0 = Math.max(x0, 0) / _internalScale | 0,
                sx1 = Math.min(x1, _canvas.width) / _internalScale | 0,
                sy0 = Math.max(y0, 0) / _internalScale | 0,
                sy1 = Math.min(y1, _canvas.height) / _internalScale | 0
            const drawHeight = (sy1 - sy0)
            const drawWidth = (sx1 - sx0)

            if (drawHeight <= 0 || drawWidth <= 0) return

            for (let iy = 0; iy < drawHeight; iy += 1) {
                const v = (sy0 + iy - py0) / (py1 - py0) // FIX!!!
                for (let ix = 0; ix < drawWidth; ix += 1) {
                    const u = (sx0 + ix - px0) / (px1 - px0) // FIX!!!
                    //
                    const res = RendererRCV.UVTextureSampleRGBA(_tex, _texSampleSize, u, v)
                    //          
                    RendererRCV.fillImageData_withDepth(_canvas, _imgData,
                        _zBuffer, _zw, _zh, _zDepth,
                        _internalScale, sx0 + ix, sy0 + iy,
                        res.r, res.g, res.b, res.a)


                }
            }
            // put Image Data
        }

    }

    // RendererRCV の置き換え用

    //TODO: testRenderer 外部依存
    class SpriteRCV extends GameObject {
        constructor(x = 10, y = 3, z = 15, target, renderer, spriteImage = { tex: nicole_32RGB, size: 32 }) {
            super('raycastVoxel_sprite')
            this.renderer = renderer
            this.position.set(x, y, z)

            this.spriteSize = 128

            this.camera = target
            this.show = true
            this.showDot = false

        }

        projection() {
            RendererRCV.verticesProjection(this.position, this.screenPos, this.camera)
            // 画面描画領域計算
            this.size = this.spriteSize / this.screenPos.z
            this.sx0 = this.screenPos.x - this.size
            this.sx1 = this.screenPos.x + this.size
            this.sy0 = this.screenPos.y - this.size
            this.sy1 = this.screenPos.y + this.size
        }
        update() {
            this.projection()

        }

        draw(ctx = ctx0) {
            if (!this.show) return
            this.projection()

            // rendererRCV.renderRectangleSprite()

            const _img = ctx.getImageData(0, 0, canvas0.width, canvas0.height); // 直接フル解像度を塗る（拡大補間なし）
            const internalScale = this.renderer.internalScale

            RendererRCV.drawRectSpriteRGBA(
                canvas0, _img.data,

                this.sx0, this.sx1, this.sy0, this.sy1, this.screenPos.z,

                            Math.floor(this.screenPos.y / internalScale)

                    RendererRCV.fillImageData(canvas0, _img.data,
                        internalScale, px, py, 255, 0, 0)
                }
            }

            ctx.putImageData(_img, 0, 0)
        }
    }

    class BlockBuilder extends GameObject {
        constructor(_camera, _world) {

            this.world = _world;
            this.cooldown = 0;
            this.hitPos = null// プレビュー用の座標保持

            this.placePos = null;
            this.palette = [
                { label: 'WOOD', kind: 'normal', blockId: 1, brickRef: -1 },
                { label: 'STONE', kind: 'normal', blockId: 2, brickRef: -1 },

            //内部登録、これいいかも！

            }

            }

            }
