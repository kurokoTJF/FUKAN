<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Cockpit Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", sans-serif;
      background: #06080c;
      color: #e8eef7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(25, 52, 84, 0.45), transparent 55%),
        linear-gradient(180deg, #09111a 0%, #04070b 100%);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #divider {
      position: fixed;
      left: 0;
      right: 0;
      top: var(--top-view-split, 70%);
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(130, 220, 255, 0.85), transparent);
      box-shadow: 0 0 16px rgba(80, 190, 255, 0.45);
      pointer-events: none;
    }

    #hud {
      position: fixed;
      inset: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    .panel {
      max-width: min(520px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid rgba(140, 195, 255, 0.3);
      border-radius: 10px;
      background: rgba(5, 10, 18, 0.62);
      backdrop-filter: blur(6px);
      line-height: 1.45;
      font-size: 13px;
      white-space: pre-wrap;
    }

    #deviceHintLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    #hpHudLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }

    .hp-bar-panel {
      position: fixed;
      left: 50%;
      width: min(420px, calc(100vw - 48px));
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 10px;
      background: rgba(5, 10, 18, 0.55);
      border: 1px solid rgba(140, 195, 255, 0.26);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
    }

    .hp-bar-panel.enemy {
      top: 14px;
    }

    .hp-bar-panel.player {
      top: calc(var(--top-view-split, 70%) + 10px);
    }

    .hp-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #e9f6ff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .hp-bar-track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .hp-bar-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      transition: width 80ms linear;
    }

    .hp-bar-panel.enemy .hp-bar-fill {
      background: linear-gradient(90deg, #ff8a66 0%, #ff4d4d 100%);
      box-shadow: 0 0 14px rgba(255, 95, 95, 0.38);
    }

    .hp-bar-panel.player .hp-bar-fill {
      background: linear-gradient(90deg, #72d7ff 0%, #39a8ff 100%);
      box-shadow: 0 0 14px rgba(70, 170, 255, 0.34);
    }

    .device-hint {
      position: absolute;
      min-width: 180px;
      max-width: 240px;
      padding: 6px 8px;
      transform: translate(-50%, -100%);
    }

    .device-hint.below {
      transform: translate(-50%, 0);
    }

    .device-hint-title {
      margin-bottom: 6px;
      color: #e9f6ff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.65);
    }

    .device-hint-lines {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: center;
    }

    .device-hint-line {
      color: #b9cde0;
      font-size: 11px;
      line-height: 1.35;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.65);
    }

    .inline-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      color: #ffffff;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      text-shadow: none;
    }

    .arrow-icon {
      min-width: 22px;
      font-size: 12px;
      background: rgba(120, 190, 255, 0.18);
    }

    .line-text {
      display: inline-block;
    }

    .panel.bottom {
      align-self: flex-end;
      text-align: right;
      margin-bottom: 40px;
    }

    #licenseNotice {
      position: fixed;
      right: 16px;
      bottom: 16px;
      max-width: min(420px, calc(100vw - 32px));
      color: rgba(225, 236, 248, 0.78);
      font-size: 10px;
      line-height: 1.35;
      text-align: right;
      pointer-events: none;
      z-index: 7;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.75);
    }

    .title {
      color: #95d7ff;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js"
      }
    }
  </script>
</head>

    }

    return lamps;
  }

  function createGatlingIndicatorLamps(device) {
    if (device.id !== 'gatling') {
      return [];
    }

    const lamps = [];
    const columns = 5;
    const spacingX = 0.22;
    const spacingY = 0.18;
    const startX = -spacingX * ((columns - 1) * 0.5);
    const startY = -0.08;
    const frontZ = device.baseSize.z * 0.56;
    for (let index = 0; index < GATLING_LAMP_COUNT; index += 1) {
      const lampMaterial = new THREE.MeshStandardMaterial({
        color: 0x182028,
        emissive: 0x000000,
        roughness: 0.34,
        metalness: 0.32,
      });
      const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 12), lampMaterial);
      lamp.position.set(
        startX + spacingX * (index % columns),
        startY + spacingY * Math.floor(index / columns),
        frontZ
      );
      lamp.scale.z = 0.7;
      device.mount.add(lamp);
      lamps.push(lamp);
    }

    return lamps;
  }

  function isChargedPunchWindow(chargeSeconds) {
    return chargeSeconds >= PUNCH_CHARGE_SECONDS - PUNCH_CHARGE_ACCEPT_EARLY_SECONDS
      && chargeSeconds <= PUNCH_CHARGE_SECONDS + PUNCH_CHARGE_ACCEPT_LATE_SECONDS;
  }

  function hasPunchChargeLampLit(chargeSeconds) {
    return chargeSeconds >= (PUNCH_CHARGE_THRESHOLDS[0] ?? Number.POSITIVE_INFINITY);
  }

  function updateChargeIndicatorLamps(device, dt, disabled = false) {
    if (device.chargeLamps.length === 0) {
      return;
    }

    if (disabled) {
      const blinkVisible = Math.sin(performance.now() * 0.018) > 0;
      device.chargeLamps.forEach((lamp) => {
        const targetIntensity = blinkVisible ? 0.22 : 0.04;
        lamp.material.color.setHex(0x2a1b1b);
        lamp.material.emissive.setHex(0x7a1f1f);
        lamp.material.emissiveIntensity = damp(lamp.material.emissiveIntensity ?? 0, targetIntensity, 10, dt);
      });
      return;
    }

    const fourthBeatStart = PUNCH_CHARGE_SECONDS;
    const fourthBeatBlinking = device.chargeSeconds >= fourthBeatStart
      && device.chargeSeconds < fourthBeatStart + PUNCH_CHARGE_DISPLAY_FLASH_SECONDS;
    const blinkVisible = Math.sin(performance.now() * 0.03) > 0;

    device.chargeLamps.forEach((lamp, index) => {
      const lampThreshold = PUNCH_CHARGE_THRESHOLDS[index] ?? PUNCH_CHARGE_SECONDS;
      const isFourthLamp = index === device.chargeLamps.length - 1;
      const isLit = isFourthLamp && fourthBeatBlinking
        ? blinkVisible
        : device.chargeSeconds >= lampThreshold;
      const targetIntensity = isLit ? 1.8 : 0;
      const nextIntensity = damp(lamp.material.emissiveIntensity ?? 0, targetIntensity, 12, dt);
      lamp.material.color.setHex(isLit ? 0xbdefff : 0x1c2731);
      lamp.material.emissive.setHex(isLit ? 0x48bfff : 0x000000);
      lamp.material.emissiveIntensity = nextIntensity;
    });
  }

  function updatePunchStaminaLamps(device, staminaValue, canPunch, disabled, dt) {
    if (device.staminaLamps.length === 0) {
      return;
    }

    if (disabled) {
      const blinkVisible = Math.sin(performance.now() * 0.018) > 0;
      device.staminaLamps.forEach((lamp) => {
        lamp.material.color.setHex(0x221818);
        lamp.material.emissive.setHex(0x7a1f1f);
        lamp.material.emissiveIntensity = damp(lamp.material.emissiveIntensity ?? 0, blinkVisible ? 0.2 : 0.05, 10, dt);
      });
      return;
    }

    const litCount = Math.max(0, Math.min(device.staminaLamps.length, Math.floor(staminaValue + 0.0001)));
    device.staminaLamps.forEach((lamp, index) => {
      const isLit = index < litCount;
      const litColor = canPunch ? 0xb7f4ff : 0xffb38a;
      const emissiveColor = canPunch ? 0x39b7ff : 0xff6a1f;
      const targetIntensity = isLit ? (canPunch ? 1.55 : 0.85) : (canPunch ? 0.03 : 0.18);
      lamp.material.color.setHex(isLit ? litColor : 0x162028);
      lamp.material.emissive.setHex(isLit || !canPunch ? emissiveColor : 0x000000);
      lamp.material.emissiveIntensity = damp(lamp.material.emissiveIntensity ?? 0, targetIntensity, 12, dt);
    });
  }

  function updateMissileIndicatorLamps(device, armedDevices, dt) {
    if (device.indicatorLamps.length === 0) {
      return;
    }

    device.indicatorLamps.forEach((lamp, index) => {
      const armed = armedDevices[Math.floor(index / 2)]?.toggleOn === true;
      const targetIntensity = armed ? 1.6 : 0;
      lamp.material.color.setHex(armed ? 0xffd98a : 0x2b2016);
      lamp.material.emissive.setHex(armed ? 0xffa12a : 0x000000);
      lamp.material.emissiveIntensity = damp(lamp.material.emissiveIntensity ?? 0, targetIntensity, 12, dt);
    });
  }

  function updateGatlingIndicatorLamps(device, ammoCount, dt) {
    if (device.indicatorLamps.length === 0) {
      return;
    }

    const litCount = Math.max(0, Math.min(device.indicatorLamps.length, Math.floor(ammoCount / GATLING_AMMO_PER_LAMP)));
    device.indicatorLamps.forEach((lamp, index) => {
      const isLit = index < litCount;
      lamp.material.color.setHex(isLit ? 0xb8f0ff : 0x182028);
      lamp.material.emissive.setHex(isLit ? 0x3aa8ff : 0x000000);
      lamp.material.emissiveIntensity = damp(lamp.material.emissiveIntensity ?? 0, isLit ? 1.5 : 0, 12, dt);
    });
  }

  function createDevice(scene, spec) {
    const anchor = new THREE.Vector3(spec.anchor.x, spec.anchor.y, spec.anchor.z);
    const baseSize = new THREE.Vector3(spec.baseSize.x, spec.baseSize.y, spec.baseSize.z);
    const handleSize = new THREE.Vector3(spec.handleSize.x, spec.handleSize.y, spec.handleSize.z);
    const baseMaterial = new THREE.MeshStandardMaterial({ color: spec.baseColor, roughness: 0.75, metalness: 0.15 });
    const accentMaterial = new THREE.MeshStandardMaterial({ color: spec.accentColor, roughness: 0.55, metalness: 0.35, emissive: 0x000000 });

    const mount = new THREE.Group();
    mount.position.copy(anchor);

    const pedestal = new THREE.Mesh(new THREE.BoxGeometry(baseSize.x, baseSize.y, baseSize.z), baseMaterial);
    mount.add(pedestal);

    const handle = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.BoxGeometry(handleSize.x, handleSize.y, handleSize.z), accentMaterial);
    stem.position.y = spec.handleLift;
    handle.add(stem);

    const cap = new THREE.Mesh(new THREE.SphereGeometry(spec.capRadius, 18, 18), accentMaterial);
    cap.position.y = spec.handleLift + spec.capLift;
    handle.add(cap);

    mount.add(handle);

    const highlight = new THREE.Mesh(
      new THREE.BoxGeometry(baseSize.x + 0.12, baseSize.y + 0.08, baseSize.z + 0.12),
      new THREE.MeshStandardMaterial({ color: spec.accentColor, transparent: true, opacity: 0.12, roughness: 1 })
    );
    mount.add(highlight);

    scene.add(mount);

    return {
      ...spec,
      anchor,
      baseSize,
      handleSize,
      mount,
      handle,
      highlight,
      material: accentMaterial,
      inputX: 0,
      inputY: 0,
      outputX: 0,
      outputY: 0,
      triggerLatched: false,
      toggleLatched: false,
      toggleOn: false,
      toggleVisual: -1,
      chargeLatched: false,
      chargeSeconds: 0,
      rotationAccumulator: 0,
      lastAngle: null,
      chargeLamps: [],
      staminaLamps: [],
      indicatorLamps: [],
    };
  }

  function selectNearestDevice(devices, point, blockedDeviceId = null) {
    let best = null;
    let bestDistance = Infinity;
    for (const device of devices) {
      if (blockedDeviceId === device.id) {
        continue;
      }
      const dx = point.x - device.anchor.x;
      const dy = point.y - device.anchor.y;
      const distance = Math.hypot(dx, dy);
      if (distance < bestDistance) {
        bestDistance = distance;
        best = device;
      }
    }
    return best;
  }

  function selectNextDevice(devices, fromPoint, direction, currentId, blockedDeviceId) {
    let best = null;
    let bestScore = -Infinity;

    for (const device of devices) {
      if (device.id === currentId || device.id === blockedDeviceId) {
        continue;
      }

      const deltaX = device.anchor.x - fromPoint.x;
      const deltaY = device.anchor.y - fromPoint.y;
      const distance = Math.hypot(deltaX, deltaY);
      if (distance < 0.001) {
        continue;
      }

      const alignment = (deltaX / distance) * direction.x + (deltaY / distance) * direction.y;
      if (alignment < 0.35) {
        continue;
      }

      const score = alignment * 4 - distance;
      if (score > bestScore) {
        bestScore = score;
        best = device;
      }
    }

    return best;
  }

  function getDominantDirection(motion) {
    if (Math.abs(motion.x) < NAV_THRESHOLD && Math.abs(motion.y) < NAV_THRESHOLD) {
      return null;
    }

    if (Math.abs(motion.x) >= Math.abs(motion.y)) {
      return { x: Math.sign(motion.x), y: 0 };
    }

    return { x: 0, y: Math.sign(motion.y) };
  }

  function getTurnCommand(turnInputX, turnInputY) {
    if (Math.abs(turnInputX) < NAV_THRESHOLD && Math.abs(turnInputY) < NAV_THRESHOLD) {
      return { turnTargetAngle: null, turnSpin: 0 };
    }

    if (Math.abs(turnInputX) >= Math.abs(turnInputY)) {
      return {
        turnTargetAngle: null,
        turnSpin: turnInputX < 0 ? -1 : 1,
      };
    }

    return {
      turnTargetAngle: turnInputY > 0 ? 0 : Math.PI,
      turnSpin: 0,
    };
  }

  function describeHand(hand, deviceMap) {
    if (hand.deviceId) {
      return `gripping ${deviceMap.get(hand.deviceId).name}`;
    }
    if (hand.hoverId) {
      return `ready on ${deviceMap.get(hand.hoverId).name}`;
    }
    return 'free';
  }

  function getDeviceHintContent(deviceId) {
    const hintMap = {
      move: {
        title: '移動レバー',
        instructionLines: ['{HAND} 倒す 移動'],
      },
      leftTurn: {
        title: '方向転換',
        instructionLines: ['{HAND} ←→ 旋回', '{HAND} ↑↓ 向き変更'],
      },
      rightTurn: {
        title: '方向転換',
        instructionLines: ['{HAND} ←→ 旋回', '{HAND} ↑↓ 向き変更'],
      },
      turn: {
        title: '方向転換機',
        instructionLines: ['{HAND} ←→ 旋回', '{HAND} ↑↓ 向き変更'],
      },
      leftPunch: {
        title: '左パンチレバー',
        instructionLines: ['L ↓ ためる', 'L ↑ パンチ', 'L → ガード'],
      },
      rightPunch: {
        title: '右パンチレバー',
        instructionLines: ['R ↓ ためる', 'R ↑ パンチ', 'R ← ガード'],
      },
      missile: {
        title: 'ミサイルボタン',
        instructionLines: ['{HAND} ↓ 発射'],
      },
      missileArm1: {
        title: 'ミサイル解放1',
        instructionLines: ['{HAND} ←→ 選択', '{HAND} ↓ オン'],
      },
      missileArm2: {
        title: 'ミサイル解放2',
        instructionLines: ['{HAND} ←→ 選択', '{HAND} ↓ オン'],
      },
      missileArm3: {
        title: 'ミサイル解放3',
        instructionLines: ['{HAND} ←→ 選択', '{HAND} ↓ オン'],
      },
      gatling: {
        title: 'ガトリングレバー',
        instructionLines: ['{HAND} ↓ 連射'],
      },
      gatlingCrank: {
        title: '装填ハンドル',
        instructionLines: ['{HAND} 回す 装填'],
      },
    };
    return hintMap[deviceId] ?? { title: deviceId, instructionLines: [] };
  }

  function buildActiveDeviceHints(hands, deviceMap) {
    const topPlacementIds = new Set(['missileArm1', 'missileArm2', 'missileArm3', 'gatlingCrank']);
    const raisedBelowIds = new Set(['leftPunch', 'rightPunch', 'move']);
    return HAND_SIDES.flatMap((side) => {
      const hand = hands[side];
      if (!hand.deviceId) {
        return [];
      }

      const device = deviceMap.get(hand.deviceId);
      const hint = getDeviceHintContent(device.id);
      const handLabel = side === 'left' ? 'L' : 'R';
      const placeAbove = topPlacementIds.has(device.id);
      const offsetY = placeAbove
        ? device.baseSize.y * 0.85 + 0.3
        : raisedBelowIds.has(device.id)
          ? -(device.baseSize.y * 0.28 + 0.04)
          : -(device.baseSize.y * 0.85 + 0.28);
      return [{
        side,
        deviceId: device.id,
        title: hint.title,
        instructionLines: (hint.instructionLines ?? []).map((line) => line.replaceAll('{HAND}', handLabel)),
        worldPosition: {
          x: device.anchor.x,
          y: device.anchor.y + offsetY,
          z: device.anchor.z,
        },
        placement: placeAbove ? 'above' : 'below',
      }];
    });
  }

  function getPunchDeviceId(side) {
    return `${side}Punch`;
  }

  function getPunchOutputKey(side) {
    return `${side}PunchFire`;
  }

  function getChargedPunchOutputKey(side) {
    return `${side}ChargedPunchFire`;
  }

  function getPunchGuardOutputKey(side) {
    return `${side}PunchGuard`;
  }

  function getPunchForwardHoldOutputKey(side) {
    return `${side}PunchHoldForward`;
  }

  function getPunchBackPreviewOutputKey(side) {
    return `${side}PunchBackPreview`;
  }

  function getPunchHoldOutputKey(side) {
    return `${side}PunchHoldBack`;
  }

  function getOtherSide(side) {
    return side === 'left' ? 'right' : 'left';
  }

  function setMissileArmSwitchState(device, nextOn) {
    device.toggleOn = nextOn;
  }

  function resetMissileArmSwitches(devices) {
    devices.forEach((device) => {
      setMissileArmSwitchState(device, false);
      device.toggleLatched = false;
    });
  }

  function isMissileArmSwitchId(deviceId) {
    return MISSILE_ARM_SWITCH_IDS.includes(deviceId);
  }

  function createPunchOutputs() {
    return Object.fromEntries(
      PUNCH_SIDES.flatMap((side) => [
        [getPunchOutputKey(side), false],
        [getChargedPunchOutputKey(side), false],
        [getPunchGuardOutputKey(side), false],
        [getPunchForwardHoldOutputKey(side), false],
        [getPunchBackPreviewOutputKey(side), false],
        [getPunchHoldOutputKey(side), false],
      ])
    );
  }

  function resetPunchCharge(device) {
    device.triggerLatched = false;
    device.chargeLatched = false;
    device.chargeSeconds = 0;
  }

  function createHandState(side, material) {
    const { x, y } = HAND_LAYOUT[`${side}Start`];
    return {
      side,
      position: new THREE.Vector2(x, y),
      targetPosition: new THREE.Vector2(x, y),
      mesh: new THREE.Mesh(new THREE.SphereGeometry(0.18, 18, 18), material),
      deviceId: null,
      gripHeld: false,
      hoverId: null,
      navLatched: false,
      motion: { x: 0, y: 0 },
    };
  }

  function syncHandMeshPosition(hand) {
    hand.mesh.position.set(hand.position.x, hand.position.y, 1.35);
  }

  function resetHandState(hand) {
    const { x, y } = HAND_LAYOUT[`${hand.side}Start`];
    hand.position.set(x, y);
    hand.targetPosition.set(x, y);
    hand.deviceId = null;
    hand.gripHeld = false;
    hand.hoverId = null;
    hand.navLatched = false;
    syncHandMeshPosition(hand);
  }

  function buildHandSummary(hands, mapper) {
    return Object.fromEntries(HAND_SIDES.map((side) => [side, mapper(hands[side])]));
  }

  function createCockpit(cockpitScene) {
    const root = new THREE.Group();
    cockpitScene.add(root);

    const shellMaterial = new THREE.MeshStandardMaterial({ color: 0x1a2027, roughness: 0.95, metalness: 0.06 });
    const trimMaterial = new THREE.MeshStandardMaterial({ color: 0x2a3947, roughness: 0.8, metalness: 0.2 });

    const panel = new THREE.Mesh(new THREE.BoxGeometry(12, 0.32, 3.6), shellMaterial);
    panel.position.set(0, -1.9, 0.65);
    panel.rotation.x = -0.08;
    root.add(panel);

    const dash = new THREE.Mesh(new THREE.BoxGeometry(11.5, 2.7, 0.45), trimMaterial);
    dash.position.set(0, 0.15, -1.7);
    root.add(dash);

    const canopyFrame = new THREE.Mesh(new THREE.BoxGeometry(12.5, 0.24, 6.6), trimMaterial);
    canopyFrame.position.set(0, 3.1, -0.2);
    root.add(canopyFrame);

    const devices = COCKPIT_DEVICE_LAYOUTS.map((layout) => createDevice(cockpitScene, layout));
    for (const device of devices) {
      device.chargeLamps = createChargeIndicatorLamps(device);
      device.staminaLamps = createPunchStaminaLamps(device);
      device.indicatorLamps = [
        ...createMissileIndicatorLamps(device),
        ...createGatlingIndicatorLamps(device),
      ];
    }

    const deviceMap = new Map(devices.map((device) => [device.id, device]));
    const turnDevices = devices.filter((device) => device.kind === 'turn');
    const missileArmDevices = MISSILE_ARM_SWITCH_IDS.map((id) => deviceMap.get(id));

    const handMaterials = Object.fromEntries(
      HAND_SIDES.map((side) => [
        side,
        new THREE.MeshStandardMaterial({
          color: HAND_MATERIAL_CONFIG[side].color,
          roughness: 0.35,
          metalness: 0.3,
        }),
      ])
    );

    const hands = Object.fromEntries(
      HAND_SIDES.map((side) => [side, createHandState(side, handMaterials[side])])
    );

    for (const side of HAND_SIDES) {
      syncHandMeshPosition(hands[side]);
      cockpitScene.add(hands[side].mesh);
    }

    function releaseHand(hand) {
      hand.deviceId = null;
    }

    function focusHandOnDevice(hand, device) {
      if (!device) {
        return;
      }
      hand.hoverId = device.id;
      hand.targetPosition.copy(device.anchor);
    }

    function navigateHand(hand, motion, otherHand) {
      const direction = getDominantDirection(motion);
      if (!direction) {
        if (Math.abs(motion.x) < NAV_RESET_THRESHOLD && Math.abs(motion.y) < NAV_RESET_THRESHOLD) {
          hand.navLatched = false;
        }
        return;
      }

      if (hand.navLatched) {
        return;
      }

      hand.navLatched = true;
      const currentPoint = hand.hoverId ? deviceMap.get(hand.hoverId).anchor : hand.targetPosition;
      const nextDevice = selectNextDevice(devices, currentPoint, direction, hand.hoverId, otherHand.deviceId);
      if (nextDevice) {
        focusHandOnDevice(hand, nextDevice);
      }
    }

    function navigateMissileArmSwitch(hand, motion, otherHand) {
      if (Math.abs(motion.x) < NAV_THRESHOLD) {
        if (Math.abs(motion.x) < NAV_RESET_THRESHOLD) {
          hand.navLatched = false;
        }
        return;
      }

      if (hand.navLatched) {
        return;
      }

      const currentIndex = MISSILE_ARM_SWITCH_IDS.indexOf(hand.deviceId);
      if (currentIndex === -1) {
        return;
      }

      const direction = motion.x > 0 ? 1 : -1;
      const nextIndex = currentIndex + direction;
      const nextDeviceId = MISSILE_ARM_SWITCH_IDS[nextIndex];
      if (!nextDeviceId || nextDeviceId === otherHand.deviceId) {
        hand.navLatched = true;
        return;
      }

      hand.navLatched = true;
      const nextDevice = deviceMap.get(nextDeviceId);
      hand.deviceId = nextDevice.id;
      focusHandOnDevice(hand, nextDevice);
    }

    function updateHand(hand, motion, grip, otherHand, dt) {
      if (hand.deviceId) {
        const device = deviceMap.get(hand.deviceId);
        if (isMissileArmSwitchId(hand.deviceId)) {
          navigateMissileArmSwitch(hand, motion, otherHand);
        }
        hand.hoverId = hand.deviceId;
        hand.targetPosition.copy(deviceMap.get(hand.deviceId).anchor);
      } else {
        navigateHand(hand, motion, otherHand);
      }

      if (grip && !hand.gripHeld) {
        const target = hand.hoverId ? deviceMap.get(hand.hoverId) : selectNearestDevice(devices, hand.position, otherHand.deviceId);
        hand.deviceId = target ? target.id : null;
        if (target) {
          focusHandOnDevice(hand, target);
        }
      }
      if (!grip && hand.gripHeld) {
        releaseHand(hand);
      }
      hand.gripHeld = grip;

      hand.position.x = damp(hand.position.x, hand.targetPosition.x, HAND_MOVE_SPEED, dt);
      hand.position.y = damp(hand.position.y, hand.targetPosition.y, HAND_MOVE_SPEED, dt);
      syncHandMeshPosition(hand);

      if (!hand.deviceId && !hand.hoverId) {
        hand.hoverId = selectNearestDevice(devices, hand.position, otherHand.deviceId)?.id ?? null;
      }
    }

    function updateDeviceState(device, dt, activeHands) {
      let targetX = 0;
      let targetY = 0;
      let engaged = false;

      for (const hand of activeHands) {
        if (hand.deviceId !== device.id) {
          continue;
        }
        engaged = true;
        targetX = device.axisX ? clamp(hand.motion.x, -1, 1) : 0;
        targetY = device.axisY ? clamp(hand.motion.y, -1, 1) : 0;
      }

      device.inputX = engaged ? targetX : 0;
      device.inputY = engaged ? targetY : 0;

      device.outputX = damp(device.outputX, engaged ? targetX : 0, engaged ? 18 : 10, dt);
      device.outputY = damp(device.outputY, engaged ? targetY : 0, engaged ? 18 : 10, dt);

      if (device.kind === 'move') {
        device.handle.rotation.z = -device.outputX * 0.45;
        device.handle.rotation.x = -device.outputY * 0.5;
      } else if (device.kind === 'turn') {
        device.handle.rotation.z = device.outputX * 0.55;
        device.handle.rotation.x = -device.outputY * 0.35;
      } else if (device.kind === 'missile') {
        device.handle.position.y = device.outputY * 0.22;
        device.handle.rotation.x = -device.outputY * 0.25;
      } else if (device.kind === 'gatling') {
        device.handle.position.y = device.outputY * 0.22;
        device.handle.rotation.x = -device.outputY * 0.28;
      } else if (device.kind === 'crank') {
        const crankAngle = Math.atan2(device.outputY, device.outputX || 0.0001);
        device.handle.rotation.z = crankAngle;
        device.handle.rotation.y = Math.hypot(device.outputX, device.outputY) * 0.18;
      } else if (device.kind === 'toggle') {
        device.toggleVisual = damp(device.toggleVisual, device.toggleOn ? 1 : -1, 14, dt);
        device.handle.position.y = 0.05 + device.toggleVisual * 0.06;
        device.handle.rotation.x = -device.toggleVisual * 0.42;
      } else {
        device.handle.rotation.z = -device.outputX * 0.35;
        device.handle.rotation.x = -device.outputY * 0.7;
      }

      const highlighted = engaged || hands.left.hoverId === device.id || hands.right.hoverId === device.id;
      device.highlight.material.opacity = highlighted ? 0.28 : 0.1;
      device.material.emissive.setHex(engaged ? device.accentColor : highlighted ? 0x1d2430 : 0x000000);

      return engaged;
    }

    function updateMissileArmSwitch(device, engaged, index) {
      const previousArmed = missileArmDevices.slice(0, index).every((armDevice) => armDevice.toggleOn === true);

      if (!engaged) {
        device.toggleLatched = false;
        return;
      }

      if (device.outputY < -0.45 && !device.toggleLatched) {
        if (previousArmed) {
          setMissileArmSwitchState(device, true);
        }
        device.toggleLatched = true;
        return;
      }

      if (Math.abs(device.outputY) < 0.2) {
        device.toggleLatched = false;

  function updateRobotMesh(robot) {
    const facing = getFacingBasis(robot.angle);
    const enemyDownElapsed = !robot.mesh.hasArms && robot.downTimer > 0 ? getEnemyDownElapsed(robot) : 0;
    const downLaunchProgress = enemyDownElapsed > 0
      ? clamp(enemyDownElapsed / ENEMY_TUNING.downLaunchDuration, 0, 1)
      : 0;
    const downRecoverElapsed = Math.max(0, enemyDownElapsed - ENEMY_TUNING.downLaunchDuration - ENEMY_TUNING.downLieDuration);
    const downRecoverProgress = ENEMY_TUNING.downRecoverDuration > 0
      ? clamp(downRecoverElapsed / ENEMY_TUNING.downRecoverDuration, 0, 1)
      : 1;
    const downPoseAmount = !robot.mesh.hasArms && robot.downTimer > 0
      ? (enemyDownElapsed < ENEMY_TUNING.downLaunchDuration + ENEMY_TUNING.downLieDuration
        ? downLaunchProgress
        : 1 - downRecoverProgress)
      : 0;
    const rootXRotation = !robot.mesh.hasArms
      ? (robot.downTimer > 0
        ? -1.15 * downPoseAmount
        : robot.smallReactTimer > 0
          ? -0.18 * (robot.smallReactTimer / ENEMY_TUNING.smallReactDuration)
          : 0)
      : 0;
    const rootZRotation = !robot.mesh.hasArms && robot.smallReactTimer > 0
      ? Math.sin(performance.now() * 0.09) * 0.12 * (robot.smallReactTimer / ENEMY_TUNING.smallReactDuration)
      : 0;
    const rootYOffset = !robot.mesh.hasArms && robot.downTimer > 0
      ? -0.52 * downPoseAmount
      : 0;
    robot.mesh.root.position.copy(robot.position);
    robot.mesh.root.position.y += rootYOffset;
    robot.mesh.root.rotation.set(rootXRotation, facing.meshRotationY, rootZRotation);

    if (robot.mesh.chargeMaterials.length > 0) {
      const chargeRatio = robot.beamChargeTimer > 0
        ? 1 - robot.beamChargeTimer / ENEMY_TUNING.beamChargeDuration
        : 0;
      const beamActive = robot.beamFireTimer > 0;
      for (const material of robot.mesh.chargeMaterials) {
        material.color.setHex(beamActive ? 0xfff0b8 : material.userData.baseColor);
        material.emissive.setHex(chargeRatio > 0 || beamActive ? 0xff7a2a : 0x000000);
        material.emissiveIntensity = beamActive ? 1.25 : chargeRatio * 0.95;
      }
    }

    if (!robot.mesh.hasArms) {
      return;
    }

    for (const side of PUNCH_SIDES) {
      const punch = getPunchState(robot, side);
      const sideConfig = ARM_SIDE_CONFIG[side];
      const swingPose = getPunchSwingPose(side, punch.extend);
      const guardBlend = punch.extend < 0.08 && punch.attackTimer <= 0 ? robot[`${side}Guard`].value : 0;
      const armPose = blendArmPose(swingPose, getPunchGuardPose(side, 1), guardBlend);
      const guardImpactRatio = robot[`${side}GuardImpactTimer`] > 0
        ? robot[`${side}GuardImpactTimer`] / PLAYER_TUNING.guardImpactDuration
        : 0;
      const guardImpactShake = Math.sin(performance.now() * 0.08) * PLAYER_TUNING.guardImpactShake * guardImpactRatio;
      const shoulder = robot.mesh.shoulders[side];
      const arm = robot.mesh.arms[side];
      const fist = robot.mesh.fists[side];
      const chargedVisual = punch.damageMultiplier > 1 || punch.dashTimer > 0;

      shoulder.position.set(
        sideConfig.shoulderX + armPose.xOffset + (side === 'left' ? -guardImpactShake : guardImpactShake),
        1.56 + armPose.yOffset + Math.abs(guardImpactShake) * 0.35,
        0.18 + armPose.zOffset
      );
      shoulder.rotation.x = armPose.rotationX + guardImpactShake * 0.4;
      shoulder.rotation.y = sideConfig.shoulderYaw + armPose.rotationY;
      shoulder.rotation.z = sideConfig.shoulderRoll + armPose.rotationZ + guardImpactShake * 0.8;

      setChargedMaterialState(arm.material, chargedVisual, 0xffd36b, 0x6a3a00, 0.85);
      setChargedMaterialState(fist.material, chargedVisual, 0xfff1b0, 0xff8c1a, 1.2);
    }
  }

  function getCockpitCameraState(robot) {
    const facing = getFacingBasis(robot.angle);
    const cameraPosition = robot.position.clone()
      .add(new THREE.Vector3(0, 2.1, 0))
      .add(facing.forward.clone().multiplyScalar(0.32))
      .add(facing.right.clone().multiplyScalar(0.02));
    const cameraLookAt = cameraPosition.clone()
      .add(facing.forward.clone().multiplyScalar(8))
      .add(new THREE.Vector3(0, -0.3, 0));

    return {
      cameraPosition,
      cameraLookAt,
      forward: facing.forward,
    };
  }

  function getFistWorldPosition(robot, side, targetVector) {
    const fist = robot.mesh.fists[side];
    robot.mesh.root.updateWorldMatrix(true, true);
    fist.getWorldPosition(targetVector);
    return targetVector;
  }

  function getRobotHurtPosition(robot, targetVector) {
    targetVector.copy(robot.position);
    targetVector.y += robot.hurtCenterHeight;
    return targetVector;
  }

  function getChargedDashSpeed(robot) {
    let chargedDashSpeed = 0;
    for (const side of PUNCH_SIDES) {
      if (getPunchState(robot, side).dashTimer > 0) {
        chargedDashSpeed += PLAYER_TUNING.chargedPunchDashSpeed;
      }
    }
    return chargedDashSpeed;
  }

  function stopChargedDash(robot) {
    for (const side of PUNCH_SIDES) {
      getPunchState(robot, side).dashTimer = 0;
    }
  }

  function getChargedDashStep(attacker, defender, facing, dashDistance, scratchVector) {
    const toDefender = scratchVector.copy(defender.position).sub(attacker.position).setY(0);
    const forwardDistance = toDefender.dot(facing.forward);
    const lateralDistance = Math.abs(toDefender.dot(facing.right));

    if (forwardDistance <= 0 || lateralDistance > COMBAT_TUNING.chargedPunchCatchWidth) {
      return dashDistance;
    }

    const allowedDistance = Math.max(0, forwardDistance - COMBAT_TUNING.chargedPunchStopDistance);
    return Math.min(dashDistance, allowedDistance);
  }

  function createBeamMesh() {
    const material = new THREE.MeshStandardMaterial({
      color: 0xffd98a,
      emissive: 0xff8c2a,
      emissiveIntensity: 1.1,
      transparent: true,
      opacity: 0.85,
      roughness: 0.2,
      metalness: 0.1,
    });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.4, 1), material);
    mesh.visible = false;
    return mesh;
  }

  function createDebugSphere(radius, color) {
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(1, 16, 16),
      new THREE.MeshBasicMaterial({ color, wireframe: true, transparent: true, opacity: 0.5 })
    );
    mesh.scale.setScalar(radius);
    mesh.visible = false;
    return mesh;
  }

  function createWorld(topScene) {
    const player = makeRobotState(
      makeRobot({ body: 0x5ea7ff, limb: 0x293a52, accent: 0xd4f0ff }),
      new THREE.Vector3(0, 0, 6),
      0,
      { hurtCenterHeight: 1.45, hurtRadius: 1.2, pushRadius: 1.05 }
    );

    const enemy = makeRobotState(
      makeEnemyRobot({ body: 0x6b2b1d, accent: 0xffa365 }),
      new THREE.Vector3(0, 0, -6),
      Math.PI,
      { hurtCenterHeight: 2.15, hurtRadius: 2.25, pushRadius: 1.6 }
    );

    const enemyBeam = createBeamMesh();
    const enemyHurtDebug = createDebugSphere(enemy.hurtRadius, 0xff8c66);
    const leftFistDebug = createDebugSphere(COMBAT_TUNING.fistHitRadius, 0x66d7ff);
    const rightFistDebug = createDebugSphere(COMBAT_TUNING.fistHitRadius, 0xffc266);

    topScene.add(player.mesh.root, enemy.mesh.root, enemyBeam, enemyHurtDebug, leftFistDebug, rightFistDebug);

    const missiles = [];
    const gatlingRounds = [];
    let hitStopTimer = 0;
    const scratch = {
      vectorA: new THREE.Vector3(),
      vectorB: new THREE.Vector3(),
      vectorC: new THREE.Vector3(),
    };

    function spawnMissile(owner) {
      const missile = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.12, 0.45, 4, 8),
        new THREE.MeshStandardMaterial({ color: 0xffe27a, roughness: 0.2, metalness: 0.45, emissive: 0x453300 })
      );
      missile.rotation.z = Math.PI * 0.5;

      const facing = getFacingBasis(owner.angle);
      const spawnPosition = owner.position.clone()
        .add(facing.forward.clone().multiplyScalar(1.5))
        .add(new THREE.Vector3(0, 1.4, 0));

      missile.position.copy(spawnPosition);
      topScene.add(missile);

      missiles.push({
        mesh: missile,
        velocity: facing.forward.multiplyScalar(MISSILE_TUNING.speed),
        ttl: MISSILE_TUNING.ttl,
      });
    }

    function spawnGatlingRound(owner) {
      const round = new THREE.Mesh(
        new THREE.SphereGeometry(0.07, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0xbfe9ff, emissive: 0x3d9dff, emissiveIntensity: 0.7, roughness: 0.2, metalness: 0.25 })
      );

      const facing = getFacingBasis(owner.angle);
      const spawnPosition = owner.position.clone()
        .add(facing.forward.clone().multiplyScalar(1.35))
        .add(facing.right.clone().multiplyScalar(-0.92))
        .add(new THREE.Vector3(0, 1.52, 0));

      const direction = facing.forward.clone()
        .add(facing.right.clone().multiplyScalar((Math.random() * 2 - 1) * GATLING_TUNING.spread))
        .add(new THREE.Vector3(0, (Math.random() * 2 - 1) * GATLING_TUNING.spread * 0.35, 0))
        .normalize();

      round.position.copy(spawnPosition);
      topScene.add(round);

      gatlingRounds.push({
        mesh: round,
        velocity: direction.multiplyScalar(GATLING_TUNING.speed),
        ttl: GATLING_TUNING.ttl,
      });
    }

    function updateEnemyBeamVisual() {
      if (enemy.beamFireTimer <= 0) {
        enemyBeam.visible = false;
        return;
      }

      const facing = getFacingBasis(enemy.angle);
      const beamLength = ENEMY_TUNING.beamRange;
      const emitterPosition = enemy.position.clone()
        .add(new THREE.Vector3(0, 2.45, 0))
        .add(facing.forward.clone().multiplyScalar(0.95));

      enemyBeam.visible = true;
      enemyBeam.position.copy(emitterPosition).add(facing.forward.clone().multiplyScalar(beamLength * 0.5));
      enemyBeam.scale.set(1, 1, beamLength);
      enemyBeam.rotation.y = Math.atan2(facing.forward.x, facing.forward.z);
      enemyBeam.material.opacity = 0.72 + Math.sin(performance.now() * 0.05) * 0.12;
    }

    function setPunchDebugVisible(visible) {
      enemyHurtDebug.visible = visible;
      leftFistDebug.visible = visible;
      rightFistDebug.visible = visible;
    }

    function updatePunchDebugVisuals() {
      const debugVisible = DEBUG_TUNING.showCombatVolumes === true;
      setPunchDebugVisible(debugVisible);
      if (!debugVisible) {
        return;
      }

      updateRobotMesh(player);
      const enemyHurtPosition = getRobotHurtPosition(enemy, scratch.vectorA);
      enemyHurtDebug.position.copy(enemyHurtPosition);

      leftFistDebug.position.copy(getFistWorldPosition(player, 'left', scratch.vectorB));
      rightFistDebug.position.copy(getFistWorldPosition(player, 'right', scratch.vectorC));
    }

    function applyBeamDamage(dt) {
      enemy.beamHitCooldown = Math.max(0, enemy.beamHitCooldown - dt);
      if (enemy.beamHitCooldown > 0) {
        return;
      }

      const facing = getFacingBasis(enemy.angle);
      const toPlayer = scratch.vectorA.copy(player.position).sub(enemy.position).setY(0);
      const forwardDistance = toPlayer.dot(facing.forward);
      const lateralDistance = Math.abs(toPlayer.dot(facing.right));

      if (forwardDistance <= 0 || forwardDistance > ENEMY_TUNING.beamRange || lateralDistance > ENEMY_TUNING.beamWidth) {
        return;
      }

      if (isGuarding(player)) {
        player.velocity.add(toPlayer.normalize().multiplyScalar(PLAYER_TUNING.guardKnockbackSpeed));
        triggerGuardImpact(player);
      } else {
        player.health = clamp(player.health - ENEMY_TUNING.beamDamage, 0, 100);
        player.hitStunTimer = PLAYER_TUNING.hitKnockbackDuration;
        player.knockbackVelocity.copy(toPlayer.normalize().multiplyScalar(PLAYER_TUNING.hitKnockbackSpeed));
        interruptPunchs(player);
      }
      enemy.beamHitCooldown = ENEMY_TUNING.beamHitInterval;
    }

    function startEnemyJump(direction, distance) {
      enemy.jumpTimer = ENEMY_TUNING.jumpDuration;
      enemy.jumpCooldown = ENEMY_TUNING.jumpCooldown;
      enemy.jumpStart.copy(enemy.position);
      enemy.jumpStart.y = 0;
      enemy.jumpTarget.copy(enemy.position).add(direction.multiplyScalar(distance));
      enemy.jumpTarget.y = 0;
      enemy.jumpTarget.x = clamp(enemy.jumpTarget.x, -ARENA_LIMIT, ARENA_LIMIT);
      enemy.jumpTarget.z = clamp(enemy.jumpTarget.z, -ARENA_LIMIT, ARENA_LIMIT);
    }

    function applyPunchDamage(attacker, defender, side, damage) {
      const punch = getPunchState(attacker, side);
      if (!punch.hitEnabled || punch.hitCount >= COMBAT_TUNING.punchMaxHitsPerAttack) {
        return false;
      }

      const activeThreshold = COMBAT_TUNING.punchActiveExtendThreshold;
      if (punch.extend < activeThreshold || punch.hitCooldown > 0) {
        return false;
      }

      updateRobotMesh(attacker);
      const fistPosition = getFistWorldPosition(attacker, side, scratch.vectorA);
      const targetPosition = getRobotHurtPosition(defender, scratch.vectorB);
      const horizontalDelta = scratch.vectorC.copy(fistPosition).sub(targetPosition).setY(0);
      const horizontalDistance = horizontalDelta.length();
      const verticalDistance = Math.abs(fistPosition.y - targetPosition.y);

      if (
        horizontalDistance < defender.hurtRadius + COMBAT_TUNING.fistHitRadius
        && verticalDistance < COMBAT_TUNING.punchVerticalAllowance
      ) {
        defender.activated = true;
        defender.health = clamp(defender.health - damage * punch.damageMultiplier, 0, 100);
        const knockbackScale = punch.hitCount === 0 ? 1 : COMBAT_TUNING.punchRepeatKnockbackMultiplier;
        const knockback = defender.position.clone().sub(attacker.position).setY(0).normalize().multiplyScalar(COMBAT_TUNING.knockback * knockbackScale);
        defender.velocity.add(knockback);
        punch.hitCooldown = COMBAT_TUNING.punchHitInterval;
        punch.hitCount += 1;
        hitStopTimer = Math.max(hitStopTimer, COMBAT_TUNING.punchHitStopSeconds);
        return true;
      }

      return false;
    }

    function clampRobotToArena(robot) {
      robot.position.x = clamp(robot.position.x, -ARENA_LIMIT, ARENA_LIMIT);
      robot.position.z = clamp(robot.position.z, -ARENA_LIMIT, ARENA_LIMIT);
    }

    function resolveRobotOverlap() {
      const delta = scratch.vectorA.copy(player.position).sub(enemy.position).setY(0);
      const distance = delta.length();
      const minimumDistance = player.pushRadius + enemy.pushRadius;

      if (distance >= minimumDistance) {
        return;
      }

      const normal = distance > 0.0001 ? delta.multiplyScalar(1 / distance) : scratch.vectorA.set(1, 0, 0);
      const overlap = minimumDistance - Math.max(distance, 0.0001);
      const playerShare = COMBAT_TUNING.playerPushShare;
      const enemyShare = 1 - playerShare;

      player.position.add(normal.clone().multiplyScalar(overlap * playerShare));
      enemy.position.add(normal.clone().multiplyScalar(-overlap * enemyShare));

      const separatingVelocity = normal.clone().multiplyScalar(0.08);
      player.velocity.add(separatingVelocity);
      enemy.velocity.add(separatingVelocity.clone().multiplyScalar(-0.25));

      clampRobotToArena(player);
      clampRobotToArena(enemy);
    }

    function updatePlayer(dt, controls) {
      const move = new THREE.Vector2(controls.moveX, controls.moveY);
      if (move.length() > 1) {
        move.normalize();
      }

      player.hitStunTimer = Math.max(0, player.hitStunTimer - dt);
      for (const side of PUNCH_SIDES) {
        player[`${side}GuardImpactTimer`] = Math.max(0, player[`${side}GuardImpactTimer`] - dt);
      }
      const punchDisabled = player.hitStunTimer > 0;

      if (!punchDisabled && controls.turnSpin) {
        player.angle = wrapAngle(player.angle + controls.turnSpin * PLAYER_TUNING.turnSpeed * dt);
      } else if (!punchDisabled && controls.turnTargetAngle != null) {
        player.angle = rotateTowards(player.angle, controls.turnTargetAngle, PLAYER_TUNING.turnSpeed * dt);
      }

      const facing = getFacingBasis(player.angle);
      if (punchDisabled) {
        player.velocity.copy(player.knockbackVelocity);
        player.knockbackVelocity.multiplyScalar(Math.exp(-dt * 6));
      } else {
        const desiredVelocity = facing.right.clone().multiplyScalar(move.x * PLAYER_TUNING.moveSpeed)
          .add(facing.forward.clone().multiplyScalar(move.y * PLAYER_TUNING.moveSpeed));
        player.velocity.lerp(desiredVelocity, 1 - Math.exp(-dt * PLAYER_TUNING.moveResponse));
      }
      player.position.add(player.velocity.clone().multiplyScalar(dt));
      player.velocity.multiplyScalar(PLAYER_TUNING.velocityDamping);

      for (const side of PUNCH_SIDES) {
        const staminaState = getPunchStamina(player, side);
        staminaState.value = clamp(staminaState.value + dt * PLAYER_TUNING.punchStaminaRecoveryPerSecond, 0, PLAYER_TUNING.punchStaminaMax);

        const guardState = player[`${side}Guard`];
        const guardTarget = controls[`${side}PunchGuard`] === true ? 1 : 0;
        guardState.value = THREE.MathUtils.lerp(guardState.value, guardTarget, 1 - Math.exp(-GUARD_POSE_RESPONSE * dt));

        if (punchDisabled) {
          updatePunchState(getPunchState(player, side), -1, dt, PLAYER_TUNING, true);
        } else {
          updateTriggeredPunch(
            getPunchState(player, side),
            staminaState,
            getPunchAttackRequest(controls, side),
            dt,
            PLAYER_TUNING.punchDuration,
            PLAYER_TUNING.chargedPunchDashDuration,
            PLAYER_TUNING
          );
        }
      }

      const chargedDashSpeed = getChargedDashSpeed(player);
      if (chargedDashSpeed > 0) {
        const dashDistance = getChargedDashStep(player, enemy, facing, chargedDashSpeed * dt, scratch.vectorC);
        player.position.add(facing.forward.clone().multiplyScalar(dashDistance));
        if (dashDistance < chargedDashSpeed * dt - 0.0001) {
          stopChargedDash(player);
        }
      }

      player.gatlingAmmo = clamp(player.gatlingAmmo + (controls.gatlingReloadAmount ?? 0), 0, GATLING_TUNING.maxAmmo);
      player.gatlingFireCooldown = Math.max(0, player.gatlingFireCooldown - dt);
      if (controls.gatlingFiring && player.gatlingAmmo > 0 && player.gatlingFireCooldown <= 0) {
        spawnGatlingRound(player);
        player.gatlingAmmo -= 1;
        player.gatlingFireCooldown = GATLING_TUNING.fireInterval;
      }

      player.missileCooldown = Math.max(0, player.missileCooldown - dt);
      if (controls.missileFired && player.missileCooldown <= 0) {
        spawnMissile(player);
        player.missileCooldown = PLAYER_TUNING.missileCooldown;
      }

      for (const side of PUNCH_SIDES) {
        const punch = getPunchState(player, side);
        const hitApplied = applyPunchDamage(player, enemy, side, PLAYER_TUNING.punchDamage);
        if (hitApplied) {
          if (punch.damageMultiplier > 1) {
            stopChargedDash(player);
          }
        }
      }
      clampRobotToArena(player);
    }

    function updateEnemy(dt) {
      const toPlayer = scratch.vectorB.copy(player.position).sub(enemy.position);
      const distance = Math.max(toPlayer.length(), 0.001);
      const moveDirection = toPlayer.clone().normalize();
      enemy.smallReactTimer = Math.max(0, enemy.smallReactTimer - dt);
      enemy.downTimer = Math.max(0, enemy.downTimer - dt);

      if (enemy.downTimer <= 0 && enemy.smallReactTimer <= 0) {
        enemy.angle = rotateTowards(enemy.angle, Math.atan2(toPlayer.x, -toPlayer.z), dt * ENEMY_TUNING.turnSpeed);
      }

      enemy.beamCooldown = Math.max(0, enemy.beamCooldown - dt);
      enemy.postBeamIdleTimer = Math.max(0, enemy.postBeamIdleTimer - dt);

      if (enemy.downTimer > 0) {
        const downElapsed = getEnemyDownElapsed(enemy);
        if (downElapsed < ENEMY_TUNING.downLaunchDuration) {
          const launchProgress = clamp(downElapsed / ENEMY_TUNING.downLaunchDuration, 0, 1);
          enemy.position.add(enemy.downVelocity.clone().multiplyScalar(dt));
          enemy.position.y = Math.sin(launchProgress * Math.PI) * ENEMY_TUNING.downLaunchHeight;
          enemy.aiMode = 'down';
        } else if (downElapsed < ENEMY_TUNING.downLaunchDuration + ENEMY_TUNING.downLieDuration) {
          enemy.position.y = 0;
          enemy.aiMode = 'down';
        } else {
          enemy.position.y = 0;
          enemy.aiMode = 'recover';
        }
        clampRobotToArena(enemy);
        return;
      }

      if (enemy.smallReactTimer > 0) {
        enemy.aiMode = 'react';
        clampRobotToArena(enemy);
        return;
      }

      if (!enemy.activated) {
        enemy.position.y = 0;
        enemy.aiMode = 'idle';
        clampRobotToArena(enemy);
        return;
      }

      if (enemy.jumpTimer > 0) {
        enemy.jumpTimer = Math.max(0, enemy.jumpTimer - dt);
        const progress = 1 - enemy.jumpTimer / ENEMY_TUNING.jumpDuration;
        const eased = THREE.MathUtils.smoothstep(progress, 0, 1);
        enemy.position.x = THREE.MathUtils.lerp(enemy.jumpStart.x, enemy.jumpTarget.x, eased);
        enemy.position.z = THREE.MathUtils.lerp(enemy.jumpStart.z, enemy.jumpTarget.z, eased);
        enemy.position.y = Math.sin(progress * Math.PI) * ENEMY_TUNING.jumpHeight;
        enemy.aiMode = 'jump';
      } else {
        enemy.position.y = 0;
        enemy.jumpCooldown = Math.max(0, enemy.jumpCooldown - dt);

        if (enemy.beamChargeTimer > 0) {
          enemy.beamChargeTimer = Math.max(0, enemy.beamChargeTimer - dt);
          enemy.aiMode = 'charge';
          if (enemy.beamChargeTimer <= 0) {
            enemy.beamFireTimer = ENEMY_TUNING.beamFireDuration;
            enemy.beamHitCooldown = 0;
          }
        } else if (enemy.beamFireTimer > 0) {
          enemy.beamFireTimer = Math.max(0, enemy.beamFireTimer - dt);
          enemy.aiMode = 'beam';
          applyBeamDamage(dt);
          if (enemy.beamFireTimer <= 0) {
            enemy.postBeamIdleTimer = ENEMY_TUNING.postBeamIdleDuration;
          }
        } else if (enemy.postBeamIdleTimer > 0) {
          enemy.aiMode = 'idle';
        } else if (distance <= ENEMY_TUNING.beamRange * 0.9 && enemy.beamCooldown <= 0) {
          enemy.beamChargeTimer = ENEMY_TUNING.beamChargeDuration;
          enemy.beamCooldown = ENEMY_TUNING.beamCooldown;
          enemy.aiMode = 'charge';
        } else if (enemy.jumpCooldown <= 0) {
          if (distance > ENEMY_TUNING.preferredMaxDistance) {
            startEnemyJump(moveDirection, ENEMY_TUNING.jumpForwardDistance);
          } else if (distance < ENEMY_TUNING.preferredMinDistance) {
            startEnemyJump(moveDirection.multiplyScalar(-1), ENEMY_TUNING.jumpRetreatDistance);
          } else {
            enemy.aiMode = 'idle';
          }
        } else {
          enemy.aiMode = 'idle';
        }
      }

      clampRobotToArena(enemy);
    }

    function updateMissiles(dt) {
      for (let index = missiles.length - 1; index >= 0; index -= 1) {
        const missile = missiles[index];
        missile.ttl -= dt;
        missile.mesh.position.add(missile.velocity.clone().multiplyScalar(dt));

        const targetPosition = getRobotHurtPosition(enemy, scratch.vectorB);
