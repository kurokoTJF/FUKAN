<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Zenzero 4 - Restoration</title>
    <style>
        body {
            margin: 0;
            background: #222;
            overflow: hidden;
            font-family: monospace;
            color: white;
            -webkit-user-select: none;
        }

        #container {
            position: relative;
            width: 480px;
            height: 320px;
            margin: 20px auto;
            background: black;
            image-rendering: pixelated;
            border: 4px solid #444;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #c_ui {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.5);
            display: none;
            padding: 10px;
            box-sizing: border-box;
            font-size: 12px;
            white-space: pre-wrap;
            overflow-y: auto;
        }

        #info {
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: 10px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
        }
    </style>
    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
</head>

<body>
    <div id="container">
        <!-- Three.js Canvas will be prepended here -->
        <canvas id="c_ui" width="480" height="320"></canvas>
        <div id="error-overlay"></div>
        <div id="info">WASD: MOVE | ARROWS: CAMERA | SPACE: JUMP</div>
    </div>
</body>

</html>
<script src='./zenzero_assets.js'></script>

<script>
    // Asset variables are now global via zenzero_assets.js




    const overlay = document.getElementById('error-overlay');
    const uiCtx = document.getElementById('c_ui').getContext('2d');

    const log = (msg) => {
        console.log(msg);
        uiCtx.fillStyle = "#fff"; uiCtx.font = "10px monospace";
        uiCtx.clearRect(0, 300, 480, 20);
        uiCtx.fillText("[BOOT] " + msg, 10, 310);
    };
    const logError = (msg) => {
        overlay.style.display = 'block';
        overlay.innerText += msg + "\n";
        console.error(msg);
    };

    window.addEventListener('error', (e) => logError(e.message));

    // --- Math & Utils ---
    const lerp = (a, b, t) => a + (b - a) * t;
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    class Vec3 {
        constructor(x = 0, y = 0, z = 0) { this.x = x; this.y = y; this.z = z; }
        set(x, y, z) { this.x = x; this.y = y; this.z = z; return this; }
        copy(v) { this.x = v.x; this.y = v.y; this.z = v.z; return this; }
        add(v) { this.x += v.x; this.y += v.y; this.z += v.z; return this; }
        sub(v) { this.x -= v.x; this.y -= v.y; this.z -= v.z; return this; }
        mul(s) { this.x *= s; this.y *= s; this.z *= s; return this; }
        len() { return Math.sqrt(this.x * this.x + this.y * this.y + this.z * this.z); }
        norm() { const l = this.len(); return l > 0 ? (this.x /= l, this.y /= l, this.z /= l, this) : this; }
        cross(v) { return new Vec3(this.y * v.z - this.z * v.y, this.z * v.x - this.x * v.z, this.x * v.y - this.y * v.z); }
        clone() { return new Vec3(this.x, this.y, this.z); }
        static fromYawPitch(yawDeg, pitchDeg) {
            const yaw = yawDeg * Math.PI / 180, pitch = pitchDeg * Math.PI / 180;
            const cosP = Math.cos(pitch);
            // Standard Right-Handed Vector calculation
            return new Vec3(Math.sin(yaw) * cosP, -Math.sin(pitch), Math.cos(yaw) * cosP).norm();
        }
    }

    // --- Component Architecture Foundations ---
    class GameObject {
        constructor(name = 'Node', id = 'game_object') {
            this.name = name;
            this.id = id;
            this.deleted = false;
            this.objectList = [];
            this.tags = new Set();
            this.drawPause = false;
            this.updatePause = false;
            this.position = new Vec3();
            this.master = null;
        }
        update() {
            if (this.updatePause) return;
            this.update_self();
        }
        update_self() { }
        draw() { }
        onAttach(master) {
            this.master = master;
        }
        addChild(e, wantDraw = true) {
            this.objectList.push(e);
            if (this.root) this.root._needsRebuild = true;
            else if (this._needsRebuild !== undefined) this._needsRebuild = true;

            if (e.onAttach) e.onAttach(this);
            else e.master = this;
            e.drawPause = !wantDraw;
            return e;
        }
    }

    class EventHub {
        constructor() { this.eventQueue = []; }
        emit(type, sender, data) {
            this.eventQueue.push({ type, sender, data, consumed: false });
        }
        dealEvent(root) {
            const q = this.eventQueue;
            this.eventQueue = [];
            for (const ev of q) {
                this.broadcast(root, ev);
            }
        }
        broadcast(node, ev) {
            if (!node || ev.consumed) return;
            node.handleEvent?.(ev);
            if (ev.consumed) return;
            if (node.objectList) {
                for (const child of node.objectList) {
                    this.broadcast(child, ev);
                }
            }
        }
    }

    // --- Advanced Input System (Action-based) ---
    const keyMap = {
        'KeyW': 'forward', 'KeyS': 'backward', 'KeyA': 'left', 'KeyD': 'right',
        'KeyF': 'attack', 'KeyE': 'lockon', 'Space': 'dodge', 'ShiftLeft': 'jump',
        'ArrowUp': 'camUp', 'ArrowDown': 'camDown', 'ArrowLeft': 'camLeft', 'ArrowRight': 'camRight'
    };
    const onPressHandlers = {};
    const onReleaseHandlers = {};
    const actions = {}; // current logical state

    window.addEventListener('keydown', e => {
        const action = keyMap[e.code];
        if (action) {
            if (!actions[action]) {
                actions[action] = true;
                if (onPressHandlers[action]) onPressHandlers[action]();
            }
        }
        if (GM.keys) GM.keys[e.code] = true;
    });

    window.addEventListener('keyup', e => {
        const action = keyMap[e.code];
        if (action) {
            actions[action] = false;
            if (onReleaseHandlers[action]) onReleaseHandlers[action]();
        }
        if (GM.keys) GM.keys[e.code] = false;
    });

    class GameManager extends GameObject {
        constructor(name = 'GM') {
            super(name, 'GM');
            this.FPS = 60;
            this.lastTime = 0;
            this.frameTime = 1000 / this.FPS;
            this.flatUpdateList = [];
            this.flatDrawList = [];
            this._needsRebuild = true;
            this.eventHub = new EventHub();
            this.root = this;
        }
        update() {
            if (this._needsRebuild) this._rebuildFlatLists();
            this.eventHub.dealEvent(this);
            this.flatUpdateList.forEach(e => e.update());
        }
        handleEvent(ev) {
            if (ev.type === 'hit_stop_start') {
                this.switchPauseByTag('enemy', true);
            }
            if (ev.type === 'hit_stop_end') {
                this.switchPauseByTag('enemy', false);
            }
        }
        draw() {
            this.flatDrawList.forEach(e => e.draw());
        }
        _rebuildFlatLists() {
            this.flatUpdateList = [];
            this.flatDrawList = [];
            const traverse = (node) => {
                if (!node.updatePause) this.flatUpdateList.push(node);
                if (!node.drawPause) this.flatDrawList.push(node);
                node.objectList.forEach(traverse);
            };
            this.objectList.forEach(traverse);
            this._needsRebuild = false;
        }

        traverse(list, action) {
            for (const node of list) {
                action(node);
                if (node.objectList) this.traverse(node.objectList, action);
            }
        }

        switchPauseByTag(tag, pause = true) {
            this.traverse(this.objectList, (node) => {
                if (node.tags && node.tags.has(tag)) {
                    node.updatePause = pause;
                }
            });
            this._needsRebuild = true;
        }
    }

    // --- World Data Systems ---
    class Brick8 {
        constructor(fill = 0) {
            this.size = 8;
            this.data = new Uint8Array(8 * 8 * 8);
            if (fill != 0) this.data.fill(fill);
        }
        index(x, y, z) { return x + y * 8 + z * 64; }
        get(x, y, z) { return this.data[this.index(x, y, z)]; }
        set(x, y, z, v) { this.data[this.index(x, y, z)] = v; }
    }

    class BrickPool {
        constructor() { this.items = []; }
        add(brick) {
            const id = this.items.length;
            this.items.push(brick);
            return id;
        }
        get(id) { return this.items[id] ?? null; }

        static forEach8x8BrickVoxel(brick, fn) {
            for (let z = 0; z < 8; z++) for (let y = 0; y < 8; y++) for (let x = 0; x < 8; x++) fn(brick, x, y, z);
        }

        static Function8x8Brick = {
            0: { // Sphere
                f: (brick, x, y, z) => {
                    const dx = x - 3.5, dy = y - 3.5, dz = z - 3.5;
                    if (dx * dx + dy * dy + dz * dz <= 12) brick.set(x, y, z, 1);
                }
            },
            1: { // Chair-like
                f: (brick, x, y, z) => {
                    const leg = ((x === 1 || x === 6) && (z === 1 || z === 6) && y <= 3);
                    const seat = (x >= 1 && x <= 6) && (z >= 1 && z <= 6) && y === 3;
                    const back = (z >= 5 && z <= 6) && (x >= 1 && x <= 6) && (y >= 4 && y <= 7);
                    if (leg || seat || back) brick.set(x, y, z, 1);
                }
            }
        };

        static createRandom8x8Brick() {
            const brick = new Brick8(0);
            const seed = Math.random() < 0.5 ? 0 : 1;
            BrickPool.forEach8x8BrickVoxel(brick, BrickPool.Function8x8Brick[seed].f);
            return brick;
        }
    }


    const BlockDefs = {
        0: { name: 'air', solid: false, renderMode: 'empty' },
        1: { name: 'wood', solid: true, renderMode: 'cube', color: 0x8b5a2b },
        2: { name: 'stone', solid: true, renderMode: 'cube', color: 0x888888 },
        3: { name: 'grass', solid: true, renderMode: 'cube', color: 0x40e624 },
        4: { name: 'special', solid: true, renderMode: 'brickOnly', color: 0xffffff }
    };

    const BlockDefs_ByName = { WOOD: 1, STONE: 2, GRASS: 3, SP: 4 };

    class Chunk {
        constructor(cx, cy, cz, chunkSize = 16) {
            this.cx = cx; this.cy = cy; this.cz = cz;
            this.chunkSize = chunkSize;
            this.data = new Uint8Array(chunkSize ** 3);
            this.state = 'empty';
            this.coarseSize = 4;
            this.coarseGrid = chunkSize / this.coarseSize;
            this.coarseMask = new Uint8Array(this.coarseGrid ** 3);
            this.isDirty = false;
        }
        index(lx, ly, lz) { return lx + ly * this.chunkSize + lz * (this.chunkSize ** 2); }
        get(lx, ly, lz) { return this.data[this.index(lx, ly, lz)]; }
        set(lx, ly, lz, id) {
            this.data[this.index(lx, ly, lz)] = id;
            this.isDirty = true;
        }
        rebuildSpatialCache() {
            const s = this.chunkSize, cs = this.coarseSize, cg = this.coarseGrid;
            this.coarseMask.fill(0);
            let solidCount = 0;
            for (let z = 0; z < s; z++) {
                for (let y = 0; y < s; y++) {
                    for (let x = 0; x < s; x++) {
                        const id = this.get(x, y, z);
                        if (id === 0) continue;
                        solidCount++;
                        const idx = ((x / cs) | 0) + ((y / cs) | 0) * cg + ((z / cs) | 0) * cg * cg;
                        this.coarseMask[idx] = 1;
                    }
                }
            }
            this.state = solidCount === 0 ? 'empty' : (solidCount === s ** 3 ? 'full' : 'mixed');
        }
    }

    class ChunkWorld {
        constructor({ chunkSize = 16, minY = -16, maxY = 32, seed = 12345 } = {}) {
            this.chunks = new Map();
            this.chunkSize = chunkSize;
            this.minY = minY;
            this.maxY = maxY;
            this.seed = seed;
            this.brickRefs = new Map();
            this.brickPool = new BrickPool();
            this.pillarCellSize = 24;
            this.blockSize = 1;
        }
        getChunkKey(cx, cy, cz) { return `${cx},${cy},${cz}`; }
        worldToChunk(x, y, z) { return { cx: Math.floor(x / this.chunkSize), cy: Math.floor(y / this.chunkSize), cz: Math.floor(z / this.chunkSize) }; }
        worldToLocal(x, y, z) { return { lx: ((x % this.chunkSize) + this.chunkSize) % this.chunkSize, ly: ((y % this.chunkSize) + this.chunkSize) % this.chunkSize, lz: ((z % this.chunkSize) + this.chunkSize) % this.chunkSize }; }
        inBounds(x, y, z) { return y >= this.minY && y <= this.maxY; }
        getChunk(cx, cy, cz) {
            const key = this.getChunkKey(cx, cy, cz);
            if (!this.chunks.has(key)) {
                if (!this.inBounds(0, cy * this.chunkSize, 0)) return null;
                const chunk = this.generateChunk(cx, cy, cz);
                this.chunks.set(key, chunk);
                return chunk;
            }
            return this.chunks.get(key);
        }
        generateChunk(cx, cy, cz) {
            const chunk = new Chunk(cx, cy, cz, this.chunkSize);
            const minX = cx * this.chunkSize, maxX = minX + this.chunkSize, minZ = cz * this.chunkSize, maxZ = minZ + this.chunkSize, minY = cy * this.chunkSize, maxY = minY + this.chunkSize;
            const minCellX = Math.floor(minX / this.pillarCellSize), maxCellX = Math.floor((maxX - 1) / this.pillarCellSize), minCellZ = Math.floor(minZ / this.pillarCellSize), maxCellZ = Math.floor((maxZ - 1) / this.pillarCellSize);
            for (let cellX = minCellX; cellX <= maxCellX; cellX++) {
                for (let cellZ = minCellZ; cellZ <= maxCellZ; cellZ++) {
                    const pillar = this.getPillarForCell(cellX, cellZ);
                    if (pillar.topY < minY || pillar.baseY > maxY - 1) continue;
                    for (let x = Math.max(minX, Math.floor(pillar.px - pillar.radius)); x < Math.min(maxX, Math.ceil(pillar.px + pillar.radius)); x++) {
                        for (let z = Math.max(minZ, Math.floor(pillar.pz - pillar.radius)); z < Math.min(maxZ, Math.ceil(pillar.pz + pillar.radius)); z++) {
                            const dx = x - pillar.px, dz = z - pillar.pz;
                            if (dx * dx + dz * dz > pillar.radius * pillar.radius) continue;
                            for (let y = Math.max(minY, pillar.baseY); y <= Math.min(maxY - 1, pillar.topY); y++) {
                                const id = (y === pillar.topY) ? 3 : 2;
                                const { lx, ly, lz } = this.worldToLocal(x, y, z);
                                chunk.set(lx, ly, lz, id);
                            }
                        }
                    }
                }
            }
            chunk.rebuildSpatialCache();
            return chunk;
        }
        getPillarForCell(cellX, cellZ) {
            const hash = (n) => { n = (n ^ 61) ^ (n >>> 16); n += (n << 3); n ^= (n >>> 4); return Math.imul(n, 0x27d4eb2d) ^ (n >>> 15); };
            const h1 = hash(cellX * 73856093 ^ cellZ * 19349663 ^ this.seed), h2 = hash(h1 ^ this.seed + 17);
            return { px: cellX * this.pillarCellSize + 4 + (Math.abs(h1) % (this.pillarCellSize - 8)), pz: cellZ * this.pillarCellSize + 4 + (Math.abs(h2) % (this.pillarCellSize - 8)), radius: 4 + (Math.abs(h1) % 4), baseY: -3, topY: 10 + (Math.abs(h2) % 20) };
        }
        get(x, y, z) {
            if (!this.inBounds(x, y, z)) return 0;
            const { cx, cy, cz } = this.worldToChunk(x, y, z);
            const chunk = this.getChunk(cx, cy, cz);
            if (!chunk) return 0;
            const { lx, ly, lz } = this.worldToLocal(x, y, z);
            return chunk.get(lx, ly, lz);
        }
        setBlock(x, y, z, id) {
            if (!this.inBounds(x, y, z)) return;
            const { cx, cy, cz } = this.worldToChunk(x, y, z);
            const chunk = this.getChunk(cx, cy, cz);
            if (!chunk) return;
            const { lx, ly, lz } = this.worldToLocal(x, y, z);
            chunk.set(lx, ly, lz, id);
            chunk.rebuildSpatialCache();
        }
        isSolid(x, y, z) { const id = this.get(x, y, z); return id !== 0 && BlockDefs[id]?.solid; }
        moveAxisCheck_CenterType(position3, axis, delta, size3D) {
            if (delta === 0) return 0;
            const eps = 0.001, np = { x: position3.x, y: position3.y, z: position3.z };
            np[axis] += delta;
            const minX = Math.floor(np.x - size3D.x / 2), maxX = Math.floor(np.x + size3D.x / 2 - eps), minY = Math.floor(np.y - size3D.y / 2), maxY = Math.floor(np.y + size3D.y / 2 - eps), minZ = Math.floor(np.z - size3D.z / 2), maxZ = Math.floor(np.z + size3D.z / 2 - eps);
            for (let bx = minX; bx <= maxX; bx++) {
                for (let by = minY; by <= maxY; by++) {
                    for (let bz = minZ; bz <= maxZ; bz++) {
                        if (this.isSolid(bx, by, bz)) {
                            if (axis === 'x') position3.x = delta > 0 ? bx - size3D.x / 2 - eps : (bx + 1) + size3D.x / 2 + eps;
                            else if (axis === 'y') position3.y = delta > 0 ? by - size3D.y / 2 - eps : (by + 1) + size3D.y / 2 + eps;
                            else if (axis === 'z') position3.z = delta > 0 ? bz - size3D.z / 2 - eps : (bz + 1) + size3D.z / 2 + eps;
                            return 0;
                        }
                    }
                }
            }
            position3[axis] += delta;
            return delta;
        }

        getBrickRef(x, y, z) {
            if (!this.inBounds(x, y, z)) return -1;
            return this.brickRefs.get(`${x},${y},${z}`) ?? -1;
        }

        getBrick(x, y, z) {
            const ref = this.getBrickRef(x, y, z);
            return ref < 0 ? null : this.brickPool.get(ref);
        }

        setSpecialBlock(x, y, z, blockId, brick) {
            this.setBlock(x, y, z, blockId);
            const ref = this.brickPool.add(brick);
            this.brickRefs.set(`${x},${y},${z}`, ref);
        }

        // Raycasting (DDA)
        raycastVoxel(origin, dir, maxDist = 64) {
            const stepX = Math.sign(dir.x), stepY = Math.sign(dir.y), stepZ = Math.sign(dir.z);
            const tDeltaX = Math.abs(1 / dir.x), tDeltaY = Math.abs(1 / dir.y), tDeltaZ = Math.abs(1 / dir.z);

            let vx = Math.floor(origin.x), vy = Math.floor(origin.y), vz = Math.floor(origin.z);
            let tMaxX = stepX > 0 ? (Math.floor(origin.x) + 1 - origin.x) * tDeltaX : (origin.x - Math.floor(origin.x)) * tDeltaX;
            let tMaxY = stepY > 0 ? (Math.floor(origin.y) + 1 - origin.y) * tDeltaY : (origin.y - Math.floor(origin.y)) * tDeltaY;
            let tMaxZ = stepZ > 0 ? (Math.floor(origin.z) + 1 - origin.z) * tDeltaZ : (origin.z - Math.floor(origin.z)) * tDeltaZ;

            let t = 0;
            while (t < maxDist) {
                if (this.isSolid(vx, vy, vz)) {
                    const id = this.get(vx, vy, vz);
                    const hitPos = { x: origin.x + dir.x * t, y: origin.y + dir.y * t, z: origin.z + dir.z * t };
                    return { hit: true, t, vox: { x: vx, y: vy, z: vz }, id, hitPos };
                }
                if (tMaxX < tMaxY) {
                    if (tMaxX < tMaxZ) { vx += stepX; t = tMaxX; tMaxX += tDeltaX; }
                    else { vz += stepZ; t = tMaxZ; tMaxZ += tDeltaZ; }
                } else {
                    if (tMaxY < tMaxZ) { vy += stepY; t = tMaxY; tMaxY += tDeltaY; }
                    else { vz += stepZ; t = tMaxZ; tMaxZ += tDeltaZ; }
                }
            }
            return { hit: false };
        }

        fillTestGround(world, maxX = 48, maxZ = 48) {
            for (let x = 0; x < maxX; x++) {
                for (let z = 0; z < maxZ; z++) {
                    this.setBlock(x, -2, z, BlockDefs_ByName.STONE);
                    if (x > 4 && x < maxX - 4 && z > 4 && z < maxZ - 4) {
                        this.setBlock(x, -1, z, BlockDefs_ByName.GRASS);
                    }
                }
            }
            // Add a special block as a test
            const testBrick = BrickPool.createRandom8x8Brick();
            this.setSpecialBlock(20, 0, 20, BlockDefs_ByName.SP, testBrick);
        }
    }






    // --- Physics Simulator (port of PhysicSimulator_BlockWorld) ---
    class PhysicSimulator extends GameObject {
        constructor(world) {
            super('PhysicSimulator', 'physic');
            this.tags.add('physics');
            this.world = world;
            this.bodies = []; // list of entities to simulate
            this.gravity = 0.006;
        }
        // Register an entity for physics simulation.
        // Entity must have: position (Vec3), delta (Vec3), size3D ({x,y,z}), onGround (bool)
        register(entity) {
            this.bodies.push(entity);
        }
        update_self() {
            const world = this.world;
            for (const t of this.bodies) {
                const ts = t.timeScale ?? 1.0;
                // Gravity
                t.delta.y -= this.gravity * ts;

                // Resolve each axis using the original precise method
                t.delta.x = world.moveAxisCheck_CenterType(t.position, 'x', t.delta.x, t.size3D);
                t.delta.z = world.moveAxisCheck_CenterType(t.position, 'z', t.delta.z, t.size3D);
                const prevDeltaY = t.delta.y;
                t.delta.y = world.moveAxisCheck_CenterType(t.position, 'y', t.delta.y, t.size3D);

                // Refined onGround logic
                if (t.delta.y === 0 && prevDeltaY < 0) {
                    t.onGround = true;
                } else if (t.delta.y > 0) {
                    t.onGround = false;
                }

                // Clamp Y so entities can't fall out of the world
                t.position.y = Math.max(-10, t.position.y);
            }
        }
    }

    // --- Asset Factory ---
    const createIndexedTexture = (key) => {
        const asset = IndexedImageLibrary[key];
        if (!asset) return null;
        const canvas = document.createElement('canvas');
        canvas.width = asset.width; canvas.height = asset.height;
        const ctx = canvas.getContext('2d');
        const img = ctx.createImageData(asset.width, asset.height);
        for (let i = 0; i < asset.data.length; i++) {
            const idx = asset.data[i];
            if (idx === 0) { img.data[i * 4 + 3] = 0; }
            else {
                const c = asset.palette[idx];
                img.data[i * 4] = c[0]; img.data[i * 4 + 1] = c[1]; img.data[i * 4 + 2] = c[2]; img.data[i * 4 + 3] = 255;
            }
        }
        ctx.putImageData(img, 0, 0);
        const tex = new THREE.CanvasTexture(canvas);
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        return tex;
    };

    const createRGBTexture = (data, w, h) => {
        const texData = new Uint8Array(w * h * 4);
        for (let i = 0; i < w * h; i++) {
            texData[i * 4] = data[i * 3]; texData[i * 4 + 1] = data[i * 3 + 1]; texData[i * 4 + 2] = data[i * 3 + 2]; texData[i * 4 + 3] = 255;
        }
        const tex = new THREE.DataTexture(texData, w, h, THREE.RGBAFormat);
        tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;
        tex.needsUpdate = true;
        return tex;
    };

    const createTextureSet = (baseKey) => {
        const t = (suffix) => createIndexedTexture(suffix ? `${baseKey}_${suffix}` : baseKey);
        const front = t('');
        const back = t('back');
        const side = t('side');
        const side1 = t('side1');
        const side2 = t('side2');
        // Fallback: first available texture so no direction is ever null
        const any = front || side || side1 || side2 || back;
        return {
            front: front || side1 || side || any,
            back: back || side2 || side || any,
            side: side || side1 || side2 || front || any,
            side1: side1 || side || front || any,
            side2: side2 || side || back || any
        };
    };

    class EnemyNode extends GameObject {
        constructor(x, y, z, scene, player, camera) {
            super('Enemy', 'enemy');
            this.tags.add('actor');
            this.tags.add('enemy'); // Specific tag for HitStop
            this.scene = scene;
            this.player = player;
            this.camera = camera;
            this.pos = new Vec3(x, y, z);
            this.position = this.pos; // Alias for PhysicSimulator
            this.delta = new Vec3();
            this.onGround = false;
            this.tags = new Set();
            this.hp = 30;
            this.maxHp = 30;
            this.hitTimer = 0;
            this.knockback = new Vec3();
            this.size3D = { x: 0.6, y: 1.0, z: 0.6 };
            this.combat = {
                state: 'idle',
                timer: 0,
                attackRange: 1.45,
                aggroRange: 8.0,
                attackCooldown: 120,
                strafeDir: Math.random() < 0.5 ? -1 : 1
            };
            this.screenPos = null;
            this.sy0 = 0;
        }

        update_self() {
            if (this.hitTimer > 0) {
                this.hitTimer--;
                this.pos.x += this.knockback.x;
                this.pos.z += this.knockback.z;
                this.knockback.mul(0.8);
            }
        }

        damage(v = 1) {
            this.hp -= v;
            this.hitTimer = 6;

            const playerPos = this.player.position;
            const dx = this.pos.x - playerPos.x;
            const dz = this.pos.z - playerPos.z;
            const len = Math.hypot(dx, dz) || 1;
            this.knockback.x += (dx / len) * 0.18;
            this.knockback.z += (dz / len) * 0.18;

            if (this.hp <= 0) {
                this.tags.add('dead');
                this.hp = 0;
            }
        }
    }

    // --- Combat System (port of TPSCombatInteractor) ---
    class CombatSystem extends GameObject {
        constructor(player, scene, camera, cameraController = null) {
            super('CombatSystem', 'combat');
            this.player = player;
            this.scene = scene;
            this.camera = camera;
            this.cameraController = cameraController;

            this.lockedEnemy = null;
            this.comboStep = 0;
            this.comboTimer = 0;
            this.attackTimer = 0;
            this.AttackWindup = 4
            this.attackDuration = 16;
            this.attackHitDone = false;

            this.dodgeTimer = 0;
            this.dodgeDuration = 12;
            this.dodgeCooldown = 0;
            this.invulnTimer = 0;
            this.dodgeDistance = 1.6;
            this.dodgeDir = new Vec3(0, 0, 1);
            this.dodgeMoved = 0;

            this.hitStop = 0;
            this.shakeTimer = 0;
            this.shakeAmount = 0;
            this.globalTimeScale = 1.0;
            this.bulletTimeTimer = 0;
            this.slowTimer = 0;

            this.attackRange = 1.85;
            this.attackAngleDeg = 70;
            this.baseDamage = 8;
            this.moveMulDuringAttack = 0.18;
            this.moveMulDuringDodge = 1.8;

            this.uiMessage = '';
            this.uiTimer = 0;

            this._enemyList = [];
        }

        onAttach(master) {
            super.onAttach(master);
            // Register callbacks to the input system
            onPressHandlers.attack = () => this.Attack_handleEvent();
            onPressHandlers.lockon = () => this.LockOn_toggle();
            onPressHandlers.dodge = () => this.Dodge_handleEvent();
        }

        registerEnemy(e) { this._enemyList.push(e); }
        get enemies() { return this._enemyList; }
        get threeCamera() { return this.camera; } // If we need it later

        easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) * 0.5; }
        distanceXZ(a, b) { return Math.hypot(a.x - b.x, a.z - b.z); }

        requestHitStop(frames, shake = 0.15) {
            this.hitStop = frames;
            this.shakeTimer = frames + 3;
            this.shakeAmount = shake;
            if (this.master) this.master.eventHub.emit('hit_stop_start', this, frames);
        }

        update_self() {
            // Camera Shake logic (apply to the actual three.js camera)
            if (this.shakeTimer > 0) {
                this.shakeTimer--;
                const s = this.shakeAmount * (this.shakeTimer / 10);
                this.camera.position.x += (Math.random() - 0.5) * s;
                this.camera.position.y += (Math.random() - 0.5) * s;
                this.shakeAmount *= 0.92;
            }

            // HitStop management (world freeze trigger)
            let playerTS = 1.0;
            if (this.hitStop > 0) {
                this.hitStop--;
                if (this.hitStop <= 0 && this.master) {
                    this.master.eventHub.emit('hit_stop_end', this);
                }
                playerTS = 0.15; // Slow-mo for player during hit stop
            }
            this.playerTimeScale = playerTS;
            if (this.player) this.player.timeScale = playerTS;

            if (this.cameraController) {
                this.cameraController.activeView = !(this.lockedEnemy && !this.lockedEnemy.tags.has('dead'));
            }

            const enemyTS = (this.hitStop > 0) ? 0.0 : // Frozen during hit stop
                this.bulletTimeTimer > 0 ? 0.0 :
                    this.slowTimer > 0 ? 0.25 : 1.0;

            if (this.bulletTimeTimer > 0) this.bulletTimeTimer--;
            if (this.slowTimer > 0) this.slowTimer--;

            if (this.comboTimer > 0) this.comboTimer -= playerTS;
            if (this.attackTimer > 0) this.attackTimer -= playerTS;
            if (this.dodgeTimer > 0) this.dodgeTimer -= playerTS;
            if (this.dodgeCooldown > 0) this.dodgeCooldown -= playerTS;
            if (this.invulnTimer > 0) this.invulnTimer -= playerTS;
            if (this.uiTimer > 0) this.uiTimer--;

            if (this.comboTimer <= 0 && this.attackTimer <= 0) this.comboStep = 0;

            // Jump suppression during dodge
            if (this.dodgeTimer > 0) {
                this.player.delta.y = Math.min(this.player.delta.y, 0);
            }

            this.LockOn_update();
            this.PlayerFacing_update();
            this.Attack_update();
            this.Dodge_update();
            this.Enemies_update(enemyTS);
        }

        draw() {
            this.drawCombatHUD(uiCtx);
        }

        // --- Input handlers ---
        Attack_handleEvent() {
            if (this.attackTimer > 0 || this.dodgeTimer > 0) return;
            this.comboStep = (this.comboStep % 3) + 1;
            this.comboTimer = 24;
            this.attackTimer = this.attackDuration;
            this.attackHitDone = false;
            this.uiMessage = `ATTACK ${this.comboStep}`;
            this.uiTimer = 20;
        }

        Dodge_handleEvent() {
            if (this.dodgeCooldown > 0 || this.attackTimer > 0 || this.dodgeTimer > 0) return;
            this.dodgeTimer = this.dodgeDuration;
            this.dodgeCooldown = 20;
            this.invulnTimer = 10;
            this.dodgeDir = this.Dodge_getDirection();
            this.dodgeMoved = 0;
            this.uiMessage = 'DODGE';
            this.uiTimer = 14;

            // Perfect dodge check
            for (const enemy of this.enemies) {
                if (enemy.tags.has('dead') || !enemy.combat) continue;
                if (enemy.combat.state === 'attack' && enemy.combat.timer >= 4) {
                    const d = this.distanceXZ(enemy.position, this.player.position);
                    if (d < 2.2) {
                        this.bulletTimeTimer = 300;
                        this.hitStop = 2;
                        this.invulnTimer = 30;
                        enemy.combat.state = 'cooldown';
                        enemy.combat.timer = 18;
                        this.uiMessage = 'PERFECT DODGE';
                        this.uiTimer = 24;
                    }
                }
            }
        }

        Dodge_getDirection() {
            const keys = this.master.keys;
            const yaw = this.player.yaw;
            const fy = yaw * Math.PI / 180;
            const forward = new Vec3(Math.sin(fy), 0, Math.cos(fy));
            const right = new Vec3(Math.cos(fy), 0, -Math.sin(fy));

            let x = 0, z = 0;
            if (keys['KeyA']) x += 1;
            if (keys['KeyD']) x -= 1;
            if (keys['KeyW']) z += 1;
            if (keys['KeyS']) z -= 1;
            if (x === 0 && z === 0) return forward;
            return forward.clone().mul(z).add(right.clone().mul(x)).norm();
        }

        LockOn_toggle() {
            const alive = this.enemies.filter(e => !e.tags.has('dead'));
            if (alive.length === 0) { this.lockedEnemy = null; return; }
            if (!this.lockedEnemy || this.lockedEnemy.tags.has('dead')) {
                this.lockedEnemy = this.findNearestEnemy(10); return;
            }
            const idx = alive.indexOf(this.lockedEnemy);
            this.lockedEnemy = alive[(idx + 1) % alive.length];
        }

        // --- Player combat ---
        Attack_update() {
            if (this.attackTimer <= 0) return;
            this.player.delta.x *= this.moveMulDuringAttack;
            this.player.delta.z *= this.moveMulDuringAttack;

            // Skip first 3 frames (wind-up)
            const activeFrame = this.attackDuration - this.attackTimer;
            if (!this.attackHitDone && activeFrame > this.AttackWindup) {
                this.attackHitDone = true;
                this.Attack_resolveMeleeHit();
            }
        }

        Attack_resolveMeleeHit() {
            const forward = this.PlayerFacing_getPlayerForward();
            const origin = this.player.position;
            for (const enemy of this.enemies) {
                if (enemy.tags.has('dead')) continue;
                const toEnemy = enemy.position.clone().sub(origin);
                toEnemy.y = 0;
                const dist = toEnemy.len();
                if (dist > this.attackRange) continue;
                const dir = toEnemy.clone().norm();
                const dot = forward.x * dir.x + forward.z * dir.z;
                const ang = Math.acos(Math.max(-1, Math.min(1, dot))) * 180 / Math.PI;
                if (ang > this.attackAngleDeg * 0.5) continue;
                const dmg = this.baseDamage + (this.comboStep - 1) * 3;
                enemy.damage(dmg);
                if (enemy.combat) {
                    enemy.combat.hitFlash = 6;
                    enemy.combat.poise = (enemy.combat.poise || 0) + 1;
                    if (enemy.combat.poise >= 2) {
                        enemy.combat.state = 'cooldown';
                        enemy.combat.timer = 20;
                        enemy.combat.poise = 0;
                    }
                }

                // Finisher (combo 3) has more impact
                if (this.comboStep === 3) {
                    this.requestHitStop(100, 0.4); // Longer freeze, big shake
                    this.slowTimer = 20;         // Brief slow-mo after finisher
                } else {
                    this.requestHitStop(40, 0.15); // Normal hit
                }

                this.uiMessage = `HIT ${dmg}`;
                this.uiTimer = 12;
                if (enemy.hp <= 0) {
                    enemy.tags.add('dead');
                    this.scene.remove(enemy.sprite);
                    log("Enemy Defeated!");
                }
                break;
            }
        }

        Dodge_update() {
            if (this.dodgeTimer <= 0) return;
            const t = 1 - (this.dodgeTimer / this.dodgeDuration);
            const eased = this.easeInOutSine(t);
            const targetMoved = this.dodgeDistance * eased;
            const delta = targetMoved - this.dodgeMoved;
            this.dodgeMoved = targetMoved;
            this.player.delta.x += this.dodgeDir.x * delta;
            this.player.delta.z += this.dodgeDir.z * delta;
        }

        LockOn_update() {
            if (this.lockedEnemy && this.lockedEnemy.tags.has('dead')) this.lockedEnemy = null;
            if (this.lockedEnemy) {
                const d = this.distanceXZ(this.lockedEnemy.position, this.player.position);
                if (d > 12) this.lockedEnemy = null;
            }

            // Unilateral Camera Override if locked on
            if (this.lockedEnemy) {
                const playerLookAt = new THREE.Vector3(this.player.position.x, this.player.position.y + 0.5, this.player.position.z);
                const enemyWorldPos = new THREE.Vector3(this.lockedEnemy.position.x, this.lockedEnemy.position.y + 0.8, this.lockedEnemy.position.z);
                const midPoint = playerLookAt.clone().lerp(enemyWorldPos, 0.35);

                const toPlayer = playerLookAt.clone().sub(enemyWorldPos).normalize();
                const camHeight = 1.8;
                const camDist = 3.2;
                const sideOffset = toPlayer.clone().cross(new THREE.Vector3(0, 1, 0)).normalize().multiplyScalar(0.4);

                const desiredCamPos = playerLookAt.clone()
                    .add(toPlayer.clone().multiplyScalar(camDist))
                    .add(new THREE.Vector3(0, camHeight, 0))
                    .add(sideOffset);

                this.camera.position.lerp(desiredCamPos, 0.1);
                this.camera.lookAt(midPoint);
            }
        }

        PlayerFacing_update() {
            if (!this.lockedEnemy) return;
            if (this.attackTimer > 0 || this.dodgeTimer > 0) return;

            const dx = this.lockedEnemy.position.x - this.player.position.x;
            const dz = this.lockedEnemy.position.z - this.player.position.z;
            const len = Math.hypot(dx, dz) || 1;
            this.player.direction.set(dx / len, 0, dz / len);

            // Unilateral Rotation Override
            const targetYaw = Math.atan2(dx, dz) * 180 / Math.PI;
            let diff = targetYaw - this.player.yaw;
            while (diff > 180) diff -= 360;
            while (diff < -180) diff += 360;
            this.player.yaw += diff * 0.12;
            this.player.pitch = lerp(this.player.pitch, 12, 0.08);
        }

        PlayerFacing_getPlayerForward() {
            if (this.lockedEnemy) {
                const dx = this.lockedEnemy.position.x - this.player.position.x;
                const dz = this.lockedEnemy.position.z - this.player.position.z;
                const len = Math.hypot(dx, dz) || 1;
                return new Vec3(dx / len, 0, dz / len);
            }
            if (this.player.direction && this.player.direction.len() > 0.001)
                return this.player.direction.clone().norm();
            const yaw = this.player.yaw;
            const fy = yaw * Math.PI / 180;
            return new Vec3(Math.sin(fy), 0, Math.cos(fy)).norm();
        }

        // --- Enemy combat AI ---
        Enemies_update(dt) {
            for (const enemy of this.enemies) {
                if (enemy.tags.has('dead') || !enemy.combat) continue;
                if (enemy.combat.hitFlash > 0) enemy.combat.hitFlash -= dt;
                if (enemy.hitTimer > 0) continue;

                const dist = this.distanceXZ(enemy.position, this.player.position);
                const c = enemy.combat;

                switch (c.state) {
                    case 'idle':
                        if (dist < c.aggroRange) { c.state = 'strafe'; c.timer = 20 + Math.random() * 20; }
                        break;
                    case 'strafe':
                        c.timer -= dt;
                        this.moveEnemyStrafe(enemy, dist);
                        if (dist <= c.attackRange) { c.state = 'windup'; c.timer = 22; }
                        else if (c.timer <= 0) { c.timer = 20 + Math.random() * 20; c.strafeDir *= -1; }
                        break;
                    case 'windup':
                        c.timer -= dt;
                        this.faceEnemyToPlayer(enemy);
                        if (dist > c.attackRange + 0.5) { c.state = 'strafe'; c.timer = 16; }
                        else if (c.timer <= 0) { c.state = 'attack'; c.timer = 10; }
                        break;
                    case 'attack':
                        c.timer -= dt;
                        this.enemyLunge(enemy);
                        if (c.timer <= 6 && c.timer > 4) this.tryEnemyHit(enemy);
                        if (c.timer <= 0) { c.state = 'cooldown'; c.timer = 18; }
                        break;
                    case 'cooldown':
                        c.timer -= dt;
                        if (c.timer <= 0) { c.state = 'strafe'; c.timer = 20; }
                        break;
                }
            }
        }

        moveEnemyStrafe(enemy, dist) {
            const dx = this.player.position.x - enemy.position.x;
            const dz = this.player.position.z - enemy.position.z;
            const len = Math.hypot(dx, dz) || 1;
            const nx = dx / len, nz = dz / len;
            const tx = -nz * enemy.combat.strafeDir, tz = nx * enemy.combat.strafeDir;
            const approach = dist > 1.9 ? 0.026 : -0.012;
            enemy.position.x += nx * approach + tx * 0.022;
            enemy.position.z += nz * approach + tz * 0.022;
        }

        enemyLunge(enemy) {
            const dx = this.player.position.x - enemy.position.x;
            const dz = this.player.position.z - enemy.position.z;
            const len = Math.hypot(dx, dz) || 1;
            enemy.position.x += (dx / len) * 0.05;
            enemy.position.z += (dz / len) * 0.05;
        }

        tryEnemyHit(enemy) {
            if (this.bulletTimeTimer > 0) return;
            const dist = this.distanceXZ(enemy.position, this.player.position);
            if (dist > 1.55 || this.invulnTimer > 0) return;
            this.uiMessage = 'PLAYER HIT';
            this.uiTimer = 16;
            this.hitStop = 4;
            const dx = this.player.position.x - enemy.position.x;
            const dz = this.player.position.z - enemy.position.z;
            const len = Math.hypot(dx, dz) || 1;
            this.player.delta.x += (dx / len) * 0.18;
            this.player.delta.z += (dz / len) * 0.18;
        }

        faceEnemyToPlayer(enemy) {
            const dx = this.player.position.x - enemy.position.x;
            const dz = this.player.position.z - enemy.position.z;
            const len = Math.hypot(dx, dz) || 1;
            if (!enemy.direction) enemy.direction = new Vec3();
            enemy.direction.set(dx / len, 0, dz / len);
        }

        findNearestEnemy(maxDist = 999) {
            let best = null, bestDist = maxDist;
            for (const e of this.enemies) {
                if (e.tags.has('dead')) continue;
                const d = this.distanceXZ(e.position, this.player.position);
                if (d < bestDist) { best = e; bestDist = d; }
            }
            return best;
        }

        getEnemyStateLabel(enemy) {
            if (enemy.tags.has('dead')) return 'dead';
            const s = enemy.combat?.state;
            const map = { idle: 'IDLE', strafe: 'STRAFE', windup: 'WINDUP', attack: 'ATTACK', cooldown: 'COOLDOWN' };
            return map[s] || String(s).toUpperCase();
        }

        // --- HUD ---
        drawCombatHUD(ctx) {
            ctx.save();
            const W = 480, H = 320;

            // Lock-on reticle
            if (this.lockedEnemy && !this.lockedEnemy.tags.has('dead') && this.lockedEnemy.screenPos) {
                const sp = this.lockedEnemy.screenPos;
                ctx.strokeStyle = '#ff4d6d';
                ctx.lineWidth = 2;
                ctx.strokeRect(sp.x - 20, sp.y - 20, 40, 40);
            }

            // Player combat state
            ctx.fillStyle = 'white';
            ctx.font = 'bold 11px monospace';
            ctx.fillText(`combo:${this.comboStep}`, 10, 38);
            ctx.fillText(`atk:${Math.ceil(this.attackTimer)}`, 10, 51);
            ctx.fillText(`dodgeCD:${Math.ceil(this.dodgeCooldown)}`, 10, 64);
            if (this.bulletTimeTimer > 0) {
                ctx.fillStyle = '#7df9ff';
                ctx.font = 'bold 13px monospace';
                ctx.fillText(`BULLET TIME ${Math.ceil(this.bulletTimeTimer)}`, 10, 79);
            }

            // Action message
            if (this.uiTimer > 0) {
                ctx.fillStyle = '#ffd166';
                ctx.font = 'bold 18px monospace';
                ctx.fillText(this.uiMessage, 12, 100);
            }

            // Enemy telegraph labels & bars
            for (const e of this.enemies) {
                if (e.tags.has('dead') || !e.screenPos || e.screenPos.z >= 1.0) continue;
                if (!e.combat) continue;

                const label = `${this.getEnemyStateLabel(e)} ${Math.ceil(e.combat.timer)}`;
                const tx = e.screenPos.x;
                const ty = e.sy0 - 8;

                ctx.save();
                ctx.font = 'bold 11px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';

                let color = '#ffffff';
                if (e.combat.state === 'windup') color = '#ffb347';
                else if (e.combat.state === 'attack') color = '#ff4d4d';
                else if (e.combat.state === 'cooldown') color = '#7fd1ff';
                else if (e.combat.state === 'strafe') color = '#b8ffb0';

                ctx.strokeStyle = 'rgba(0,0,0,0.9)';
                ctx.lineWidth = 3;
                ctx.strokeText(label, tx, ty);
                ctx.fillStyle = color;
                ctx.fillText(label, tx, ty);
                ctx.restore();

                // HP bar
                const bw = 36, bh = 4;
                const bx = tx - bw / 2, by = e.sy0 - 4;
                const ratio = Math.max(0, e.hp / e.maxHp);
                ctx.fillStyle = '#400';
                ctx.fillRect(bx, by, bw, bh);
                ctx.fillStyle = ratio > 0.5 ? '#0f0' : ratio > 0.25 ? '#ff0' : '#f00';
                ctx.fillRect(bx, by, bw * ratio, bh);

                // Telegraph bars
                if (e.combat.state === 'windup') {
                    ctx.fillStyle = 'rgba(255,120,120,0.85)';
                    ctx.fillRect(tx - 18, e.sy0 - 14, 36, 6);
                } else if (e.combat.state === 'attack') {
                    ctx.fillStyle = 'rgba(255,0,0,0.9)';
                    ctx.fillRect(tx - 20, e.sy0 - 14, 40, 8);
                }
            }

            // --- Debug: Bounding Boxes (3D Wireframe) ---
            const drawAABB = (worldPos, size, color) => {
                if (!worldPos || !size) return;
                const corners = [];
                for (let dy of [-0.5, 0.5]) for (let dz of [-0.5, 0.5]) for (let dx of [-0.5, 0.5]) {
                    const p = new THREE.Vector3(worldPos.x + dx * size.x, worldPos.y + dy * size.y, worldPos.z + dz * size.z);
                    p.project(this.camera);
                    corners.push({ x: (p.x * 0.5 + 0.5) * 480, y: (-p.y * 0.5 + 0.5) * 320, z: p.z });
                }
                if (corners.every(c => c.z >= 1.0)) return;

                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                const drawLine = (i, j) => {
                    const c1 = corners[i], c2 = corners[j];
                    if (c1.z >= 1.0 || c2.z >= 1.0) return;
                    ctx.beginPath(); ctx.moveTo(c1.x, c1.y); ctx.lineTo(c2.x, c2.y); ctx.stroke();
                };

                // Connect edges (8 corners, 12 edges)
                drawLine(0, 1); drawLine(2, 3); drawLine(4, 5); drawLine(6, 7); // X edges
                drawLine(0, 2); drawLine(1, 3); drawLine(4, 6); drawLine(5, 7); // Z edges
                drawLine(0, 4); drawLine(1, 5); drawLine(2, 6); drawLine(3, 7); // Y edges
            };

            if (this.player) drawAABB(this.player.position, this.player.size3D, 'rgba(255,255,0,0.8)');
            for (const e of this.enemies) {
                if (!e.tags.has('dead') && e.pos && e.size3D) {
                    drawAABB(e.pos, e.size3D, 'rgba(255,0,0,0.8)');
                }
            }

            // Controls hint
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '9px monospace';
            ctx.textAlign = 'left';
            ctx.fillText('F:ATTACK  E:LOCKON  SPC:DODGE', 10, H - 8);

            ctx.restore();
        }
    }

    class ThreeRenderer extends GameObject {
        constructor() {
            super('ThreeRenderer', 'renderer');
            this.scene = new THREE.Scene();
            this.camera = new THREE.PerspectiveCamera(70, 480 / 320, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
            this.renderer.setSize(480, 320);
            this.renderer.domElement.id = 'webgl-canvas';
            document.getElementById('container').prepend(this.renderer.domElement);

            this.scene.background = new THREE.Color(0xff8c59);
            this.scene.fog = new THREE.Fog(0xff8c59, 5, 80);
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            this.sun = new THREE.DirectionalLight(0xffffff, 1.0);
            this.sun.position.set(10, 20, 10);
            this.scene.add(this.sun);
        }
        draw() {
            this.renderer.render(this.scene, this.camera);
        }
    }

    class WorldComponent extends GameObject {
        constructor(scene) {
            super('World', 'world');
            this.scene = scene;
            this.world = new ChunkWorld({ seed: 999 });
            this.meshes = new Map();
            this.boxGeo = new THREE.BoxGeometry(0.999, 0.999, 0.999);
            this.mats = new Map();
        }
        onAttach(master) {
            super.onAttach(master);
            const grassTex = createRGBTexture(grassFloor_32RGB, 32, 32);

            for (const id in BlockDefs) {
                const def = BlockDefs[id];
                if (def.renderMode === 'empty') continue;

                if (parseInt(id) === 3) {
                    // ID 3: Grass block. Multi-material.
                    // Array of 6 materials: +x, -x, +y, -y, +z, -z
                    const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
                    const grassMat = new THREE.MeshLambertMaterial({ color: def.color, map: grassTex });
                    this.mats.set(3, [
                        dirtMat,  // +x Right
                        dirtMat,  // -x Left
                        grassMat, // +y Top
                        dirtMat,  // -y Bottom
                        dirtMat,  // +z Front
                        dirtMat   // -z Back
                    ]);
                } else {
                    // Standard uniform block
                    this.mats.set(parseInt(id), new THREE.MeshLambertMaterial({
                        color: def.color
                    }));
                }
            }
        }
        update_self() {
            for (const [k, chunk] of this.world.chunks) {
                if (chunk.isDirty) {
                    if (this.meshes.has(k)) {
                        const old = this.meshes.get(k);
                        this.scene.remove(old);
                    }
                    const group = new THREE.Group();
                    const s = chunk.chunkSize;
                    for (let lz = 0; lz < s; lz++) {
                        for (let ly = 0; ly < s; ly++) {
                            for (let lx = 0; lx < s; lx++) {
                                const id = chunk.get(lx, ly, lz);
                                if (id === 0) continue;
                                const mat = this.mats.get(id) || this.mats.get(2);
                                const m = new THREE.Mesh(this.boxGeo, mat);
                                m.position.set((chunk.cx * s + lx + 0.5), chunk.cy * s + ly + 0.5, chunk.cz * s + lz + 0.5);
                                group.add(m);
                            }
                        }
                    }
                    this.meshes.set(k, group);
                    this.scene.add(group);
                    chunk.isDirty = false;
                }
            }
        }
    }


    class SpriteComponent extends GameObject {
        constructor(target, textureSet, scene, camera, offsetY = 0) {
            super('SpriteVisual', 'sprite_visual');
            this.target = target;
            this.texSet = textureSet;
            this.scene = scene;
            this.camera = camera;
            this.offsetY = offsetY;

            const mat = new THREE.MeshBasicMaterial({
                transparent: true,
                alphaTest: 0.5,
                side: THREE.DoubleSide
            });
            const geom = new THREE.PlaneGeometry(1, 1);
            this.mesh = new THREE.Mesh(geom, mat);
            this.mesh.scale.set(2, 2, 1);
        }

        onAttach(master) {
            super.onAttach(master);
            this.scene.add(this.mesh);
        }

        update_self() {
            const t = this.target;
            if (!t) return;

            this.mesh.position.set(t.position.x, t.position.y + this.offsetY, t.position.z);
            if (t.tags && t.tags.has('dead')) { this.mesh.visible = false; return; }
            this.mesh.visible = true;

            // Billboarding
            if (this.camera) this.mesh.quaternion.copy(this.camera.quaternion);

            // 8-direction selection
            let eYaw = 0;
            if (t.direction && t.direction.len() > 0.001) {
                eYaw = Math.atan2(t.direction.x, t.direction.z);
            }
            let cYaw = 0;
            if (this.camera) {
                const cFwd = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
                cYaw = Math.atan2(cFwd.x, cFwd.z);
            }

            let diff = eYaw - cYaw;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;

            const absDiff = Math.abs(diff);
            const pi8 = Math.PI / 8;
            let currentTex = this.texSet.front;

            if (absDiff <= pi8) currentTex = this.texSet.back;
            else if (absDiff <= 3 * pi8) currentTex = this.texSet.side2;
            else if (absDiff <= 5 * pi8) currentTex = this.texSet.side;
            else if (absDiff <= 7 * pi8) currentTex = this.texSet.side1;
            else currentTex = this.texSet.front;

            if (currentTex) {
                this.mesh.material.map = currentTex;
                // Flipping
                if (diff < -0.05) {
                    currentTex.repeat.x = 1; currentTex.offset.x = 0;
                } else if (diff > 0.05) {
                    currentTex.repeat.x = -1; currentTex.offset.x = 1;
                }
            }

            // Screen Projection for HUD
            if (this.camera && t.hp !== undefined) {
                const ndc = new THREE.Vector3(t.position.x, t.position.y + this.offsetY, t.position.z).project(this.camera);
                t.screenPos = { x: (ndc.x * 0.5 + 0.5) * 480, y: (-ndc.y * 0.5 + 0.5) * 320, z: ndc.z };
                t.sy0 = t.screenPos.y - 40;
            }
        }
    }

    // --- MotionBridge: State-driven texSet swapper ---
    // Watches a combat source and swaps the SpriteComponent's texSet.
    // Each "motion" entry is either:
    //   - A single texSet (8-dir): used as a static pose
    //   - An array of texSets: frames played sequentially based on the timer
    //
    // stateResolver(combat) => { state: string, progress: 0..1 }
    //   If not provided, defaults to reading CombatSystem timers (player).
    class MotionBridge extends GameObject {
        constructor(targetSprite, sourceCombat, motionsMap, stateResolver) {
            super('MotionBridge', 'motion_bridge');
            this.sprite = targetSprite;   // SpriteComponent to control
            this.combat = sourceCombat;   // combat source (CombatSystem or plain object)
            this.motions = motionsMap;     // { 'idle': texSet, 'attack': [texSet0, texSet1, ...], ... }
            this.resolve = stateResolver || MotionBridge.defaultPlayerResolver;
        }

        // Default resolver: reads CombatSystem timers (player)
        static defaultPlayerResolver(c) {
            let state = 'idle';
            if (c.attackTimer > 0) state = 'attack';
            else if (c.dodgeTimer > 0) state = 'dodge';
            else if (c.comboTimer > 0) state = 'ready';

            let progress = 0;
            if (state === 'attack') progress = 1.0 - (c.attackTimer / c.attackDuration);
            else if (state === 'dodge') progress = 1.0 - (c.dodgeTimer / c.dodgeDuration);
            return { state, progress };
        }

        // Enemy resolver: reads plain { state, timer } objects
        static enemyResolver(c) {
            const state = c.state || 'idle';
            // Duration lookup per state (for animation frame calc)
            const durations = { windup: 22, attack: 10, cooldown: 18 };
            const dur = durations[state] || 1;
            const progress = 1.0 - (Math.max(c.timer || 0, 0) / dur);
            return { state, progress };
        }

        update_self() {
            const { state, progress } = this.resolve(this.combat);
            const motion = this.motions[state] || this.motions['idle'];
            if (!motion) return;

            if (Array.isArray(motion)) {
                const frameIdx = Math.min(Math.floor(progress * motion.length), motion.length - 1);
                this.sprite.texSet = motion[frameIdx];
            } else {
                this.sprite.texSet = motion;
            }
        }
    }


    class ControllerCameraFollow extends GameObject {
        constructor(camera, target) {
            super('CameraFollow', 'cam_follow');
            this.camera = camera;
            this.target = target;
            this.activeView = true;
        }

        update_self() {
            if (this.activeView) this.update_view();
            this.update_pawn();
        }

        update_view() {
            const t = this.target;
            if (!t) return;
            const ts = t.timeScale ?? 1.0;
            const rotSpeed = 2.0 * ts;

            // 1. View Rotation Control (via Actions)
            if (actions['camLeft']) t.yaw += rotSpeed;
            if (actions['camRight']) t.yaw -= rotSpeed;
            if (actions['camUp']) t.pitch = Math.max(-60, t.pitch - rotSpeed);
            if (actions['camDown']) t.pitch = Math.min(60, t.pitch + rotSpeed);

            // 2. Camera Placement (Follow with Lerp)
            const playerLookAt = new THREE.Vector3(t.position.x, t.position.y + 0.5, t.position.z);
            const dist = 4.0;
            const camFwd = Vec3.fromYawPitch(t.yaw, t.pitch);
            const targetCamPos = playerLookAt.clone().add(new THREE.Vector3(camFwd.x, camFwd.y, camFwd.z).multiplyScalar(-dist));

            this.camera.position.lerp(targetCamPos, 0.2);
            this.camera.lookAt(playerLookAt);
        }

        update_pawn() {
            const t = this.target;
            if (!t) return;
            const ts = t.timeScale ?? 1.0;
            const moveSpeed = 0.08 * ts;

            // 3. Pawn Movement (Camera-Relative via Actions)
            let forward = 0, side = 0;
            if (actions['forward']) forward += 1;
            if (actions['backward']) forward -= 1;
            if (actions['left']) side -= 1;
            if (actions['right']) side += 1;

            if (forward !== 0 || side !== 0) {
                const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
                camDir.y = 0; camDir.normalize();
                const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(this.camera.quaternion);
                camRight.y = 0; camRight.normalize();

                const moveVec = camDir.multiplyScalar(forward).add(camRight.multiplyScalar(side));
                t.delta.x = moveVec.x * moveSpeed;
                t.delta.z = moveVec.z * moveSpeed;

                // Update player direction to face movement smoothly
                if (!t.direction) t.direction = new Vec3(0, 0, 1);
                const tMag = Math.hypot(t.delta.x, t.delta.z);
                if (tMag > 0.001) {
                    const targetAng = Math.atan2(t.delta.x, t.delta.z);
                    const currentAng = Math.atan2(t.direction.x, t.direction.z);
                    let angDiff = targetAng - currentAng;
                    while (angDiff > Math.PI) angDiff -= Math.PI * 2;
                    while (angDiff < -Math.PI) angDiff += Math.PI * 2;

                    const newAng = currentAng + angDiff * 0.18;
                    t.direction.x = Math.sin(newAng);
                    t.direction.z = Math.cos(newAng);
                    t.direction.norm();
                }
            } else {
                t.delta.x = 0; t.delta.z = 0;
            }

            // Jump handling
            if (actions['jump'] && t.onGround) {
                t.delta.y = 0.15 * ts;
                t.onGround = false;
            }
        }
    }

    class PlayerComponent extends GameObject {
        constructor() {
            super('Player', 'player');
            this.tags.add('actor'); // Added for pause control
            // position & delta are the standard PhysicSimulator interface
            this.position = new Vec3(10.5, 3, 12);
            this.delta = new Vec3();
            this.direction = new Vec3(0, 0, 1); // facing direction (used by CombatSystem)
            this.size3D = { x: 0.6, y: 1.6, z: 0.6 }; // PhysicSimulator interface
            this.yaw = 0; this.pitch = 12;
            this.onGround = false;
            this.timeScale = 1.0;
        }
    }

    class DebugDirectionComponent extends GameObject {
        constructor(target, scene) {
            super('DebugDir', 'debug_dir');
            this.target = target;
            this.scene = scene;
            this.arrow = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(), 2.0, 0xff0000, 0.5, 0.3);
        }
        onAttach(master) {
            super.onAttach(master);
            this.scene.add(this.arrow);
        }
        update_self() {
            if (!this.target) return;
            const t = this.target;
            this.arrow.position.set(t.position.x, t.position.y + 0.8, t.position.z);
            if (t.direction && t.direction.len() > 0.001) {
                // Map the internal engine direction back to Three.js space
                const dir3D = new THREE.Vector3(t.direction.x, 0, t.direction.z).normalize();
                this.arrow.setDirection(dir3D);
                this.arrow.visible = true;
            } else {
                this.arrow.visible = false;
            }
        }
    }


    // --- Managed Game Instance ---
    const GM = new GameManager();
    GM.v = {};
    GM.keys = {};

    const setup = () => {
        log("Initializing Component System...");

        // Core Components (Order matters for Dependency Injection)
        GM.v.three = GM.addChild(new ThreeRenderer());
        GM.v.world = GM.addChild(new WorldComponent(GM.v.three.scene));
        GM.v.player = GM.addChild(new PlayerComponent());

        GM.v.visual = new SpriteComponent(GM.v.player, createTextureSet('Blues'), GM.v.three.scene, GM.v.three.camera, -0.2);
        GM.v.visual.tags.add('actor'); // Pause with world
        GM.addChild(GM.v.visual);

        GM.v.camera = GM.addChild(new ControllerCameraFollow(GM.v.three.camera, GM.v.player));
        GM.v.combat = GM.addChild(new CombatSystem(GM.v.player, GM.v.three.scene, GM.v.three.camera, GM.v.camera));

        // Setup Motion Bridge
        const mb = new MotionBridge(GM.v.visual, GM.v.combat, {
            'idle': createTextureSet('Blues'),
            'ready': createTextureSet('Blues'),
            'dodge': createTextureSet('Blues_dash'),
            'attack': [
                createTextureSet('Blues_atk0'),
                createTextureSet('Blues_atk1'),
                createTextureSet('Blues_atk2'),
                createTextureSet('Blues_atk3')
            ],
        });
        mb.tags.add('actor'); // Pause with world
        GM.addChild(mb);

        GM.v.physic = GM.addChild(new PhysicSimulator(GM.v.world.world));
        GM.v.physic.register(GM.v.player); // player is a physics body

        // World Gen (Procedural & Fixed Test Grounds)
        GM.v.world.world.fillTestGround(GM.v.world.world);


        // Enemies
        const spawns = [[15, 1, 15], [20, 1, 12], [25, 1, 18]];
        const enemyMotions = {
            'idle': createTextureSet('Blues2'),
            'strafe': createTextureSet('Blues'),
            'windup': createTextureSet('Blues2'),      // TODO: swap with windup sprite
            'attack': createTextureSet('Blues2'),      // TODO: swap with attack sprite
            'cooldown': createTextureSet('Blues_hurt'),
        };

        for (const s of spawns) {
            const enemy = GM.addChild(new EnemyNode(s[0], s[1], s[2], GM.v.three.scene, GM.v.player, GM.v.three.camera));
            const enemySprite = GM.addChild(new SpriteComponent(enemy, createTextureSet('Blues2'), GM.v.three.scene, GM.v.three.camera, 0.5));
            GM.addChild(new MotionBridge(enemySprite, enemy.combat, enemyMotions, MotionBridge.enemyResolver));
            GM.v.physic.register(enemy);
            GM.v.combat.registerEnemy(enemy);
        }

        // (Old controls removed, handled by global Input System now)
        log("Modular setup complete.");

        // Physical destruction of the global warehouse
        GM.v = null;
        log("Physical destruction of the global warehouse.")
    };

    const gameLoop = (now) => {
        requestAnimationFrame(gameLoop);

        const delta = now - GM.lastTime;
        if (delta < GM.frameTime) return;
        GM.lastTime = now - (delta % GM.frameTime);

        GM.update();


        // UI Refresh (Clear before children draw to uiCtx)
        uiCtx.clearRect(0, 0, 480, 320);
        GM.draw();
        uiCtx.fillStyle = "rgba(255,255,255,0.8)";
        uiCtx.font = "bold 12px monospace";
        uiCtx.fillText("ZENZERO 4 RESTORED", 10, 20);
    };

    try {
        setup();
        requestAnimationFrame(gameLoop);
    } catch (e) {
        logError(e.stack);
    }
</script>
